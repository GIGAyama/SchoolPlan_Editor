<script>
    'use strict';
    // ===== 行事予定（年間行事予定PDF）ビュー =====
    function loadEventPdfLibrary(isManualReload) {
        if (STATE.eventLibraryLoading) return;
        STATE.eventLibraryLoading = true;
        var listEl = document.getElementById('eventPdfList');
        listEl.innerHTML = '<div class="events-list-message"><div class="spinner-lg"></div><p>PDF一覧を読み込んでいます...</p></div>';
        google.script.run
            .withSuccessHandler(function (res) {
                STATE.eventLibraryLoading = false;
                if (!res.success) {
                    STATE.eventLibraryGroups = [];
                    listEl.innerHTML = '<div class="events-list-message">'
                        + '<span class="material-symbols-outlined">folder_off</span>'
                        + '<p>' + escHtml(res.error) + '</p>'
                        + (res.notConfigured ? '<button class="btn btn-outline btn-sm" onclick="switchView(\'settings\')">設定タブを開く</button>' : '')
                        + '</div>';
                    return;
                }
                STATE.eventLibraryLoaded = true;
                STATE.eventLibraryGroups = res.groups || [];
                renderEventPdfList();
                if (isManualReload) showToast('success', 'PDF一覧を更新しました。');
            })
            .withFailureHandler(function (e) {
                STATE.eventLibraryLoading = false;
                listEl.innerHTML = '<div class="events-list-message"><span class="material-symbols-outlined">error</span>'
                    + '<p>読み込みに失敗しました: ' + escHtml(e.message) + '</p></div>';
            })
            .getEventPdfLibraryForWebApp();
    }

    function renderEventPdfList() {
        var listEl = document.getElementById('eventPdfList');
        if (!listEl) return;
        var rawKeyword = (document.getElementById('eventPdfSearchInput').value || '').trim();
        var keyword = rawKeyword.toLowerCase();
        var groups = STATE.eventLibraryGroups || [];
        // グループが「フォルダ直下」のみの場合は見出しを省略する
        var onlyRootGroup = groups.length === 1 && !groups[0].school;
        var html = '';
        var shownCount = 0;

        groups.forEach(function (group) {
            var schoolLabel = group.school || '共通・学校未指定';
            var schoolMatched = keyword && schoolLabel.toLowerCase().indexOf(keyword) >= 0;
            var files = (group.files || []).filter(function (f) {
                if (!keyword || schoolMatched) return true;
                return f.name.toLowerCase().indexOf(keyword) >= 0;
            });
            if (files.length === 0 && (keyword || !group.school)) return;

            html += '<div class="events-school-group">';
            if (!onlyRootGroup) {
                html += '<div class="events-school-name"><span class="material-symbols-outlined fs-6">'
                    + (group.school ? 'school' : 'folder') + '</span>' + escHtml(schoolLabel) + '</div>';
            }
            files.forEach(function (f) {
                shownCount++;
                var selected = f.id === STATE.eventSelectedPdfId;
                html += '<button type="button" class="events-file-item' + (selected ? ' selected' : '') + '"'
                    + ' data-file-id="' + escAttr(f.id) + '" data-file-name="' + escAttr(f.name) + '">'
                    + '<span class="material-symbols-outlined">picture_as_pdf</span>'
                    + '<span class="events-file-meta">'
                    + '<span class="events-file-name" title="' + escAttr(f.name) + '">' + escHtml(f.name) + '</span>'
                    + '<span class="events-file-date">更新: ' + formatEventPdfDate_(f.updatedAt) + '</span>'
                    + '</span></button>';
            });
            html += '</div>';
        });

        if (shownCount === 0) {
            if (keyword) {
                html = '<div class="events-list-message"><span class="material-symbols-outlined">search_off</span>'
                    + '<p>「' + escHtml(rawKeyword) + '」に一致するPDFはありません。</p></div>';
            } else if (!html) {
                html = '<div class="events-list-message"><span class="material-symbols-outlined">picture_as_pdf</span>'
                    + '<p>行事予定PDFがまだありません。<br>「PDFを追加」からGoogleドライブのPDFを選んで登録してください。</p></div>';
            }
        }
        listEl.innerHTML = html;
    }

    function formatEventPdfDate_(timestamp) {
        if (!timestamp) return '－';
        var d = new Date(timestamp);
        return d.getFullYear() + '/' + (d.getMonth() + 1) + '/' + d.getDate();
    }

    // ファイル一覧のクリックはデリゲートで処理（ファイル名に引用符が含まれても安全）
    document.addEventListener('click', function (e) {
        var item = e.target.closest && e.target.closest('.events-file-item');
        if (!item) return;
        selectEventPdf(item.getAttribute('data-file-id'), item.getAttribute('data-file-name'));
    });

    function selectEventPdf(fileId, fileName) {
        if (!fileId) return;
        STATE.eventSelectedPdfId = fileId;
        document.querySelectorAll('.events-file-item').forEach(function (el) {
            el.classList.toggle('selected', el.getAttribute('data-file-id') === fileId);
        });
        var toolbar = document.getElementById('eventPdfViewerToolbar');
        toolbar.style.display = '';
        document.getElementById('eventPdfViewerName').textContent = fileName || '';
        document.getElementById('eventPdfViewerOpenLink').href =
            'https://drive.google.com/file/d/' + encodeURIComponent(fileId) + '/view';
        // Google Drive のプレビューを埋め込んで表示する
        var body = document.getElementById('eventPdfViewerBody');
        body.innerHTML = '<iframe class="events-viewer-frame" title="' + escAttr(fileName) + '"'
            + ' src="https://drive.google.com/file/d/' + encodeURIComponent(fileId) + '/preview"'
            + ' allow="autoplay"></iframe>';
    }

    // ===== PDFを一覧に追加（Googleピッカーで選択して参照を保存） =====
    // Driveにコピーを作らず、選んだファイルの参照（ID・名前・学校名）だけを保存する。
    // 閲覧はユーザー自身のブラウザセッションでDriveプレビューを埋め込むため、権限拡張は不要。
    function addEventPdfFromPicker() {
        showToast('info', 'Google ドライブに接続中...');
        google.script.run
            .withSuccessHandler(function (res) {
                if (!res || !res.success || !res.token) {
                    showToast('error', '認証情報の取得に失敗しました: ' + ((res && res.error) || ''));
                    return;
                }
                if (!STATE.pickerApiLoaded) {
                    gapi.load('picker', {
                        callback: function () {
                            STATE.pickerApiLoaded = true;
                            createEventPdfPicker_(res.token);
                        }
                    });
                } else {
                    createEventPdfPicker_(res.token);
                }
            })
            .withFailureHandler(_onCommError)
            .getPickerAuthInfo();
    }

    function createEventPdfPicker_(oauthToken) {
        var view = new google.picker.DocsView(google.picker.ViewId.DOCS);
        view.setMimeTypes('application/pdf');
        var picker = new google.picker.PickerBuilder()
            .enableFeature(google.picker.Feature.MULTISELECT_ENABLED)
            .addView(view)
            .setOAuthToken(oauthToken)
            .setCallback(eventPdfPickerCallback_)
            .setOrigin('https://script.google.com')
            .setTitle('行事予定PDFを選択（複数可）')
            .build();
        picker.setVisible(true);
    }

    async function eventPdfPickerCallback_(data) {
        if (data.action !== google.picker.Action.PICKED) return;
        var docs = (data.docs || []).map(function (doc) {
            return { id: doc.id, name: doc.name, updatedAt: doc.lastEditedUtc || Date.now() };
        });
        if (docs.length === 0) return;

        // 学校名（グループ名）を任意で入力してもらう
        var existing = (STATE.eventLibraryGroups || [])
            .map(function (g) { return g.school; })
            .filter(function (s) { return !!s; });
        var optionsHtml = '<option value="">（学校を指定しない）</option>'
            + existing.map(function (s) {
                return '<option value="' + escAttr(s) + '">' + escHtml(s) + '</option>';
            }).join('');

        var result = await Swal.fire({
            title: docs.length + '件のPDFを一覧に追加',
            html: '<div style="text-align:left; display:flex; flex-direction:column; gap:10px;">'
                + '<div style="font-size:0.8rem; color:var(--text-sub);">学校ごとに分けて表示できます（任意）。</div>'
                + '<label style="font-size:0.85rem; display:flex; flex-direction:column; gap:4px;">既存の学校グループ'
                + '<select id="swalEventPdfSchool" class="form-select form-select-sm">' + optionsHtml + '</select></label>'
                + '<label style="font-size:0.85rem; display:flex; flex-direction:column; gap:4px;">新しい学校名（新しいグループを作る場合）'
                + '<input id="swalEventPdfNewSchool" class="form-control form-control-sm" placeholder="例: ○○小学校"></label>'
                + '</div>',
            showCancelButton: true,
            confirmButtonText: '一覧に追加',
            cancelButtonText: 'キャンセル',
            preConfirm: function () {
                var school = document.getElementById('swalEventPdfNewSchool').value.trim()
                    || document.getElementById('swalEventPdfSchool').value;
                return { school: school };
            }
        });
        if (!result.isConfirmed || !result.value) return;

        showToast('info', 'PDFを一覧に追加しています...');
        google.script.run
            .withSuccessHandler(function (res) {
                if (!res.success) {
                    showToast('error', 'エラー: ' + res.error);
                    return;
                }
                showToast('success', res.message);
                loadEventPdfLibrary();
            })
            .withFailureHandler(_onCommError)
            .addEventPdfReferences(docs, result.value.school);
    }

    // 表示中のPDFを一覧から外す（Drive上のファイル自体は削除しない）
    async function removeSelectedEventPdf() {
        var fileId = STATE.eventSelectedPdfId;
        if (!fileId) return;
        var confirm = await Swal.fire({
            title: '一覧から外しますか？',
            text: 'この行事予定PDFを一覧から外します。Google ドライブ上のファイル自体は削除されません。',
            icon: 'question',
            showCancelButton: true,
            confirmButtonText: '外す',
            cancelButtonText: 'キャンセル',
            confirmButtonColor: '#d33'
        });
        if (!confirm.isConfirmed) return;

        google.script.run
            .withSuccessHandler(function (res) {
                if (!res.success) {
                    showToast('error', 'エラー: ' + res.error);
                    return;
                }
                showToast('success', res.message);
                // ビューアをリセットして一覧を再読込
                STATE.eventSelectedPdfId = null;
                var toolbar = document.getElementById('eventPdfViewerToolbar');
                if (toolbar) toolbar.style.display = 'none';
                var body = document.getElementById('eventPdfViewerBody');
                if (body) {
                    body.innerHTML = '<div class="events-viewer-placeholder">'
                        + '<span class="material-symbols-outlined">picture_as_pdf</span>'
                        + '<p>左の一覧からPDFを選択すると、ここに表示されます。</p></div>';
                }
                loadEventPdfLibrary();
            })
            .withFailureHandler(_onCommError)
            .removeEventPdfReference(fileId);
    }

</script>
