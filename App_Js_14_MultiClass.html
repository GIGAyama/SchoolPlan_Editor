<script>
    'use strict';

    // ===================================================
    // ===== 複数学級モード（専科教員向け） =====
    // モード無効時（デフォルト）はUIに一切表示されず、既存動作に影響しません。
    // ===================================================

    STATE.multiClass = { enabled: false, activeSheet: '', classes: [] };

    function loadMultiClassState() {
        google.script.run
            .withSuccessHandler(function (res) {
                if (!res || !res.success) return;
                applyMultiClassState(res);
            })
            .withFailureHandler(function () { })
            .getMultiClassSettings();
    }

    function applyMultiClassState(res) {
        STATE.multiClass = {
            enabled: !!res.enabled,
            activeSheet: res.activeSheet || '',
            classes: res.classes || []
        };
        renderClassSwitcher();
        renderMultiClassSettingsUI();
    }

    function renderClassSwitcher() {
        var select = document.getElementById('classSwitcher');
        if (!select) return;
        var mc = STATE.multiClass;
        if (!mc.enabled || mc.classes.length === 0) {
            select.style.display = 'none';
            return;
        }
        select.innerHTML = '';
        mc.classes.forEach(function (c) {
            var opt = document.createElement('option');
            opt.value = c.sheetName;
            opt.textContent = c.name + '（' + c.grade + '年）';
            select.appendChild(opt);
        });
        select.value = mc.activeSheet;
        select.style.display = 'inline-block';
    }

    function renderMultiClassSettingsUI() {
        var checkbox = document.getElementById('sysMultiClassEnabled');
        var manager = document.getElementById('multiClassManager');
        var listEl = document.getElementById('multiClassList');
        if (!checkbox || !manager || !listEl) return;

        var mc = STATE.multiClass;
        checkbox.checked = mc.enabled;
        manager.style.display = mc.enabled ? 'block' : 'none';
        if (!mc.enabled) return;

        var html = '';
        mc.classes.forEach(function (c) {
            var isActive = c.sheetName === mc.activeSheet;
            html += '<div class="mc-class-row' + (isActive ? ' active' : '') + '">'
                + '<span class="mc-class-name">' + escHtml(c.name) + '</span>'
                + '<span class="mc-class-grade">' + escHtml(String(c.grade)) + '年生</span>'
                + '<span class="mc-class-sheet">シート: ' + escHtml(c.sheetName) + '</span>'
                + (isActive ? '<span class="mc-active-badge">表示中</span>' : '')
                + '<span class="mc-row-actions">'
                + (!isActive
                    ? '<button class="btn btn-outline btn-sm" onclick="switchMultiClass(\'' + escAttr(c.sheetName) + '\')">この学級を表示</button>'
                    : '')
                + '<button class="btn btn-outline btn-sm" onclick="renameMultiClass(\'' + escAttr(c.sheetName) + '\', \'' + escAttr(c.name) + '\')">名前変更</button>'
                + (!c.isDefault
                    ? '<button class="btn btn-outline btn-sm" style="color:var(--danger);border-color:var(--danger);" '
                    + 'onclick="deleteMultiClass(\'' + escAttr(c.sheetName) + '\', \'' + escAttr(c.name) + '\')">削除</button>'
                    : '')
                + '</span></div>';
        });
        listEl.innerHTML = html;
    }

    function afterClassContextChanged() {
        STATE.weekData = null;
        STATE.hoursSummaryData = null;
        STATE.stdHoursLoaded = false;
        STATE.isSystemSettingsLoaded = false;
        if (STATE.performance && STATE.performance.weekCache) STATE.performance.weekCache = {};

        if (STATE.mondayStr) loadWeeklyPlan();
        else goToToday();
        if (STATE.view === 'hours') {
            loadAnnualHoursView();
            if (STATE.mondayStr) loadHoursSummary();
        }
        if (STATE.view === 'settings') {
            loadStandardHours();
            loadSystemSettings();
        }
        refreshReflectionBadge();
    }

    function onClassSwitcherChange(sheetName) {
        if (!sheetName || sheetName === STATE.multiClass.activeSheet) return;
        autoSaveAndThen(function () { switchMultiClass(sheetName); });
    }

    function switchMultiClass(sheetName) {
        showToast('info', '学級を切り替えています...');
        google.script.run
            .withSuccessHandler(function (res) {
                if (!res.success) {
                    showToast('error', '切り替え失敗: ' + res.error);
                    renderClassSwitcher();
                    return;
                }
                applyMultiClassState(res);
                afterClassContextChanged();
                var cls = res.classes.filter(function (c) { return c.sheetName === res.activeSheet; })[0];
                showToast('success', (cls ? '「' + cls.name + '」' : '学級') + 'に切り替えました');
            })
            .withFailureHandler(function (e) {
                showToast('error', '通信エラー: ' + e.message);
                renderClassSwitcher();
            })
            .switchActiveClassFromWeb(sheetName);
    }

    async function toggleMultiClassMode(checkbox) {
        var enable = checkbox.checked;
        var res = await Swal.fire({
            icon: 'question',
            title: enable ? '複数学級モードを有効にしますか？' : '複数学級モードを無効にしますか？',
            html: enable
                ? '<div style="text-align:left;font-size:0.85rem;line-height:1.6;">現在の「データベース」シートが1つ目の学級として登録され、画面左上に学級切替メニューが表示されます。<br>学級はこの下の「学級を追加」からいつでも増やせます。</div>'
                : '<div style="text-align:left;font-size:0.85rem;line-height:1.6;">既定の「データベース」シートの表示に戻ります。<br>追加した学級のシートとデータは削除されず、再度有効にすればそのまま使えます。</div>',
            showCancelButton: true,
            confirmButtonText: enable ? '有効にする' : '無効にする',
            cancelButtonText: 'キャンセル',
            confirmButtonColor: '#1a73e8'
        });
        if (!res.isConfirmed) {
            checkbox.checked = !enable;
            return;
        }

        autoSaveAndThen(function () {
            showToast('info', enable ? '複数学級モードを有効にしています...' : '複数学級モードを無効にしています...');
            google.script.run
                .withSuccessHandler(function (r) {
                    if (!r.success) {
                        showToast('error', 'エラー: ' + r.error);
                        checkbox.checked = !enable;
                        return;
                    }
                    applyMultiClassState(r);
                    afterClassContextChanged();
                    showToast('success', enable ? '複数学級モードを有効にしました' : '複数学級モードを無効にしました');
                })
                .withFailureHandler(function (e) {
                    showToast('error', '通信エラー: ' + e.message);
                    checkbox.checked = !enable;
                })
                .setMultiClassEnabledFromWeb(enable);
        });
    }

    function addMultiClass() {
        var nameInput = document.getElementById('mcNewClassName');
        var gradeSelect = document.getElementById('mcNewClassGrade');
        var name = (nameInput.value || '').trim();
        if (!name) { showToast('error', '学級名を入力してください'); return; }

        showToast('info', '学級「' + name + '」を作成しています...（数秒かかります）');
        google.script.run
            .withSuccessHandler(function (res) {
                if (!res.success) { showToast('error', '追加失敗: ' + res.error); return; }
                nameInput.value = '';
                applyMultiClassState(res);
                showToast('success', '学級「' + name + '」を追加しました。切替メニューから表示できます');
            })
            .withFailureHandler(function (e) { showToast('error', '通信エラー: ' + e.message); })
            .addClassFromWeb(name, gradeSelect.value);
    }

    async function deleteMultiClass(sheetName, name) {
        var res = await Swal.fire({
            icon: 'warning',
            title: '学級の削除',
            html: '学級「' + escHtml(name) + '」とそのシート（週案・振り返りのデータを含む）を削除します。<br><strong>この操作は元に戻せません。</strong>よろしいですか？',
            showCancelButton: true,
            confirmButtonText: '削除する',
            cancelButtonText: 'キャンセル',
            confirmButtonColor: '#dc3545'
        });
        if (!res.isConfirmed) return;

        var wasActive = sheetName === STATE.multiClass.activeSheet;
        showToast('info', '学級を削除しています...');
        google.script.run
            .withSuccessHandler(function (r) {
                if (!r.success) { showToast('error', '削除失敗: ' + r.error); return; }
                applyMultiClassState(r);
                if (wasActive) afterClassContextChanged();
                showToast('success', '学級「' + name + '」を削除しました');
            })
            .withFailureHandler(function (e) { showToast('error', '通信エラー: ' + e.message); })
            .deleteClassFromWeb(sheetName);
    }

    async function renameMultiClass(sheetName, currentName) {
        var res = await Swal.fire({
            title: '学級名の変更',
            input: 'text',
            inputValue: currentName,
            inputAttributes: { maxlength: 30 },
            showCancelButton: true,
            confirmButtonText: '変更する',
            cancelButtonText: 'キャンセル',
            confirmButtonColor: '#1a73e8',
            inputValidator: function (v) { if (!v || !v.trim()) return '学級名を入力してください'; }
        });
        if (!res.isConfirmed) return;

        google.script.run
            .withSuccessHandler(function (r) {
                if (!r.success) { showToast('error', '変更失敗: ' + r.error); return; }
                applyMultiClassState(r);
                showToast('success', '学級名を変更しました');
            })
            .withFailureHandler(function (e) { showToast('error', '通信エラー: ' + e.message); })
            .renameClassFromWeb(sheetName, res.value.trim());
    }
</script>

<script>
    'use strict';

    // ===================================================
    // ===== Phase 2: 起動・通信・表示性能レイヤー =====
    // ===================================================

    STATE.performance = {
        bootstrapStartedAt: 0,
        weekRequestSeq: 0,
        weekCache: {},
        masterLoading: false,
        deferredLoaded: false
    };

    function p2RunIdle(callback, delay) {
        var invoke = function () {
            if (typeof window.requestIdleCallback === 'function') {
                window.requestIdleCallback(callback, { timeout: 1800 });
            } else {
                setTimeout(callback, 0);
            }
        };
        setTimeout(invoke, delay || 0);
    }

    function p2WeekCacheKey(mondayStr) {
        var activeSheet = STATE.multiClass && STATE.multiClass.activeSheet ? STATE.multiClass.activeSheet : 'default';
        return activeSheet + '::' + mondayStr;
    }

    function p2CacheWeek(data) {
        if (!data || !data.success || !data.mondayDateStr) return;
        STATE.performance.weekCache[p2WeekCacheKey(data.mondayDateStr)] = {
            data: JSON.parse(JSON.stringify(data)),
            savedAt: Date.now()
        };
    }

    function p2GetCachedWeek(mondayStr) {
        var entry = STATE.performance.weekCache[p2WeekCacheKey(mondayStr)];
        if (!entry) return null;
        if (Date.now() - entry.savedAt > 5 * 60 * 1000) {
            delete STATE.performance.weekCache[p2WeekCacheKey(mondayStr)];
            return null;
        }
        return JSON.parse(JSON.stringify(entry.data));
    }

    function p2ApplyWeekData(data) {
        if (!data || !data.success) return false;
        STATE.weekData = data;
        renderWeekGrid(data.days);
        updateWeekHeader(data.days, data.weekNum);
        renderWeeklyTaskPanel();
        p2CacheWeek(data);
        p2RunIdle(function () {
            if (STATE.mondayStr === data.mondayDateStr && typeof loadHoursSummary === 'function') loadHoursSummary();
        }, 120);
        return true;
    }

    function p2ShowWeekLoading() {
        var grid = document.getElementById('weekGrid');
        if (!grid) return;
        grid.style.minWidth = '';
        grid.style.gridTemplateColumns = '';
        grid.innerHTML = '<div class="loading-state"><div class="spinner-lg"></div><p>読み込み中...</p></div>';
        var label = document.getElementById('weekLabel');
        if (label) label.textContent = '読み込み中...';
    }

    function p2LoadDeferredBootstrap() {
        if (STATE.performance.deferredLoaded) return;
        STATE.performance.deferredLoaded = true;
        google.script.run
            .withSuccessHandler(function (res) {
                if (!res || !res.success) return;

                if (res.tasks && res.tasks.success) {
                    STATE.allTaskData = res.tasks.tasks || [];
                    STATE.tasks = STATE.allTaskData;
                    STATE.taskDataLoaded = true;
                    STATE.taskLoading = false;
                    if (typeof refreshTaskViews === 'function') refreshTaskViews();
                    else {
                        if (typeof renderTaskList === 'function') renderTaskList();
                        if (typeof renderWeeklyTaskPanel === 'function') renderWeeklyTaskPanel();
                    }
                }

                if (res.reflection && res.reflection.success) {
                    updateReflectionBadge(res.reflection.pendingCount || 0);
                    var afterSchool = new Date().getHours() >= REFLECTION_AFTERSCHOOL_HOUR;
                    if (afterSchool && res.reflection.hasLessons && res.reflection.status === '') {
                        setTimeout(function () {
                            if (typeof Swal !== 'undefined' && Swal.isVisible()) return;
                            openReflectionWizard(res.reflection.today, { auto: true });
                        }, 250);
                    }
                }

                if (res.setup && res.setup.success && !res.setup.wizardDone
                    && !(res.setup.hasApiKey && res.setup.hasCalendar)) {
                    setTimeout(function () {
                        if (typeof Swal !== 'undefined' && Swal.isVisible()) return;
                        openSetupWizard({ auto: true, status: res.setup });
                    }, 1700);
                }
            })
            .withFailureHandler(function () {
                STATE.performance.deferredLoaded = false;
            })
            .getDeferredBootstrapV2();
    }

    var p2LegacyOnload = window.onload;
    window.onload = function () {
        STATE.performance.bootstrapStartedAt = Date.now();
        initWeekendVisibility();
        restoreTaskSidebarState();
        initPdfImportUI();
        initAiTaskPdfUI();
        p2ShowWeekLoading();

        google.script.run
            .withSuccessHandler(function (res) {
                if (!res || !res.success) {
                    if (typeof p2LegacyOnload === 'function') p2LegacyOnload();
                    return;
                }
                if (res.linked === false || (res.tenant && res.tenant.linked === false)) {
                    showOnboardingChoice(res.tenant || res);
                    return;
                }

                if (res.masterData && res.masterData.success) STATE.masterData = res.masterData;
                if (res.multiClass && res.multiClass.success) applyMultiClassState(res.multiClass);
                STATE.mondayStr = res.mondayStr;

                if (!p2ApplyWeekData(res.weeklyPlan)) {
                    doLoadWeeklyPlan();
                }
                p2RunIdle(p2LoadDeferredBootstrap, 80);
            })
            .withFailureHandler(function () {
                if (typeof p2LegacyOnload === 'function') p2LegacyOnload();
            })
            .getAppBootstrapV2();
    };

    function loadMasterData() {
        if (STATE.masterData || STATE.performance.masterLoading) return;
        STATE.performance.masterLoading = true;
        google.script.run
            .withSuccessHandler(function (data) {
                STATE.performance.masterLoading = false;
                if (data && data.success) STATE.masterData = data;
            })
            .withFailureHandler(function (e) {
                STATE.performance.masterLoading = false;
                _onCommError(e);
            })
            .getUnitMasterForSuggest();
    }

    function doLoadWeeklyPlan() {
        var mondayStr = STATE.mondayStr;
        if (!mondayStr) return;
        var requestSeq = ++STATE.performance.weekRequestSeq;
        var cached = p2GetCachedWeek(mondayStr);
        if (cached) p2ApplyWeekData(cached);
        else p2ShowWeekLoading();

        google.script.run
            .withSuccessHandler(function (data) {
                if (requestSeq !== STATE.performance.weekRequestSeq || STATE.mondayStr !== mondayStr) return;
                if (!data || !data.success) {
                    if (!cached) showToast('error', 'データ取得エラー: ' + (data && data.error ? data.error : '取得できませんでした'));
                    return;
                }
                p2ApplyWeekData(data);
            })
            .withFailureHandler(function (e) {
                if (requestSeq !== STATE.performance.weekRequestSeq || STATE.mondayStr !== mondayStr) return;
                if (isNoDbError_(e && e.message)) { handleNoDbError_(); return; }
                if (!cached) showToast('error', '通信エラー: ' + e.message);
            })
            .getWeeklyPlanDataV2(mondayStr);
    }

    function p2UpdateCurrentWeekCache() {
        if (!STATE.weekData || !STATE.mondayStr) return;
        STATE.weekData.mondayDateStr = STATE.mondayStr;
        p2CacheWeek(STATE.weekData);
    }

    function autoSaveAndThen(callback) {
        if (!STATE.editMode || !hasUnsavedChanges()) {
            if (STATE.editMode) { STATE.editMode = false; updateEditUI(); }
            callback();
            return;
        }
        if (_autoSaving) return;
        _autoSaving = true;
        var days = collectCurrentEditData();
        if (!days) { _autoSaving = false; callback(); return; }

        var subjectErrors = validateDaysSubjects(days);
        if (subjectErrors.length > 0) {
            _autoSaving = false;
            showToast('error', '教科名の入力に誤りがあるため自動保存できません: ' + subjectErrors[0]
                + (subjectErrors.length > 1 ? '（他' + (subjectErrors.length - 1) + '件）' : ''));
            return;
        }

        showToast('info', '自動保存中...');
        google.script.run
            .withSuccessHandler(function (result) {
                _autoSaving = false;
                if (result.success) {
                    STATE.weekData.days = days;
                    STATE.weekData.revision = result.revision;
                    STATE.editMode = false;
                    updateEditUI();
                    p2UpdateCurrentWeekCache();
                    showToast('success', '自動保存しました');
                    callback();
                } else if (result.conflict) {
                    handleSaveConflict();
                } else {
                    showToast('error', '自動保存失敗: ' + result.error + ' 手動で保存してください。');
                }
            })
            .withFailureHandler(function (e) {
                _autoSaving = false;
                showToast('error', '自動保存エラー: ' + e.message + ' 手動で保存してください。');
            })
            .saveWeeklyPlanDataV2(STATE.mondayStr, days, STATE.weekData.revision);
    }

    function saveWeeklyPlan() {
        var days = collectCurrentEditData();
        if (!days) return;
        var subjectErrors = validateDaysSubjects(days);
        if (subjectErrors.length > 0) {
            showToast('error', '教科名の入力に誤りがあります: ' + subjectErrors[0]
                + (subjectErrors.length > 1 ? '（他' + (subjectErrors.length - 1) + '件）' : ''));
            return;
        }

        var btn = document.getElementById('saveBtn');
        btn.disabled = true;
        btn.innerHTML = '<span class="material-symbols-outlined fs-6">hourglass_empty</span> 保存中...';
        showToast('info', '保存中...');

        google.script.run
            .withSuccessHandler(function (result) {
                btn.disabled = false;
                btn.innerHTML = '<span class="material-symbols-outlined fs-6">save</span> 保存する';
                if (result.success) {
                    STATE.weekData.days = days;
                    STATE.weekData.revision = result.revision;
                    p2UpdateCurrentWeekCache();
                    cancelEdit();
                    showToast('success', result.message);
                } else if (result.conflict) {
                    handleSaveConflict();
                } else {
                    showToast('error', '保存失敗: ' + result.error);
                }
            })
            .withFailureHandler(function (e) {
                btn.disabled = false;
                btn.innerHTML = '<span class="material-symbols-outlined fs-6">save</span> 保存する';
                showToast('error', '通信エラー: ' + e.message);
            })
            .saveWeeklyPlanDataV2(STATE.mondayStr, days, STATE.weekData.revision);
    }

    function persistViewMutation() {
        if (STATE.editMode || !STATE.weekData || !STATE.mondayStr) return;
        var weekData = STATE.weekData;
        var mondayStr = STATE.mondayStr;
        clearTimeout(_viewSaveTimer);
        _viewSaveTimer = setTimeout(function () {
            google.script.run
                .withSuccessHandler(function (result) {
                    if (result.success) {
                        weekData.revision = result.revision;
                        p2UpdateCurrentWeekCache();
                    } else if (result.conflict) {
                        handleSaveConflict();
                    } else {
                        showToast('error', '変更の保存に失敗: ' + result.error);
                    }
                })
                .withFailureHandler(function (e) {
                    showToast('error', '変更の保存に失敗（通信エラー）: ' + e.message);
                })
                .saveWeeklyPlanDataV2(mondayStr, weekData.days, weekData.revision);
        }, 450);
    }
</script>
