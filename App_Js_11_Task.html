<script>
    'use strict';
    // ===================================================
    // ===== タスク管理（TODO自動抽出） ロジック (Phase 6)
    // ===================================================

    // ===== 初期リロード制御 =====

    // ===== UI切替関連 =====
    // タスク抽出コンソールで選択中のPDFファイル（複数可）
    var AI_TASK_PDF_FILES = [];
    var aiTaskPdfSeq = 0;

    /** チェックされたソースの入力欄を開閉し、カードの選択スタイルを更新する */
    function updateAiTaskSourceUI() {
        [
            ['aiTaskUseSchedule', 'aiTaskScheduleBody'],
            ['aiTaskUseText', 'aiTaskTextBody'],
            ['aiTaskUsePdf', 'aiTaskPdfBody']
        ].forEach(function (pair) {
            var chk = document.getElementById(pair[0]);
            var body = document.getElementById(pair[1]);
            if (!chk || !body) return;
            body.style.display = chk.checked ? 'block' : 'none';
            var card = chk.closest('.ai-task-source-card');
            if (card) card.classList.toggle('checked', chk.checked);
        });
    }

    /** PDFドロップゾーン・ファイル入力を初期化する（初回表示時に一度だけ配線） */
    function initAiTaskPdfUI() {
        if (STATE.aiTaskPdfUIReady) return;
        var zone = document.getElementById('aiTaskPdfDropZone');
        var input = document.getElementById('aiTaskPdfFile');
        if (!zone || !input) return;
        zone.addEventListener('click', function () { input.click(); });
        zone.addEventListener('keydown', function (e) {
            if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); input.click(); }
        });
        zone.addEventListener('dragover', function (e) { e.preventDefault(); zone.classList.add('dragover'); });
        zone.addEventListener('dragleave', function () { zone.classList.remove('dragover'); });
        zone.addEventListener('drop', function (e) {
            e.preventDefault();
            zone.classList.remove('dragover');
            if (e.dataTransfer && e.dataTransfer.files) addAiTaskPdfFiles(e.dataTransfer.files);
        });
        input.addEventListener('change', function () {
            addAiTaskPdfFiles(input.files);
            input.value = '';
        });
        STATE.aiTaskPdfUIReady = true;
    }

    function addAiTaskPdfFiles(fileList) {
        var added = 0, rejected = [];
        Array.prototype.forEach.call(fileList, function (f) {
            var isPdf = /\.pdf$/i.test(f.name) || f.type === 'application/pdf';
            if (!isPdf) { rejected.push(f.name + '（PDFではありません）'); return; }
            if (typeof PDF_MAX_FILE_BYTES === 'number' && f.size > PDF_MAX_FILE_BYTES) {
                rejected.push(f.name + '（15MBを超えています）'); return;
            }
            var dup = AI_TASK_PDF_FILES.some(function (item) { return item.name === f.name && item.file.size === f.size; });
            if (dup) { rejected.push(f.name + '（追加済み）'); return; }
            AI_TASK_PDF_FILES.push({ id: 'atp' + (++aiTaskPdfSeq), name: f.name, file: f });
            added++;
        });
        if (added > 0) showToast('success', added + '件のPDFを追加しました。');
        if (rejected.length > 0) showToast('error', '追加できないファイル: ' + rejected.join(' / '));
        renderAiTaskPdfList();
    }

    function removeAiTaskPdfFile(id) {
        AI_TASK_PDF_FILES = AI_TASK_PDF_FILES.filter(function (item) { return item.id !== id; });
        renderAiTaskPdfList();
    }

    function renderAiTaskPdfList() {
        var listEl = document.getElementById('aiTaskPdfFileList');
        if (!listEl) return;
        listEl.innerHTML = '';
        AI_TASK_PDF_FILES.forEach(function (item) {
            var row = document.createElement('div');
            row.className = 'ai-task-pdf-file';

            var icon = document.createElement('span');
            icon.className = 'material-symbols-outlined fs-6';
            icon.textContent = 'picture_as_pdf';

            var name = document.createElement('span');
            name.className = 'ai-task-pdf-name';
            name.title = item.name;
            name.textContent = item.name;

            var rm = document.createElement('button');
            rm.type = 'button';
            rm.className = 'ai-task-pdf-remove';
            rm.title = '外す';
            rm.innerHTML = '<span class="material-symbols-outlined fs-6">close</span>';
            rm.onclick = function () { removeAiTaskPdfFile(item.id); };

            row.appendChild(icon);
            row.appendChild(name);
            row.appendChild(rm);
            listEl.appendChild(row);
        });
    }

    // ===== タスクロードと描画 =====

    function loadTasks() {
        if (STATE.taskLoading) return; // 二重呼び出し防止
        STATE.taskLoading = true;
        var container = document.getElementById('taskListContainer');
        if (container) container.innerHTML = '<div style="text-align:center; padding: 20px;"><div class="spinner-lg"></div><p>タスクを読み込み中...</p></div>';

        google.script.run
            .withSuccessHandler(function (res) {
                STATE.taskLoading = false;
                if (res.success) {
                    STATE.allTaskData = res.tasks || [];
                    STATE.tasks = STATE.allTaskData;
                    STATE.taskDataLoaded = true;
                    refreshTaskViews();
                } else {
                    if (container) container.innerHTML = '<div style="color:var(--danger); padding:20px;">読込エラー: ' + res.error + '</div>';
                    showToast('error', 'タスク取得エラー: ' + res.error);
                }
            })
            .withFailureHandler(function (e) {
                STATE.taskLoading = false;
                if (container) container.innerHTML = '<div style="color:var(--danger); padding:20px;">通信エラー</div>';
                showToast('error', '致命的な通信エラー: ' + e.message);
            })
            .getTasksFromWebApp();
    }

    // ===== 共通ヘルパー =====

    /** dueDate（yyyy-MM-dd）と比較可能な形式で今日の日付を返す */
    function taskTodayStr() {
        // dueDate は "yyyy-MM-dd" 形式のため、比較用の今日の日付も同じ区切り文字に揃える
        //（"yyyy/MM/dd" と比較すると '-' < '/' のため同年内の未来の期日まで期限切れ扱いになる）
        return formatDateLocal(new Date()).replace(/\//g, '-');
    }

    /** ステータスに応じたアイコン・クラス・次ステータスを返す */
    function taskStatusMeta(status) {
        if (status === '完了') return { icon: 'check_circle', cls: 'status-done', label: '完了' };
        if (status === '進行中') return { icon: 'timelapse', cls: 'status-inprogress', label: '進行中' };
        return { icon: 'radio_button_unchecked', cls: 'status-notstarted', label: '未着手' };
    }

    /** ステータス切替ボタンのHTMLを生成（クリックで 未着手→進行中→完了 を循環） */
    function taskStatusBtnHtml(t, small) {
        var s = taskStatusMeta(t.status || '未着手');
        return `<button class="task-status-btn ${s.cls}${small ? ' sm' : ''}" onclick="cycleTaskStatus('${t.id}')" title="${s.label}（クリックで切替: 未着手→進行中→完了）"><span class="material-symbols-outlined">${s.icon}</span></button>`;
    }

    /** 優先度バッジのHTMLを生成 */
    function taskPriorityBadgeHtml(priority) {
        var p = priority || '中';
        var cls = p === '高' ? 'p-high' : (p === '低' ? 'p-low' : 'p-mid');
        return `<span class="task-priority-badge ${cls}" title="優先度: ${p}">${p}</span>`;
    }

    /** タスク関連の全表示（一覧・サイドバー・ナビバッジ）をまとめて再描画 */
    function refreshTaskViews() {
        if (document.getElementById('taskListContainer')) renderTaskList();
        if (document.getElementById('sidebarTaskList')) renderWeeklyTaskPanel();
        updateTaskNavBadge();
    }

    /** ナビの「タスク」ボタンに期限切れ＋今日締切の未完了件数バッジを表示 */
    function updateTaskNavBadge() {
        var badge = document.getElementById('taskNavBadge');
        if (!badge) return;
        var todayStr = taskTodayStr();
        var count = (STATE.allTaskData || []).filter(function (t) {
            return t.status !== '完了' && t.dueDate && t.dueDate <= todayStr;
        }).length;
        badge.style.display = count > 0 ? 'inline-flex' : 'none';
        badge.textContent = count > 99 ? '99+' : String(count);
    }

    // ===== フィルタ・検索・並び替え =====

    function setTaskFilter(filter) {
        STATE.taskFilter = filter;
        document.querySelectorAll('.task-filter-chip').forEach(function (chip) {
            chip.classList.toggle('active', chip.dataset.filter === filter);
        });
        renderTaskList();
    }

    function onTaskSearchInput() {
        var input = document.getElementById('taskSearchInput');
        STATE.taskSearchKeyword = (input ? input.value : '').trim().toLowerCase();
        renderTaskList();
    }

    function setTaskSortMode(mode) {
        STATE.taskSortMode = mode;
        renderTaskList();
    }

    /** フィルタ・検索・並び替えを適用したタスク配列を返す */
    function getVisibleTasks() {
        var showCompleted = document.getElementById('chkShowCompletedTasks');
        showCompleted = showCompleted ? showCompleted.checked : false;
        var todayStr = taskTodayStr();
        var weekLater = new Date();
        weekLater.setDate(weekLater.getDate() + 6);
        var weekLaterStr = formatDateLocal(weekLater).replace(/\//g, '-');
        var kw = STATE.taskSearchKeyword;

        var filtered = STATE.allTaskData.filter(function (t) {
            if (!showCompleted && t.status === '完了') return false;
            switch (STATE.taskFilter) {
                case 'overdue': if (!(t.dueDate && t.dueDate < todayStr && t.status !== '完了')) return false; break;
                case 'today': if (t.dueDate !== todayStr) return false; break;
                case 'week': if (!(t.dueDate && t.dueDate >= todayStr && t.dueDate <= weekLaterStr)) return false; break;
                case 'nodate': if (t.dueDate) return false; break;
            }
            if (kw) {
                var haystack = [t.content, t.resource, t.memo, t.source].join(' ').toLowerCase();
                if (haystack.indexOf(kw) < 0) return false;
            }
            return true;
        });

        var prioOrder = { '高': 0, '中': 1, '低': 2 };
        var byDue = function (a, b) {
            if (!a.dueDate && !b.dueDate) return 0;
            if (!a.dueDate) return 1;
            if (!b.dueDate) return -1;
            return a.dueDate.localeCompare(b.dueDate);
        };
        if (STATE.taskSortMode === 'priority') {
            filtered.sort(function (a, b) {
                var d = (prioOrder[a.priority] !== undefined ? prioOrder[a.priority] : 1) - (prioOrder[b.priority] !== undefined ? prioOrder[b.priority] : 1);
                return d !== 0 ? d : byDue(a, b);
            });
        } else if (STATE.taskSortMode === 'created') {
            // シート格納順（＝追加順）のまま
        } else {
            filtered.sort(byDue);
        }
        return filtered;
    }

    // ===== 進行状況サマリー =====

    function renderTaskSummary() {
        var bar = document.getElementById('taskSummaryBar');
        if (!bar) return;
        var all = STATE.allTaskData || [];
        var todayStr = taskTodayStr();
        var total = all.length;
        var done = all.filter(function (t) { return t.status === '完了'; }).length;
        var inProgress = all.filter(function (t) { return t.status === '進行中'; }).length;
        var notStarted = total - done - inProgress;
        var overdue = all.filter(function (t) { return t.status !== '完了' && t.dueDate && t.dueDate < todayStr; }).length;
        var dueToday = all.filter(function (t) { return t.status !== '完了' && t.dueDate === todayStr; }).length;
        var pct = total > 0 ? Math.round(done / total * 100) : 0;

        bar.innerHTML = `
            <div class="task-stat-chips">
                <button class="task-stat-chip stat-overdue${overdue ? '' : ' zero'}" onclick="setTaskFilter('overdue')" title="期限切れの未完了タスク"><span class="material-symbols-outlined">warning</span> 期限切れ <b>${overdue}</b></button>
                <button class="task-stat-chip stat-today${dueToday ? '' : ' zero'}" onclick="setTaskFilter('today')" title="今日が期日のタスク"><span class="material-symbols-outlined">today</span> 今日 <b>${dueToday}</b></button>
                <span class="task-stat-chip stat-notstarted">未着手 <b>${notStarted}</b></span>
                <span class="task-stat-chip stat-inprogress">進行中 <b>${inProgress}</b></span>
                <span class="task-stat-chip stat-done">完了 <b>${done}</b></span>
            </div>
            <div class="task-progress-wrap" title="完了率 ${pct}%（${done}/${total}件）">
                <div class="task-progress-track"><div class="task-progress-fill" style="width:${pct}%"></div></div>
                <span class="task-progress-label">${pct}%</span>
            </div>
        `;
    }

    // ===== タスク一覧の描画 =====

    function renderTaskList() {
        var container = document.getElementById('taskListContainer');
        if (!container) return;
        renderTaskSummary();
        updateTaskNavBadge();

        var filtered = getVisibleTasks();

        if (filtered.length === 0) {
            var msg = STATE.allTaskData.length === 0
                ? '現在登録されているタスクはありません。上の入力欄からすぐに追加できます。'
                : '条件に合うタスクはありません。（フィルタ・検索条件を確認してください）';
            container.className = 'task-list-view';
            container.innerHTML = '<div style="text-align: center; padding: 40px 20px; background: var(--surface-2); border-radius: 8px; border: 1px dashed var(--border); color: var(--text-hint);">' + msg + '</div>';
            return;
        }

        var todayStr = taskTodayStr();

        // コンテナのクラスを表示モードに応じて切替
        container.className = STATE.taskViewMode === 'list' ? 'task-list-view' : 'task-grid';

        container.innerHTML = filtered.map(t => {
            var isComp = (t.status === '完了');
            var compClass = isComp ? ' completed' : (t.status === '進行中' ? ' inprogress' : '');
            var isOverdue = !isComp && t.dueDate && (t.dueDate < todayStr);
            var isUrgent = !isComp && t.dueDate && (t.dueDate <= todayStr);
            var dateBadgeClass = isUrgent ? 'task-date-badge urgent' : 'task-date-badge';
            var dateDisplay = t.dueDate ? t.dueDate.replace(/^\d{4}-/, '').replace('-', '/') : '期日未設定';
            if (isOverdue) dateDisplay += ' 期限切れ';
            var postponeBtn = isOverdue
                ? `<button class="task-postpone-btn" onclick="postponeTask('${t.id}', 1)" title="期日を明日に先送り"><span class="material-symbols-outlined">event_upcoming</span></button>`
                : '';
            var memoIcon = t.memo
                ? `<span class="task-memo-icon" title="${escHtmlAttr(t.memo)}"><i class="bi bi-sticky"></i></span>`
                : '';

            if (STATE.taskViewMode === 'list') {
                // リスト表示（コンパクト1行）
                return `
                    <div class="task-list-item${compClass}">
                        ${taskStatusBtnHtml(t, false)}
                        ${taskPriorityBadgeHtml(t.priority)}
                        <span class="task-list-title">${escHtml(t.content)}</span>
                        ${memoIcon}
                        ${t.resource ? `<span class="task-list-resource"><i class="bi bi-box-seam"></i> ${escHtml(t.resource)}</span>` : ''}
                        <span class="${dateBadgeClass}"><i class="bi bi-calendar-event"></i> ${dateDisplay}</span>
                        ${postponeBtn}
                        <button class="task-edit-btn" onclick="showEditTaskInput('${t.id}')" title="編集"><i class="bi bi-pencil"></i></button>
                        <button class="task-del-btn" onclick="deleteTaskById('${t.id}')" title="削除"><i class="bi bi-trash3"></i></button>
                    </div>
                `;
            } else {
                // カード表示
                return `
                    <div class="task-card${compClass}">
                        <div class="task-checkbox-wrapper">
                            ${taskStatusBtnHtml(t, false)}
                        </div>
                        <div class="task-content-wrapper">
                            <div class="task-title">${taskPriorityBadgeHtml(t.priority)} ${escHtml(t.content)}</div>
                            <div class="task-meta">
                                ${t.resource ? `<div class="task-meta-item"><i class="bi bi-box-seam task-meta-icon"></i> ${escHtml(t.resource)}</div>` : ''}
                                ${t.memo ? `<div class="task-meta-item"><i class="bi bi-sticky task-meta-icon"></i> ${escHtml(t.memo)}</div>` : ''}
                                ${t.source ? `<div class="task-meta-item"><i class="bi bi-journal-text task-meta-icon"></i> ${escHtml(t.source)}</div>` : ''}
                                <div class="task-meta-item mt-1">
                                    <span class="${dateBadgeClass}"><i class="bi bi-calendar-event"></i> ${dateDisplay}</span>
                                </div>
                            </div>
                            <div class="task-actions">
                                ${postponeBtn}
                                <button class="task-edit-btn" onclick="showEditTaskInput('${t.id}')" title="編集"><i class="bi bi-pencil"></i></button>
                                <button class="task-del-btn" onclick="deleteTaskById('${t.id}')" title="削除"><i class="bi bi-trash3"></i></button>
                            </div>
                        </div>
                    </div>
                `;
            }
        }).join('');
    }

    function setTaskViewMode(mode) {
        STATE.taskViewMode = mode;
        document.getElementById('taskViewListBtn').classList.toggle('active', mode === 'list');
        document.getElementById('taskViewCardBtn').classList.toggle('active', mode === 'card');
        renderTaskList();
    }

    function renderWeeklyTaskPanel() {
        var container = document.getElementById('sidebarTaskList');
        if (!container) return;

        if (!STATE.taskDataLoaded || !STATE.weekData || !STATE.weekData.days) {
            container.innerHTML = '<div class="st-empty">タスク読込中...</div>';
            return;
        }

        var endStr = STATE.weekData.days[6].date.replace(/\//g, '-');
        var todayStr = taskTodayStr();
        var countBadge = document.getElementById('sidebarTaskCount');

        var weekTasks = STATE.allTaskData.filter(t => {
            if (t.status === '完了') return false; // 完了済みタスクは非表示
            if (!t.dueDate) return true; // 期限未設定は常に表示
            if (t.dueDate <= endStr) return true; // 当週を含め、過去の未完了は「やるべき」として表示
            return false; // 来週以降のタスクは隠す
        });

        var prioOrder = { '高': 0, '中': 1, '低': 2 };
        weekTasks.sort((a, b) => {
            if (!a.dueDate && b.dueDate) return 1;
            if (a.dueDate && !b.dueDate) return -1;
            if (a.dueDate !== b.dueDate) return String(a.dueDate).localeCompare(String(b.dueDate));
            // 同じ期日なら優先度が高い順
            return (prioOrder[a.priority] !== undefined ? prioOrder[a.priority] : 1) - (prioOrder[b.priority] !== undefined ? prioOrder[b.priority] : 1);
        });

        if (countBadge) {
            countBadge.style.display = weekTasks.length > 0 ? 'inline-flex' : 'none';
            countBadge.textContent = String(weekTasks.length);
        }

        if (weekTasks.length === 0) {
            container.innerHTML = '<div class="st-empty">今週のタスクはありません。</div>';
            return;
        }

        container.innerHTML = weekTasks.map(t => {
            var isComp = (t.status === '完了');
            var isOverdue = !isComp && t.dueDate && t.dueDate < todayStr;
            var cardClass = (isComp ? ' completed' : '') + (isOverdue ? ' overdue' : '');
            var prioClass = t.priority === '高' ? ' prio-high' : (t.priority === '低' ? ' prio-low' : ' prio-mid');
            var dateDisplay = t.dueDate ? t.dueDate.replace(/^\d{4}-/, '').replace('-', '/') : '未設定';
            var statusLabel = t.status === '進行中' ? ' <span class="st-inprogress-label">進行中</span>' : '';
            var overdueLabel = isOverdue ? ' <span class="st-overdue-label">期限切れ</span>' : '';

            return `
                <div class="sidebar-task-card${cardClass}${prioClass}">
                    <div class="st-checkbox-wrapper">
                        ${taskStatusBtnHtml(t, true)}
                    </div>
                    <div class="st-content">
                        <div class="st-title">${escHtml(t.content)}</div>
                        <div class="st-meta">
                            期日: ${dateDisplay}${overdueLabel}${statusLabel}
                        </div>
                    </div>
                </div>
            `;
        }).join('');
    }

    // ===== 個別タスクステータス操作 =====

    /** ステータスを 未着手→進行中→完了→未着手 と循環させる */
    function cycleTaskStatus(taskId) {
        var targetTask = STATE.allTaskData.find(t => t.id === taskId);
        if (!targetTask) return;
        var prevStatus = targetTask.status || '未着手';
        var newStatus = prevStatus === '未着手' ? '進行中' : (prevStatus === '進行中' ? '完了' : '未着手');

        // UI即座反映（楽観的更新）
        targetTask.status = newStatus;
        refreshTaskViews();

        // サーバー通信
        google.script.run
            .withSuccessHandler(function (res) {
                if (!res.success) {
                    showToast('error', 'ステータス更新失敗: ' + (res.error || '不明'));
                    targetTask.status = prevStatus; // ロールバック
                    refreshTaskViews();
                }
            })
            .withFailureHandler(function (e) {
                showToast('error', 'ステータス更新失敗: ' + e.message);
                targetTask.status = prevStatus; // ロールバック
                refreshTaskViews();
            })
            .updateTaskStatusFromWebApp(taskId, newStatus);
    }

    /** 期限切れタスクの期日を今日からN日後へ先送りする */
    function postponeTask(taskId, days) {
        var targetTask = STATE.allTaskData.find(t => t.id === taskId);
        if (!targetTask) return;
        var prevDue = targetTask.dueDate;
        var d = new Date();
        d.setDate(d.getDate() + days);
        var newDue = formatDateLocal(d).replace(/\//g, '-');

        // UI即座反映（楽観的更新）
        targetTask.dueDate = newDue;
        refreshTaskViews();

        google.script.run
            .withSuccessHandler(function (res) {
                if (res.success) {
                    showToast('success', '期日を ' + newDue + ' に先送りしました');
                } else {
                    showToast('error', '期日変更失敗: ' + (res.error || '不明'));
                    targetTask.dueDate = prevDue; // ロールバック
                    refreshTaskViews();
                }
            })
            .withFailureHandler(function (e) {
                showToast('error', '期日変更失敗: ' + e.message);
                targetTask.dueDate = prevDue; // ロールバック
                refreshTaskViews();
            })
            .updateTaskFromWebApp(taskId, { dueDate: newDue });
    }

    async function deleteTaskById(taskId) {
        var result = await Swal.fire({
            title: 'タスク削除',
            text: 'このタスクを削除しますか？ 元に戻せません。',
            icon: 'warning',
            showCancelButton: true,
            confirmButtonText: '削除する',
            cancelButtonText: 'キャンセル',
            confirmButtonColor: '#ea4335'
        });
        if (!result.isConfirmed) return;

        // UI即座反映（一時削除）
        STATE.allTaskData = STATE.allTaskData.filter(t => t.id !== taskId);
        STATE.tasks = STATE.allTaskData;
        refreshTaskViews();

        google.script.run
            .withSuccessHandler(function (res) {
                if (!res.success) {
                    showToast('error', '削除エラー: ' + res.error);
                    loadTasks(); // エラー時は再取得
                }
            })
            .withFailureHandler(function (e) {
                showToast('error', '通信エラー: ' + e.message);
                loadTasks();
            })
            .deleteTaskFromWebApp(taskId);
    }

    // ===== タスク保存の共通処理 =====

    /** タスク配列をサーバーに保存し、成功したらローカルへ差分反映する */
    function saveTasksAndRefresh(tasks, successMsg) {
        showToast('info', '保存中...');
        google.script.run
            .withSuccessHandler(function (res) {
                if (res.success) {
                    showToast('success', successMsg || 'タスクを保存しました');
                    // 差分更新: 返却されたタスクをローカルに追加
                    if (res.savedTasks) {
                        STATE.allTaskData = STATE.allTaskData.concat(res.savedTasks);
                        STATE.tasks = STATE.allTaskData;
                    }
                    refreshTaskViews();
                } else {
                    showToast('error', '追加エラー: ' + res.error);
                }
            })
            .withFailureHandler(e => showToast('error', e.message))
            .saveTasksFromWebApp(tasks);
    }

    // ===== クイック追加 =====
    function quickAddTask() {
        var input = document.getElementById('quickAddTaskInput');
        var content = (input ? input.value : '').trim();
        if (!content) { showToast('error', 'タスク内容を入力してください'); return; }
        var dueEl = document.getElementById('quickAddTaskDue');
        var prioEl = document.getElementById('quickAddTaskPriority');

        saveTasksAndRefresh([{
            content: content,
            resource: '',
            dueDate: dueEl ? dueEl.value : '',
            source: 'クイック追加',
            priority: prioEl ? prioEl.value : '中',
            memo: ''
        }], 'タスクを追加しました');

        input.value = '';
        input.focus();
    }

    /** 追加・編集モーダル共通の優先度セレクトHTML */
    function taskPrioritySelectHtml(id, selected) {
        var sel = selected || '中';
        return `<select id="${id}" class="form-select" style="font-family:inherit;">
            ${['高', '中', '低'].map(p => `<option value="${p}"${p === sel ? ' selected' : ''}>${p}</option>`).join('')}
        </select>`;
    }

    // ===== 手動・強制追加（プレハブ）=====
    async function showManualTaskInput() {
        const { value: formValues } = await Swal.fire({
            title: '手動タスク追加',
            html: `
                <input id="swal-input1" class="swal2-input" placeholder="タスク内容 (必須)" style="width:80%">
                <input id="swal-input2" class="swal2-input" placeholder="準備物・リソース" style="width:80%">
                <div style="text-align:left;width:80%;margin:10px auto; display:flex; gap:12px;">
                    <div style="flex:1;">
                        <label style="font-size:0.8rem;color:var(--text-sub);">期日:</label>
                        <input id="swal-input3" type="date" class="form-control" style="font-family:inherit;">
                    </div>
                    <div>
                        <label style="font-size:0.8rem;color:var(--text-sub);">優先度:</label>
                        ${taskPrioritySelectHtml('swal-input4', '中')}
                    </div>
                </div>
                <div style="text-align:left;width:80%;margin:10px auto;">
                    <label style="font-size:0.8rem;color:var(--text-sub);">メモ:</label>
                    <textarea id="swal-input5" class="form-control" rows="2" style="font-family:inherit;" placeholder="補足メモ（任意）"></textarea>
                </div>
            `,
            focusConfirm: false,
            showCancelButton: true,
            confirmButtonText: '追加',
            cancelButtonText: 'キャンセル',
            preConfirm: () => {
                var content = document.getElementById('swal-input1').value;
                if (!content) { Swal.showValidationMessage('タスク内容は入力必須です'); return false; }
                return {
                    content: content,
                    resource: document.getElementById('swal-input2').value,
                    dueDate: document.getElementById('swal-input3').value,
                    source: '手動追加',
                    priority: document.getElementById('swal-input4').value,
                    memo: document.getElementById('swal-input5').value
                };
            }
        });

        if (formValues) {
            saveTasksAndRefresh([formValues], 'タスクを手動追加しました');
        }
    }

    // ===== タスク編集 =====
    async function showEditTaskInput(taskId) {
        var task = STATE.allTaskData.find(function(t) { return t.id === taskId; });
        if (!task) { showToast('error', '対象タスクが見つかりません'); return; }

        const { value: formValues } = await Swal.fire({
            title: 'タスク編集',
            html: `
                <input id="swal-edit1" class="swal2-input" placeholder="タスク内容 (必須)" style="width:80%" value="${escHtmlAttr(task.content)}">
                <input id="swal-edit2" class="swal2-input" placeholder="準備物・リソース" style="width:80%" value="${escHtmlAttr(task.resource || '')}">
                <div style="text-align:left;width:80%;margin:10px auto; display:flex; gap:12px;">
                    <div style="flex:1;">
                        <label style="font-size:0.8rem;color:var(--text-sub);">期日:</label>
                        <input id="swal-edit3" type="date" class="form-control" style="font-family:inherit;" value="${task.dueDate || ''}">
                    </div>
                    <div>
                        <label style="font-size:0.8rem;color:var(--text-sub);">優先度:</label>
                        ${taskPrioritySelectHtml('swal-edit4', task.priority || '中')}
                    </div>
                </div>
                <div style="text-align:left;width:80%;margin:10px auto;">
                    <label style="font-size:0.8rem;color:var(--text-sub);">メモ:</label>
                    <textarea id="swal-edit5" class="form-control" rows="2" style="font-family:inherit;" placeholder="補足メモ（任意）">${escHtml(task.memo || '')}</textarea>
                </div>
            `,
            focusConfirm: false,
            showCancelButton: true,
            confirmButtonText: '保存',
            cancelButtonText: 'キャンセル',
            preConfirm: () => {
                var content = document.getElementById('swal-edit1').value;
                if (!content) { Swal.showValidationMessage('タスク内容は入力必須です'); return false; }
                return {
                    content: content,
                    resource: document.getElementById('swal-edit2').value,
                    dueDate: document.getElementById('swal-edit3').value,
                    priority: document.getElementById('swal-edit4').value,
                    memo: document.getElementById('swal-edit5').value
                };
            }
        });

        if (formValues) {
            // UI即座反映（楽観的更新）
            task.content = formValues.content;
            task.resource = formValues.resource;
            task.dueDate = formValues.dueDate;
            task.priority = formValues.priority;
            task.memo = formValues.memo;
            refreshTaskViews();

            google.script.run
                .withSuccessHandler(function (res) {
                    if (res.success) {
                        showToast('success', 'タスクを更新しました');
                    } else {
                        showToast('error', '更新エラー: ' + (res.error || '不明'));
                        loadTasks(); // 失敗時はサーバーから再取得
                    }
                })
                .withFailureHandler(function (e) {
                    showToast('error', '通信エラー: ' + e.message);
                    loadTasks();
                })
                .updateTaskFromWebApp(taskId, formValues);
        }
    }

    /** HTML属性値用エスケープ */
    function escHtmlAttr(str) {
        return String(str).replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/'/g, '&#39;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    // ===== AI抽出とプレビュー操作 =====

    /** チェックされた情報源（予定・テキスト・PDF）をまとめてAIに送りタスクを抽出する */
    async function runAiTaskExtraction() {
        var useSchedule = document.getElementById('aiTaskUseSchedule').checked;
        var useText = document.getElementById('aiTaskUseText').checked;
        var usePdf = document.getElementById('aiTaskUsePdf').checked;

        if (!useSchedule && !useText && !usePdf) {
            showToast('error', '情報源を1つ以上選んでください（予定・テキスト・PDF）。');
            return;
        }

        var params = {};

        // 予定
        if (useSchedule) {
            var start = document.getElementById('aiTaskStartDate').value;
            var end = document.getElementById('aiTaskEndDate').value;
            if (!start || !end) {
                showToast('error', '「予定から抽出」の開始日と終了日を指定してください。');
                return;
            }
            if (start > end) {
                showToast('error', '抽出期間の開始日は終了日より前にしてください。');
                return;
            }
            params.scheduleStart = start;
            params.scheduleEnd = end;
        }

        // テキスト
        if (useText) {
            var text = document.getElementById('aiTaskTextInput').value;
            if (!text || text.trim() === '') {
                showToast('error', '「テキストから抽出」に解析するテキストを入力してください。');
                return;
            }
            params.freeText = text.trim();
        }

        // PDF（複数）
        if (usePdf) {
            if (AI_TASK_PDF_FILES.length === 0) {
                showToast('error', '「PDFから抽出」に解析するPDFを追加してください。');
                return;
            }
        }

        showToast('info', 'AI抽出を実行中...（数秒〜十数秒かかります）');
        cancelAiTaskPreview(); // 既存のプレビューをクリア

        try {
            if (usePdf) {
                params.pdfs = [];
                for (var i = 0; i < AI_TASK_PDF_FILES.length; i++) {
                    var item = AI_TASK_PDF_FILES[i];
                    var base64 = await readFileAsBase64_(item.file);
                    params.pdfs.push({ base64: base64, name: item.name });
                }
            }
        } catch (e) {
            showToast('error', 'PDFの読み込みに失敗しました: ' + e.message);
            return;
        }

        google.script.run
            .withSuccessHandler(handleAiExtractionResult)
            .withFailureHandler(handleAiExtractionError)
            .extractTasksCombined_WebApp(params);
    }

    function handleAiExtractionResult(res) {
        if (res.success) {
            // プレビュー編集用に正規化（checked はデフォルトで全てON）
            STATE.aiPreviewTasks = (res.tasks || []).map(function (t) {
                return {
                    checked: true,
                    task: t.task || '',
                    resource: t.resource || '',
                    dueDate: /^\d{4}-\d{2}-\d{2}$/.test(t.dueDate || '') ? t.dueDate : '',
                    source: t.source || '',
                    priority: ['高', '中', '低'].indexOf(t.priority) >= 0 ? t.priority : '中'
                };
            });
            showToast('success', 'AIタスク抽出が完了しました！');
            renderAiTaskPreview();
        } else {
            showToast('error', '抽出エラー: ' + res.error);
        }
    }

    function handleAiExtractionError(e) {
        showToast('error', 'AIサーバとの通信エラー: ' + e.message);
    }

    function renderAiTaskPreview() {
        document.getElementById('aiTaskPreviewArea').style.display = 'block';
        var listEl = document.getElementById('aiTaskPreviewList');
        var toolbarEl = document.getElementById('aiTaskPreviewToolbar');
        listEl.innerHTML = '';

        if (STATE.aiPreviewTasks.length === 0) {
            if (toolbarEl) toolbarEl.style.display = 'none';
            listEl.innerHTML = '<div style="color:var(--text-hint); padding:10px;">抽出されたタスクはありません。</div>';
            updateAiTaskPreviewCount();
            return;
        }
        if (toolbarEl) toolbarEl.style.display = 'flex';

        STATE.aiPreviewTasks.forEach(function (t) {
            listEl.appendChild(buildAiTaskPreviewRow_(t));
        });
        updateAiTaskPreviewCount();
    }

    /** プレビュー1件分の行（チェックボックス＋編集可能な入力欄）を生成する */
    function buildAiTaskPreviewRow_(t) {
        var row = document.createElement('div');
        row.className = 'pdf-preview-item' + (t.checked ? '' : ' excluded');

        var cb = document.createElement('input');
        cb.type = 'checkbox';
        cb.checked = t.checked;
        cb.title = 'チェックを外すと追加されません';
        cb.onchange = function () {
            t.checked = cb.checked;
            row.classList.toggle('excluded', !t.checked);
            updateAiTaskPreviewCount();
        };

        var prioSelect = document.createElement('select');
        prioSelect.title = '優先度';
        ['高', '中', '低'].forEach(function (p) {
            var o = document.createElement('option');
            o.value = p;
            o.textContent = p;
            prioSelect.appendChild(o);
        });
        prioSelect.value = t.priority;
        prioSelect.onchange = function () { t.priority = prioSelect.value; };

        var contentInput = document.createElement('input');
        contentInput.type = 'text';
        contentInput.className = 'pdf-ev-content';
        contentInput.placeholder = 'タスク内容';
        contentInput.title = 'タスク内容';
        contentInput.value = t.task;
        contentInput.oninput = function () { t.task = contentInput.value; };

        var resourceInput = document.createElement('input');
        resourceInput.type = 'text';
        resourceInput.placeholder = '準備物';
        resourceInput.title = '準備物・リソース';
        resourceInput.style.width = '120px';
        resourceInput.value = t.resource;
        resourceInput.oninput = function () { t.resource = resourceInput.value; };

        var dateInput = document.createElement('input');
        dateInput.type = 'date';
        dateInput.title = '期日';
        dateInput.value = t.dueDate;
        dateInput.onchange = function () { t.dueDate = dateInput.value; };

        row.appendChild(cb);
        row.appendChild(prioSelect);
        row.appendChild(contentInput);
        row.appendChild(resourceInput);
        row.appendChild(dateInput);

        if (t.source) {
            var sourceEl = document.createElement('div');
            sourceEl.style.cssText = 'font-size:0.66rem; color:var(--text-hint); flex-basis:100%; padding-left:24px;';
            sourceEl.innerHTML = '<i class="bi bi-journal-text"></i> ';
            sourceEl.appendChild(document.createTextNode('出典: ' + t.source));
            row.appendChild(sourceEl);
        }
        return row;
    }

    function setAllAiTaskPreviewChecked(checked) {
        STATE.aiPreviewTasks.forEach(function (t) { t.checked = checked; });
        renderAiTaskPreview();
    }

    function updateAiTaskPreviewCount() {
        var countEl = document.getElementById('aiTaskPreviewCount');
        var saveBtn = document.getElementById('aiTaskSaveBtn');
        var total = STATE.aiPreviewTasks.length;
        var checked = STATE.aiPreviewTasks.filter(function (t) { return t.checked; }).length;
        if (countEl) countEl.textContent = '追加対象: ' + checked + ' / ' + total + ' 件';
        if (saveBtn) saveBtn.disabled = checked === 0;
    }

    function cancelAiTaskPreview() {
        document.getElementById('aiTaskPreviewArea').style.display = 'none';
        STATE.aiPreviewTasks = [];
    }

    function confirmAiTaskSave() {
        if (!STATE.aiPreviewTasks || STATE.aiPreviewTasks.length === 0) return;

        // チェック済みかつ内容が空でないものだけを保存用フォーマットに変換
        var saveTasks = STATE.aiPreviewTasks
            .filter(function (t) { return t.checked && (t.task || '').trim(); })
            .map(t => ({
                content: t.task.trim(),
                resource: t.resource,
                dueDate: t.dueDate,
                source: t.source,
                priority: t.priority,
                memo: ''
            }));

        if (saveTasks.length === 0) {
            showToast('error', '追加するタスクがありません。チェックと内容を確認してください。');
            return;
        }

        showToast('info', 'タスクリストに保存中...');
        google.script.run
            .withSuccessHandler(function (res) {
                if (res.success) {
                    showToast('success', res.message);
                    cancelAiTaskPreview(); // プレビュークリア
                    // 差分更新: 返却されたタスクをローカルに追加
                    if (res.savedTasks) {
                        STATE.allTaskData = STATE.allTaskData.concat(res.savedTasks);
                        STATE.tasks = STATE.allTaskData;
                    }
                    refreshTaskViews();
                } else {
                    showToast('error', '保存エラー: ' + res.error);
                }
            })
            .withFailureHandler(e => showToast('error', '通信エラー: ' + e.message))
            .saveTasksFromWebApp(saveTasks);
    }

    // ===== リマインダー設定（毎朝メール通知） =====

    function loadTaskReminderSettings() {
        if (STATE.taskReminderLoaded) return;
        var hourSel = document.getElementById('taskReminderHour');
        var chk = document.getElementById('chkTaskReminderEnabled');
        if (!hourSel || !chk) return;

        if (hourSel.options.length === 0) {
            for (var h = 0; h < 24; h++) {
                hourSel.add(new Option(h + '時ごろ', String(h)));
            }
            hourSel.value = '7';
        }

        google.script.run
            .withSuccessHandler(function (res) {
                if (res && res.success) {
                    STATE.taskReminderLoaded = true;
                    chk.checked = res.enabled;
                    hourSel.value = String(res.hour);
                    updateTaskReminderStatusLabel(res.enabled, res.hour);
                }
            })
            .withFailureHandler(function () { /* 読込失敗時はデフォルト表示のまま */ })
            .getTaskReminderSettings();
    }

    function updateTaskReminderStatusLabel(enabled, hour) {
        var label = document.getElementById('taskReminderStatus');
        if (!label) return;
        label.textContent = enabled ? ('現在: 毎日' + hour + '時ごろに送信') : '現在: 無効';
    }

    function saveTaskReminderSettingsUI() {
        var enabled = document.getElementById('chkTaskReminderEnabled').checked;
        var hour = parseInt(document.getElementById('taskReminderHour').value, 10);
        showToast('info', 'リマインダー設定を保存中...');
        google.script.run
            .withSuccessHandler(function (res) {
                if (res.success) {
                    showToast('success', res.message);
                    updateTaskReminderStatusLabel(enabled, hour);
                } else {
                    showToast('error', '保存エラー: ' + res.error);
                }
            })
            .withFailureHandler(e => showToast('error', '通信エラー: ' + e.message))
            .saveTaskReminderSettings(enabled, hour);
    }

    function sendTaskReminderTest() {
        showToast('info', 'テストメールを送信中...');
        google.script.run
            .withSuccessHandler(function (res) {
                if (res.success) {
                    showToast('success', res.message);
                } else {
                    showToast('error', '送信エラー: ' + res.error);
                }
            })
            .withFailureHandler(e => showToast('error', '通信エラー: ' + e.message))
            .sendTaskReminderTestFromWebApp();
    }

</script>
