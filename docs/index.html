<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>週案エディタ - School Plan Note</title>
    <meta name="description" content="小学校教員向けの週案（週間指導計画）・校務支援アプリ">
    <meta name="theme-color" content="#1a73e8">
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
    <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="週案エディタ">
    <script src="config.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            height: 100%;
            overflow: hidden;
            font-family: "Hiragino Kaku Gothic ProN", "Yu Gothic UI", "Meiryo", sans-serif;
            background: #f6f8fb;
        }

        /* ===== アプリ本体 iframe ===== */
        #appFrame {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            border: 0;
            display: none;
        }

        /* ===== ローディング ===== */
        #loading {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            background: #f6f8fb;
            z-index: 10;
        }

        .spinner {
            width: 44px;
            height: 44px;
            border: 4px solid #e8f0fe;
            border-top-color: #1a73e8;
            border-radius: 50%;
            animation: spin .8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        #loading p {
            color: #5f6368;
            font-size: 14px;
        }

        /* ===== 初回セットアップ画面 ===== */
        #setup {
            position: fixed;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 24px;
            background: #f6f8fb;
            z-index: 20;
            overflow-y: auto;
        }

        .setup-card {
            width: 100%;
            max-width: 560px;
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(26, 115, 232, .12);
            padding: 32px;
        }

        .setup-card img {
            width: 64px;
            height: 64px;
            display: block;
            margin: 0 auto 16px;
        }

        .setup-card h1 {
            font-size: 20px;
            text-align: center;
            color: #202124;
            margin-bottom: 8px;
        }

        .setup-card .lead {
            font-size: 13px;
            color: #5f6368;
            text-align: center;
            margin-bottom: 24px;
            line-height: 1.7;
        }

        .setup-card label {
            display: block;
            font-size: 13px;
            font-weight: 700;
            color: #202124;
            margin-bottom: 8px;
        }

        .setup-card input {
            width: 100%;
            padding: 12px 14px;
            font-size: 14px;
            border: 1.5px solid #dadce0;
            border-radius: 8px;
            outline: none;
        }

        .setup-card input:focus {
            border-color: #1a73e8;
            box-shadow: 0 0 0 3px #e8f0fe;
        }

        .setup-error {
            display: none;
            color: #d93025;
            font-size: 12px;
            margin-top: 8px;
            line-height: 1.6;
        }

        .setup-hint {
            font-size: 12px;
            color: #5f6368;
            margin-top: 12px;
            line-height: 1.7;
            background: #f8f9fa;
            border-radius: 8px;
            padding: 12px;
        }

        .btn-primary {
            display: block;
            width: 100%;
            margin-top: 20px;
            padding: 12px;
            font-size: 15px;
            font-weight: 700;
            color: #fff;
            background: #1a73e8;
            border: 0;
            border-radius: 8px;
            cursor: pointer;
        }

        .btn-primary:hover {
            background: #1b66c8;
        }

        /* ===== フローティングメニュー ===== */
        #menuBtn {
            position: fixed;
            left: 12px;
            bottom: 12px;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 0;
            background: rgba(32, 33, 36, .55);
            color: #fff;
            font-size: 18px;
            cursor: pointer;
            z-index: 30;
            opacity: .45;
            transition: opacity .2s;
            display: none;
        }

        #menuBtn:hover {
            opacity: 1;
        }

        #menuPanel {
            position: fixed;
            left: 12px;
            bottom: 60px;
            display: none;
            flex-direction: column;
            gap: 4px;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, .2);
            padding: 8px;
            z-index: 31;
        }

        #menuPanel button,
        #menuPanel a {
            display: block;
            padding: 10px 14px;
            font-size: 13px;
            color: #202124;
            text-align: left;
            text-decoration: none;
            background: none;
            border: 0;
            border-radius: 8px;
            cursor: pointer;
            white-space: nowrap;
        }

        #menuPanel button:hover,
        #menuPanel a:hover {
            background: #f1f3f4;
        }
    </style>
</head>

<body>

    <!-- ローディング -->
    <div id="loading">
        <div class="spinner"></div>
        <p>週案エディタを読み込んでいます…</p>
    </div>

    <!-- 初回セットアップ -->
    <div id="setup">
        <div class="setup-card">
            <img src="icons/icon-192.png" alt="週案エディタ">
            <h1>週案エディタ - School Plan Note</h1>
            <p class="lead">はじめに、Google Apps Script でデプロイした<br>WebアプリのURLを設定してください。</p>
            <label for="urlInput">WebアプリのURL（/exec で終わるもの）</label>
            <input type="url" id="urlInput" placeholder="https://script.google.com/macros/s/…/exec" autocomplete="off">
            <p class="setup-error" id="setupError"></p>
            <div class="setup-hint">
                URLは GAS エディタの「デプロイ」&gt;「デプロイを管理」で確認できます。<br>
                入力したURLはこのブラウザにのみ保存されます。
            </div>
            <button class="btn-primary" id="saveBtn">アプリを起動する</button>
        </div>
    </div>

    <!-- アプリ本体 -->
    <iframe id="appFrame" title="週案エディタ" allow="clipboard-read; clipboard-write; fullscreen"
        allowfullscreen></iframe>

    <!-- フローティングメニュー -->
    <button id="menuBtn" title="メニュー" aria-label="メニュー">⚙</button>
    <div id="menuPanel">
        <button id="reloadBtn">再読み込み</button>
        <a id="newTabLink" href="#" target="_blank" rel="noopener">新しいタブで開く（ログイン用）</a>
        <button id="installBtn" style="display:none;">アプリとしてインストール</button>
        <button id="changeUrlBtn">アプリのURLを変更</button>
    </div>

    <script>
        (function () {
            'use strict';

            var STORAGE_KEY = 'schoolPlanNote.appUrl';
            var loading = document.getElementById('loading');
            var setup = document.getElementById('setup');
            var frame = document.getElementById('appFrame');
            var menuBtn = document.getElementById('menuBtn');
            var menuPanel = document.getElementById('menuPanel');
            var installBtn = document.getElementById('installBtn');
            var deferredPrompt = null;

            // GASのWebアプリURLのみ許可（通常アカウント / Google Workspace ドメイン両対応）
            function isValidGasUrl(url) {
                try {
                    var u = new URL(url);
                    return u.origin === 'https://script.google.com' &&
                        /^\/(a\/macros\/[^/]+|macros)\/s\/[\w-]+\/exec$/.test(u.pathname);
                } catch (e) {
                    return false;
                }
            }

            function getAppUrl() {
                var conf = (window.SCHOOL_PLAN_NOTE_CONFIG || {}).appUrl || '';
                if (isValidGasUrl(conf)) return conf;
                var saved = '';
                try { saved = localStorage.getItem(STORAGE_KEY) || ''; } catch (e) { }
                return isValidGasUrl(saved) ? saved : '';
            }

            function showSetup(message) {
                loading.style.display = 'none';
                frame.style.display = 'none';
                menuBtn.style.display = 'none';
                setup.style.display = 'flex';
                var err = document.getElementById('setupError');
                if (message) {
                    err.textContent = message;
                    err.style.display = 'block';
                } else {
                    err.style.display = 'none';
                }
            }

            function launchApp(url) {
                setup.style.display = 'none';
                loading.style.display = 'flex';
                document.getElementById('newTabLink').href = url;
                frame.src = url;
                frame.addEventListener('load', function () {
                    loading.style.display = 'none';
                    frame.style.display = 'block';
                    menuBtn.style.display = 'block';
                }, { once: true });
                // ログイン画面などiframe内に表示できないケースに備えたフォールバック
                setTimeout(function () {
                    loading.style.display = 'none';
                    frame.style.display = 'block';
                    menuBtn.style.display = 'block';
                }, 20000);
            }

            // --- セットアップ画面 ---
            document.getElementById('saveBtn').addEventListener('click', function () {
                var url = document.getElementById('urlInput').value.trim();
                if (!isValidGasUrl(url)) {
                    showSetup('URLの形式が正しくありません。https://script.google.com/macros/s/～/exec の形式で入力してください。');
                    return;
                }
                try { localStorage.setItem(STORAGE_KEY, url); } catch (e) { }
                launchApp(url);
            });

            // --- フローティングメニュー ---
            menuBtn.addEventListener('click', function (e) {
                e.stopPropagation();
                menuPanel.style.display = menuPanel.style.display === 'flex' ? 'none' : 'flex';
            });
            document.addEventListener('click', function () {
                menuPanel.style.display = 'none';
            });
            menuPanel.addEventListener('click', function (e) {
                e.stopPropagation();
            });
            document.getElementById('reloadBtn').addEventListener('click', function () {
                location.reload();
            });
            document.getElementById('changeUrlBtn').addEventListener('click', function () {
                try { localStorage.removeItem(STORAGE_KEY); } catch (e) { }
                menuPanel.style.display = 'none';
                var current = getAppUrl();
                if (current) {
                    // config.js で固定されている場合は変更できない旨を表示
                    showSetup('接続先URLは config.js で固定されています。変更するには docs/config.js を編集してください。');
                    document.getElementById('urlInput').value = current;
                } else {
                    showSetup();
                }
            });

            // --- インストールボタン（Chromeのbeforeinstallprompt対応）---
            window.addEventListener('beforeinstallprompt', function (e) {
                e.preventDefault();
                deferredPrompt = e;
                installBtn.style.display = 'block';
            });
            installBtn.addEventListener('click', function () {
                if (!deferredPrompt) return;
                deferredPrompt.prompt();
                deferredPrompt = null;
                installBtn.style.display = 'none';
                menuPanel.style.display = 'none';
            });
            window.addEventListener('appinstalled', function () {
                installBtn.style.display = 'none';
            });

            // --- Service Worker 登録 ---
            if ('serviceWorker' in navigator) {
                window.addEventListener('load', function () {
                    navigator.serviceWorker.register('sw.js').catch(function (err) {
                        console.warn('Service Worker registration failed:', err);
                    });
                });
            }

            // --- 起動 ---
            var appUrl = getAppUrl();
            if (appUrl) {
                launchApp(appUrl);
            } else {
                showSetup();
            }
        })();
    </script>
</body>

</html>
