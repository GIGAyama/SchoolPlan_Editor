<script>
    'use strict';
    // ===== 日次振り返り（日報）＆週まとめ（管理職報告） =====

    // 放課後とみなす時刻（この時刻以降にアプリを開くと今日の振り返りモードを自動起動）
    var REFLECTION_AFTERSCHOOL_HOUR = 15;

    /** その日に授業（教科入力）があるかを判定します。 */
    function dayHasLessons(day) {
        return !!(day && day.periods && day.periods.some(function (p) {
            return p && p.subject && String(p.subject).trim() !== '';
        }));
    }

    /** 起動時: 放課後なら今日の振り返りウィザードを自動起動し、未完了バッジを更新します。 */
    function checkAutoReflection() {
        google.script.run
            .withSuccessHandler(function (res) {
                if (!res || !res.success) return;
                updateReflectionBadge(res.pendingCount || 0);
                var isAfterSchool = new Date().getHours() >= REFLECTION_AFTERSCHOOL_HOUR;
                // 未記入（保留でも完了でもない）の場合のみ自動起動する
                if (isAfterSchool && res.hasLessons && res.status === '') {
                    openReflectionWizard(res.today, { auto: true });
                }
            })
            .withFailureHandler(function () { /* 起動時チェックの失敗はアプリ利用を妨げない */ })
            .getTodayReflectionStatus();
    }

    function updateReflectionBadge(count) {
        var badge = document.getElementById('reflectionBadge');
        if (!badge) return;
        badge.textContent = count;
        badge.style.display = count > 0 ? 'inline-flex' : 'none';
    }

    function refreshReflectionBadge() {
        google.script.run
            .withSuccessHandler(function (res) {
                if (res && res.success) updateReflectionBadge(res.pendingCount || 0);
            })
            .withFailureHandler(function () { })
            .getTodayReflectionStatus();
    }

    /** 当日の計画（参照用）のコンパクトHTMLを生成します。 */
    // ===== 音声入力（Web Speech API） =====

    // 音声認識の状態（同時に1つのテキストエリアのみ対象）
    var SPEECH = { rec: null, targetId: null, base: '', finalText: '' };

    /** このブラウザで音声入力が利用できるかを返します（Chrome/Edge等で対応）。 */
    function isSpeechSupported() {
        return !!(window.SpeechRecognition || window.webkitSpeechRecognition);
    }

    /** テキストエリアの下に置くマイクボタンのHTMLを返します（非対応ブラウザでは空文字）。 */
    function speechMicHtml(targetId) {
        if (!isSpeechSupported()) return '';
        return '<div style="text-align:left;margin-top:6px;">'
            + '<button type="button" class="mic-btn" id="micBtn_' + targetId + '" onclick="toggleSpeechInput(\'' + targetId + '\')">'
            + '<span class="material-symbols-outlined" style="font-size:1rem;">mic</span>'
            + '<span class="mic-btn-label">音声入力</span></button></div>';
    }

    /** マイクボタンの表示状態（録音中/待機中）を切り替えます。 */
    function setMicBtnState(targetId, recording) {
        var btn = document.getElementById('micBtn_' + targetId);
        if (!btn) return;
        btn.classList.toggle('recording', recording);
        var label = btn.querySelector('.mic-btn-label');
        if (label) label.textContent = recording ? '認識中...（タップで停止）' : '音声入力';
    }

    /** 音声入力の開始/停止をトグルします。認識結果はテキストエリアの末尾に追記されます。 */
    function toggleSpeechInput(targetId) {
        // 同じ対象で認識中なら停止
        if (SPEECH.rec && SPEECH.targetId === targetId) { stopSpeechInput(); return; }
        stopSpeechInput();

        var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SR) { showToast('error', 'このブラウザは音声入力に対応していません（Chrome推奨）'); return; }
        var ta = document.getElementById(targetId);
        if (!ta) return;

        var rec = new SR();
        rec.lang = 'ja-JP';
        rec.interimResults = true;
        rec.continuous = true;

        SPEECH.rec = rec;
        SPEECH.targetId = targetId;
        // 既存の入力の末尾に追記する（入力済みテキストは保持）
        SPEECH.base = ta.value;
        SPEECH.finalText = '';

        rec.onresult = function (ev) {
            var interim = '';
            for (var i = ev.resultIndex; i < ev.results.length; i++) {
                var r = ev.results[i];
                if (r.isFinal) SPEECH.finalText += r[0].transcript;
                else interim += r[0].transcript;
            }
            var el = document.getElementById(SPEECH.targetId);
            if (el) {
                el.value = SPEECH.base + SPEECH.finalText + interim;
                el.scrollTop = el.scrollHeight;
            }
        };
        rec.onerror = function (ev) {
            if (ev.error === 'not-allowed' || ev.error === 'service-not-allowed') {
                showToast('error', 'マイクの使用が許可されていません。ブラウザのマイク設定を確認してください。');
            } else if (ev.error !== 'aborted' && ev.error !== 'no-speech') {
                showToast('error', '音声認識エラー: ' + ev.error);
            }
            stopSpeechInput();
        };
        rec.onend = function () {
            // 無音などで自動終了した場合もボタン表示を戻す
            if (SPEECH.rec === rec) stopSpeechInput();
        };

        try {
            rec.start();
            setMicBtnState(targetId, true);
        } catch (e) {
            showToast('error', '音声入力を開始できませんでした: ' + e.message);
            stopSpeechInput();
        }
    }

    /** 進行中の音声認識を停止し、ボタン表示を待機状態に戻します。 */
    function stopSpeechInput() {
        var rec = SPEECH.rec;
        var targetId = SPEECH.targetId;
        SPEECH.rec = null;
        SPEECH.targetId = null;
        if (rec) {
            rec.onresult = null;
            rec.onerror = null;
            rec.onend = null;
            try { rec.stop(); } catch (e) { }
        }
        if (targetId) setMicBtnState(targetId, false);
    }

    function buildReflectionPlanHtml(ctx) {
        var rows = '';
        if (ctx.event) {
            rows += '<div style="padding:2px 0;"><span style="color:var(--secondary);font-weight:600;">行事</span> ' + escHtml(ctx.event) + '</div>';
        }
        (ctx.periods || []).forEach(function (p, i) {
            if (!p || !p.subject) return;
            var content = (p.content || '').split('\n')[0];
            if (content.length > 30) content = content.substring(0, 30) + '…';
            rows += '<div style="padding:2px 0;"><span style="font-weight:600;">' + (i + 1) + '校時 [' + escHtml(p.subject) + ']</span> '
                + '<span style="color:var(--text-sub);">' + escHtml(content) + '</span></div>';
        });
        if (!rows) return '';
        return '<div style="text-align:left;font-size:0.75rem;max-height:140px;overflow-y:auto;'
            + 'border:1px solid var(--border);border-radius:6px;padding:6px 10px;background:var(--surface-2);">'
            + '<div style="font-weight:600;font-size:0.72rem;color:var(--text-sub);margin-bottom:2px;">今日の予定（参照）</div>'
            + rows + '</div>';
    }

    /** 質問への回答から日報形式の振り返りテキストを合成します。 */
    function composeReflectionText(a) {
        var lines = [];
        var changes = (a.changes || '').trim();
        lines.push('【実施状況】' + (changes ? '一部変更あり' : '予定どおり実施'));
        if (changes) lines.push('【変更点】' + changes);
        if ((a.seika || '').trim()) lines.push('【成果】' + a.seika.trim());
        if ((a.kadai || '').trim()) lines.push('【課題】' + a.kadai.trim());
        if ((a.tokki || '').trim()) lines.push('【特記】' + a.tokki.trim());
        return lines.join('\n');
    }

    /**
     * 振り返りウィザードを開きます。
     * 既に振り返り本文がある日は編集ビューを、無い日は質問形式のインタビューを表示します。
     * @param {string} dateStr "yyyy/MM/dd"
     * @param {Object} opts { auto: boolean } auto=true は放課後の自動起動（「あとで書く」で保留可能）
     */
    async function openReflectionWizard(dateStr, opts) {
        opts = opts || {};
        var ctx = await new Promise(function (resolve) {
            google.script.run
                .withSuccessHandler(resolve)
                .withFailureHandler(function (e) { resolve({ success: false, error: e.message }); })
                .getReflectionContext(dateStr);
        });
        if (!ctx.success) { showToast('error', '振り返りデータの取得に失敗: ' + ctx.error); return; }
        if (!ctx.hasLessons) { showToast('info', dateStr + ' は授業データがないため振り返りの対象外です'); return; }

        if (ctx.reflection && ctx.reflection.trim()) {
            openReflectionEditor(ctx, opts);
            return;
        }
        runReflectionInterview(ctx, opts);
    }

    /** 既存の振り返りを直接編集するビュー。 */
    async function openReflectionEditor(ctx, opts) {
        var res = await Swal.fire({
            title: ctx.date.slice(5) + '（' + (ctx.dayLabel || '') + '）の振り返り',
            html: buildReflectionPlanHtml(ctx)
                + '<textarea id="reflPreview" class="swal2-textarea" style="width:100%;margin:8px 0 0;min-height:200px;font-size:0.85rem;line-height:1.5;">'
                + escHtml(ctx.reflection) + '</textarea>'
                + speechMicHtml('reflPreview'),
            width: 560,
            confirmButtonText: '保存する',
            confirmButtonColor: '#1a73e8',
            showDenyButton: true,
            denyButtonText: '質問からやり直す',
            denyButtonColor: '#6c757d',
            showCancelButton: true,
            cancelButtonText: '閉じる',
            willClose: function () { stopSpeechInput(); },
            preConfirm: function () { return document.getElementById('reflPreview').value; }
        });
        if (res.isConfirmed) {
            saveReflectionAndFollowUp(ctx.date, res.value, '完了');
        } else if (res.isDenied) {
            runReflectionInterview(ctx, opts);
        }
    }

    /** 質問に順に答えて日報を自動生成するインタビューモード。 */
    async function runReflectionInterview(ctx, opts) {
        var answers = { changes: '', seika: '', kadai: '', tokki: '' };
        var steps = [
            { key: 'changes', title: '予定との変更点はありましたか？', hint: '実施できなかった授業・差し替え・時間変更など。予定どおりなら空欄のまま「次へ」', placeholder: '例: 5校時の理科を学級活動に変更（避難訓練の事前指導のため）', showPlan: true },
            { key: 'seika', title: '今日の成果は？', hint: 'うまくいったこと・子どもたちの良かった姿・手応えのあった指導', placeholder: '例: 算数の割合の導入で、図を使った説明に多くの子が納得していた' },
            { key: 'kadai', title: '今日の課題は？', hint: 'うまくいかなかったこと・明日以降に改善したいこと', placeholder: '例: 実験のグループ活動で時間が不足。次回は事前準備を済ませておく' },
            { key: 'tokki', title: '特記事項はありますか？（任意）', hint: '生徒指導・保護者対応・管理職に伝えたいことなど', placeholder: '例: ○○さんの保護者へ電話連絡済み' }
        ];

        var step = 0;
        while (true) {
            if (step < steps.length) {
                // 質問ステップ
                var s = steps[step];
                var html = '<div style="font-weight:600;text-align:left;margin-bottom:4px;">Q' + (step + 1) + '. ' + escHtml(s.title) + '</div>';
                if (s.showPlan) html += buildReflectionPlanHtml(ctx);
                html += '<div style="text-align:left;font-size:0.78rem;color:var(--text-sub);margin:8px 0 4px;">' + escHtml(s.hint) + '</div>';
                html += '<textarea id="reflAnswer" class="swal2-textarea" style="width:100%;margin:0;min-height:90px;font-size:0.9rem;" placeholder="'
                    + escAttr(s.placeholder) + '">' + escHtml(answers[s.key]) + '</textarea>';
                html += speechMicHtml('reflAnswer');

                var res = await Swal.fire({
                    title: ctx.date.slice(5) + '（' + (ctx.dayLabel || '') + '）の振り返り',
                    html: html,
                    width: 560,
                    progressSteps: ['1', '2', '3', '4'],
                    currentProgressStep: step,
                    confirmButtonText: step === steps.length - 1 ? 'まとめる →' : '次へ →',
                    confirmButtonColor: '#1a73e8',
                    showDenyButton: step > 0,
                    denyButtonText: '← 戻る',
                    denyButtonColor: '#6c757d',
                    showCancelButton: true,
                    cancelButtonText: opts.auto ? 'あとで書く' : '閉じる',
                    allowOutsideClick: false,
                    willClose: (function (key) {
                        return function (popup) {
                            stopSpeechInput();
                            var ta = popup.querySelector('#reflAnswer');
                            if (ta) answers[key] = ta.value;
                        };
                    })(s.key)
                });
                if (res.isConfirmed) { step++; }
                else if (res.isDenied) { step--; }
                else {
                    // あとで書く（自動起動時のみ保留として記録）／閉じる
                    if (opts.auto) deferReflectionRemote(ctx.date);
                    return;
                }
            } else {
                // プレビュー（編集可）＆保存ステップ
                var composed = composeReflectionText(answers);
                var pres = await Swal.fire({
                    title: '振り返りの確認',
                    html: '<div style="text-align:left;font-size:0.78rem;color:var(--text-sub);margin-bottom:4px;">'
                        + '回答から今日の振り返り（日報）を作成しました。編集して保存できます。</div>'
                        + '<textarea id="reflPreview" class="swal2-textarea" style="width:100%;margin:0;min-height:200px;font-size:0.85rem;line-height:1.5;">'
                        + escHtml(composed) + '</textarea>'
                        + speechMicHtml('reflPreview'),
                    width: 560,
                    confirmButtonText: '保存して完了',
                    confirmButtonColor: '#1a73e8',
                    showDenyButton: true,
                    denyButtonText: '← 質問に戻る',
                    denyButtonColor: '#6c757d',
                    showCancelButton: true,
                    cancelButtonText: opts.auto ? 'あとで書く' : '閉じる',
                    allowOutsideClick: false,
                    willClose: function () { stopSpeechInput(); },
                    preConfirm: function () { return document.getElementById('reflPreview').value; }
                });
                if (pres.isConfirmed) {
                    saveReflectionAndFollowUp(ctx.date, pres.value, '完了');
                    return;
                }
                if (pres.isDenied) { step = steps.length - 1; continue; }
                if (opts.auto) deferReflectionRemote(ctx.date);
                return;
            }
        }
    }

    /** 振り返りを「保留（あとで書く）」として記録します。 */
    function deferReflectionRemote(dateStr) {
        google.script.run
            .withSuccessHandler(function (res) {
                if (res && res.success) {
                    showToast('info', '保留にしました。「振り返り」ボタンからいつでも再開できます。');
                    applyReflectionLocal(dateStr, null, '保留');
                }
            })
            .withFailureHandler(function () { })
            .deferReflection(dateStr);
    }

    /**
     * 振り返りを保存し、週の全授業日が完了した場合は自動生成された週まとめを表示します。
     */
    function saveReflectionAndFollowUp(dateStr, text, status) {
        showToast('info', '振り返りを保存しています...');
        google.script.run
            .withSuccessHandler(function (res) {
                if (!res.success) { showToast('error', '保存失敗: ' + res.error); return; }
                showToast('success', '振り返りを保存しました');
                applyReflectionLocal(dateStr, text, status);
                refreshReflectionBadge();

                if (!res.weekComplete) return;
                if (res.summaryGenerated) {
                    if (STATE.weekData && res.mondayStr === STATE.mondayStr) STATE.weekData.weekSummary = res.summary;
                    showWeeklySummaryModal(res.mondayStr, res.summary, true);
                } else if (res.summaryError) {
                    Swal.fire({
                        icon: 'warning',
                        title: '週の振り返りがすべて完了しました',
                        html: '週まとめ（報告）の自動生成に失敗しました。<br><span style="font-size:0.8rem;color:var(--text-sub);">'
                            + escHtml(res.summaryError) + '</span><br>「振り返り」ボタンからいつでも再生成できます。'
                    });
                } else if (res.summary) {
                    showToast('info', 'この週の振り返りがすべて完了しました（作成済みの週まとめを保持しています）');
                }
            })
            .withFailureHandler(function (e) { showToast('error', '通信エラー: ' + e.message); })
            .saveDailyReflection(dateStr, text, status);
    }

    /** 表示中の週のローカル状態（グリッドのチップ表示）を更新します。 */
    function applyReflectionLocal(dateStr, text, status) {
        if (!STATE.weekData || !STATE.weekData.days) return;
        var hit = false;
        STATE.weekData.days.forEach(function (d) {
            if (d.date !== dateStr) return;
            if (text !== null && text !== undefined) d.reflection = text;
            d.reflectionStatus = status;
            hit = true;
        });
        // 編集モード中の再描画は入力内容を壊すため行わない（次回描画時に反映される）
        if (hit && !STATE.editMode) renderWeekGrid(STATE.weekData.days);
    }

    /** 表示中の週の振り返り進捗（授業日数と完了数）をローカルデータから算出します。 */
    function computeLocalWeekProgress() {
        var total = 0, done = 0;
        if (STATE.weekData && STATE.weekData.days) {
            STATE.weekData.days.forEach(function (d) {
                if (!dayHasLessons(d)) return;
                total++;
                if (d.reflectionStatus === '完了') done++;
            });
        }
        return { total: total, done: done };
    }

    /** 振り返りハブ: 保留・未記入の一覧と、表示中の週の週まとめ操作。 */
    function openReflectionHub() {
        google.script.run
            .withSuccessHandler(function (res) {
                if (!res.success) { showToast('error', '一覧の取得に失敗: ' + res.error); return; }
                renderReflectionHub(res.list || []);
            })
            .withFailureHandler(function (e) { showToast('error', '通信エラー: ' + e.message); })
            .getPendingReflections();
    }

    function renderReflectionHub(pendingList) {
        updateReflectionBadge(pendingList.length);
        var todayStr = formatDateLocal(new Date());
        var html = '<div style="text-align:left;">';

        html += '<div style="font-weight:600;font-size:0.85rem;margin-bottom:6px;">未記入・保留中の振り返り（' + pendingList.length + '件）</div>';
        if (pendingList.length === 0) {
            html += '<div style="font-size:0.82rem;color:var(--text-sub);padding:10px;border:1px dashed var(--border);border-radius:6px;text-align:center;">未完了の振り返りはありません 🎉</div>';
        } else {
            html += '<div style="max-height:220px;overflow-y:auto;border:1px solid var(--border);border-radius:6px;">';
            pendingList.forEach(function (item) {
                var stChip = item.status === '保留'
                    ? '<span class="refl-hub-status hold">保留</span>'
                    : '<span class="refl-hub-status todo">未記入</span>';
                var isToday = item.date === todayStr;
                var detail = item.event ? ('行事: ' + item.event) : item.subjects;
                html += '<div class="refl-hub-item" data-date="' + escAttr(item.date) + '">'
                    + '<div style="flex:1;min-width:0;">'
                    + '<div style="font-weight:600;font-size:0.85rem;">' + escHtml(item.date.slice(5)) + '（' + escHtml(item.dayLabel || '') + '）'
                    + (isToday ? ' <span style="color:var(--primary);font-size:0.72rem;">今日</span>' : '') + '</div>'
                    + '<div style="font-size:0.72rem;color:var(--text-sub);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">' + escHtml(detail || '') + '</div>'
                    + '</div>' + stChip + '</div>';
            });
            html += '</div>';
        }

        var ws = (STATE.weekData && STATE.weekData.weekSummary) ? STATE.weekData.weekSummary : '';
        var progress = computeLocalWeekProgress();
        html += '<hr style="margin:12px 0;">';
        html += '<div style="font-weight:600;font-size:0.85rem;margin-bottom:6px;">表示中の週の報告（週まとめ）</div>';
        html += '<div style="font-size:0.78rem;color:var(--text-sub);margin-bottom:8px;">振り返り ' + progress.done + '/' + progress.total + ' 日完了 ／ 週まとめ: '
            + (ws ? '<span style="color:var(--secondary);font-weight:600;">作成済み</span>' : '未作成') + '</div>';
        html += '<button type="button" class="btn btn-outline btn-sm" id="reflHubSummaryBtn" style="width:100%;">'
            + (ws ? '週まとめを表示・編集する' : 'AIで週まとめを作成する') + '</button>';
        html += '</div>';

        Swal.fire({
            title: '振り返りと週報',
            html: html,
            width: 520,
            showConfirmButton: false,
            showCancelButton: true,
            cancelButtonText: '閉じる',
            didOpen: function () {
                var c = Swal.getHtmlContainer();
                c.querySelectorAll('.refl-hub-item').forEach(function (el) {
                    el.addEventListener('click', function () {
                        var date = el.getAttribute('data-date');
                        Swal.close();
                        openReflectionWizard(date, {});
                    });
                });
                var sbtn = c.querySelector('#reflHubSummaryBtn');
                if (sbtn) sbtn.addEventListener('click', function () {
                    Swal.close();
                    var mondayStr = STATE.mondayStr;
                    var wsNow = (STATE.weekData && STATE.weekData.weekSummary) ? STATE.weekData.weekSummary : '';
                    if (wsNow) showWeeklySummaryModal(mondayStr, wsNow, false);
                    else regenerateWeeklySummary(mondayStr, false);
                });
            }
        });
    }

    /** 週まとめの表示・編集モーダル。 */
    async function showWeeklySummaryModal(mondayStr, summary, generatedNow) {
        var res = await Swal.fire({
            icon: generatedNow ? 'success' : undefined,
            title: generatedNow ? '週の報告が完成しました' : '週のまとめ（報告）',
            html: '<div style="text-align:left;font-size:0.78rem;color:var(--text-sub);margin-bottom:4px;">'
                + escHtml(mondayStr) + ' の週 — 編集して保存できます。週案の印刷時は標準ではフリースペース（時数表と検印欄の間）、コンパクトでは週案表の下に掲載されます。</div>'
                + '<textarea id="weekSummaryEdit" class="swal2-textarea" style="width:100%;margin:0;min-height:220px;font-size:0.85rem;line-height:1.6;">'
                + escHtml(summary) + '</textarea>',
            width: 600,
            confirmButtonText: '保存する',
            confirmButtonColor: '#1a73e8',
            showDenyButton: true,
            denyButtonText: 'AIで再生成',
            denyButtonColor: '#1aa260',
            showCancelButton: true,
            cancelButtonText: '閉じる',
            preConfirm: function () { return document.getElementById('weekSummaryEdit').value; }
        });
        if (res.isConfirmed) {
            google.script.run
                .withSuccessHandler(function (r) {
                    if (r.success) {
                        showToast('success', '週まとめを保存しました');
                        if (STATE.weekData && mondayStr === STATE.mondayStr) STATE.weekData.weekSummary = res.value;
                    } else {
                        showToast('error', '保存失敗: ' + r.error);
                    }
                })
                .withFailureHandler(function (e) { showToast('error', '通信エラー: ' + e.message); })
                .saveWeeklySummary(mondayStr, res.value);
        } else if (res.isDenied) {
            regenerateWeeklySummary(mondayStr, true);
        }
    }

    /** 週まとめのAI生成（再生成）。振り返りが未完了の場合は確認のうえ force で生成します。 */
    function regenerateWeeklySummary(mondayStr, force) {
        showToast('info', 'AIが週まとめを作成しています...');
        google.script.run
            .withSuccessHandler(function (res) {
                if (res.success) {
                    if (STATE.weekData && mondayStr === STATE.mondayStr) STATE.weekData.weekSummary = res.summary;
                    showWeeklySummaryModal(mondayStr, res.summary, true);
                } else if (res.incomplete) {
                    Swal.fire({
                        icon: 'question',
                        title: '振り返りが未完了です',
                        html: escHtml(res.error) + '<br>現時点の内容で週まとめを作成しますか？',
                        showCancelButton: true,
                        confirmButtonText: 'この内容で作成',
                        cancelButtonText: 'やめる'
                    }).then(function (r) {
                        if (r.isConfirmed) regenerateWeeklySummary(mondayStr, true);
                    });
                } else {
                    showToast('error', '週まとめの生成に失敗: ' + res.error);
                }
            })
            .withFailureHandler(function (e) { showToast('error', '通信エラー: ' + e.message); })
            .generateWeeklySummary(mondayStr, !!force);
    }

</script>
