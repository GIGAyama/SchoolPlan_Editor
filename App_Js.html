    // ===== ユーティリティ =====
    function formatDateLocal(date) {
        var y = date.getFullYear();
        var m = String(date.getMonth() + 1).padStart(2, '0');
        var d = String(date.getDate()).padStart(2, '0');
        return y + '/' + m + '/' + d;
    }
    function escHtml(str) {
        if (!str) return '';
        return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }
    function escAttr(str) {
        if (!str) return '';
        return String(str).replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }

    // ===== トースト (SweetAlert2 Toast) =====
    var SwalToast = Swal.mixin({
        toast: true,
        position: 'top-end',
        showConfirmButton: false,
        timer: 3500,
        timerProgressBar: true,
        didOpen: function (toast) {
            toast.addEventListener('mouseenter', Swal.stopTimer);
            toast.addEventListener('mouseleave', Swal.resumeTimer);
        }
    });

    function showToast(type, message) {
        var iconMap = { success: 'success', error: 'error', info: 'info' };
        SwalToast.fire({
            icon: iconMap[type] || 'info',
            title: message
        });
    }

    // ===== 固定時間割エディタ =====
    var DAY_NAMES = ['月', '火', '水', '木', '金'];
    var timetableLoaded = false;

    function loadTimetableEditor() {
        google.script.run
            .withSuccessHandler(function (res) {
                if (res.success) {
                    renderTimetableEditor(res.data);
                    timetableLoaded = true;
                } else {
                    showToast('error', 'エラー: ' + (res.error || ''));
                }
            })
            .withFailureHandler(function (e) {
                showToast('error', '通信エラー: ' + e.message);
            })
            .getTimetableForEditor();
    }

    function renderTimetableEditor(data) {
        var tbody = document.getElementById('timetableBody');
        tbody.innerHTML = '';
        data.forEach(function (dayData, dayIndex) {
            var tr = document.createElement('tr');
            // 曜日ラベル
            var tdLabel = document.createElement('td');
            tdLabel.textContent = DAY_NAMES[dayIndex];
            tr.appendChild(tdLabel);
            // 時程
            tr.appendChild(makeEditorCell('tt_' + dayIndex + '_time', dayData.time || ''));
            // 朝学習
            tr.appendChild(makeEditorCell('tt_' + dayIndex + '_morning', dayData.morning || ''));
            // 1〜6校時
            for (var p = 0; p < 6; p++) {
                tr.appendChild(makeEditorCell('tt_' + dayIndex + '_p' + p, (dayData.periods && dayData.periods[p]) || ''));
            }
            tbody.appendChild(tr);
        });
    }

    function makeEditorCell(id, value) {
        var td = document.createElement('td');
        var input = document.createElement('input');
        input.type = 'text';
        input.id = id;
        input.value = value;
        td.appendChild(input);
        return td;
    }

    function gatherTimetableData() {
        var data = [];
        for (var d = 0; d < 5; d++) {
            var periods = [];
            for (var p = 0; p < 6; p++) {
                var el = document.getElementById('tt_' + d + '_p' + p);
                periods.push(el ? el.value : '');
            }
            data.push({
                day: d,
                time: (document.getElementById('tt_' + d + '_time') || {}).value || '',
                morning: (document.getElementById('tt_' + d + '_morning') || {}).value || '',
                periods: periods
            });
        }
        return data;
    }

    function saveTimetable() {
        var data = gatherTimetableData();
        showToast('info', '保存中...');
        google.script.run
            .withSuccessHandler(function (res) {
                if (res.success) {

    function renderTaskList() {
        var container = document.getElementById('taskListContainer');
        var showCompleted = document.getElementById('chkShowCompletedTasks').checked;

        var filtered = allTaskData;
        if (!showCompleted) {
            filtered = allTaskData.filter(t => t.status !== '完了');
        }

        // 期日でソート（未設定は後回し）
        filtered.sort((a, b) => {
            if (!a.dueDate) return 1;
            if (!b.dueDate) return -1;
            return a.dueDate.localeCompare(b.dueDate);
        });

        if (filtered.length === 0) {
            container.innerHTML = '<div style="grid-column: 1 / -1; text-align: center; padding: 40px 20px; background: var(--surface-2); border-radius: 8px; border: 1px dashed var(--border); color: var(--text-hint);">現在登録されているタスクはありません。🎉</div>';
            return;
        }

        var todayStr = formatDateLocal(new Date());

        container.innerHTML = filtered.map(t => {
            var isComp = (t.status === '完了');
            var compClass = isComp ? ' completed' : '';
            var isUrgent = !isComp && t.dueDate && (t.dueDate <= todayStr);
            var dateBadgeClass = isUrgent ? 'task-date-badge urgent' : 'task-date-badge';
            var dateDisplay = t.dueDate ? t.dueDate.replace('2026-', '').replace('-', '/') : '期日未設定';
            var checkedStr = isComp ? 'checked' : '';

            return `
                <div class="task-card${compClass}">
                    <div class="task-checkbox-wrapper">
                        <input type="checkbox" ${checkedStr} onchange="toggleTaskStatus('${t.id}', this.checked)">
                    </div>
                    <div class="task-content-wrapper">
                        <div class="task-title">${escHtml(t.content)}</div>
                        <div class="task-meta">
                            ${t.resource ? `<div class="task-meta-item"><i class="bi bi-box-seam task-meta-icon"></i> ${escHtml(t.resource)}</div>` : ''}
                            ${t.source ? `<div class="task-meta-item"><i class="bi bi-journal-text task-meta-icon"></i> ${escHtml(t.source)}</div>` : ''}
                            <div class="task-meta-item mt-1">
                                <span class="${dateBadgeClass}"><i class="bi bi-calendar-event"></i> ${dateDisplay}</span>
                            </div>
                        </div>
                        <div class="task-actions">
                            <button class="task-del-btn" onclick="deleteTaskById('${t.id}')" title="プレビュー/削除"><i class="bi bi-trash3"></i></button>
                        </div>
                    </div>
                </div>
            `;
        }).join('');
    }

    function renderWeeklyTaskPanel() {
        var container = document.getElementById('sidebarTaskList');
        if (!container) return;

        if (!taskDataLoaded || !STATE.weekData || !STATE.weekData.days) {
            container.innerHTML = '<div class="st-empty">タスク読込中...</div>';
            return;
        }

        var startStr = STATE.weekData.days[0].date.replace(/\//g, '-');
        var endStr = STATE.weekData.days[6].date.replace(/\//g, '-');

        var weekTasks = allTaskData.filter(t => {
            if (t.status === '完了') {
                return t.dueDate >= startStr && t.dueDate <= endStr;
            } else {
                if (!t.dueDate) return true; // 期限未設定は常に表示
                if (t.dueDate <= endStr) return true; // 当週を含め、過去の未完了は「やるべき」として表示
                return false; // 来週以降のタスクは隠す
            }
        });

        weekTasks.sort((a, b) => {
            if (!a.dueDate) return 1;
            if (!b.dueDate) return -1;
            return a.dueDate.localeCompare(b.dueDate);
        });

        if (weekTasks.length === 0) {
            container.innerHTML = '<div class="st-empty">今週のタスクはありません🎉</div>';
            return;
        }

        container.innerHTML = weekTasks.map(t => {
            var isComp = (t.status === '完了');
            var compClass = isComp ? ' completed' : '';
            var checkedStr = isComp ? 'checked' : '';
            var dateDisplay = t.dueDate ? t.dueDate.replace('2026-', '').replace('-', '/') : '未設定';

            return `
                <div class="sidebar-task-card${compClass}">
                    <div class="st-checkbox-wrapper">
                        <input type="checkbox" ${checkedStr} onchange="toggleTaskStatus('${t.id}', this.checked)">
                    </div>
                    <div class="st-content">
                        <div class="st-title">${escHtml(t.content)}</div>
                        <div class="st-meta">
                            期日: ${dateDisplay}
                        </div>
                    </div>
                </div>
            `;
        }).join('');
    }

                showToast('error', 'ステータス更新失敗: ' + e.message);
                if (targetTask) targetTask.status = isCompleted ? '未着手' : '完了'; // ロールバック
                if (document.getElementById('taskListContainer')) renderTaskList();
                if (document.getElementById('sidebarTaskList')) renderWeeklyTaskPanel();
            })
            .updateTaskStatusFromWebApp(taskId, newStatus);
    }

                .extractTasksFromSchedule_WebApp(start, end);
        } else if (mode === 'text') {
            var text = document.getElementById('aiTaskTextInput').value;
            if (!text || text.trim() === '') {
                showToast('error', '解析するテキストを入力またはペーストしてください。');
                return;
            }
            google.script.run
                .withSuccessHandler(handleAiExtractionResult)
                .withFailureHandler(handleAiExtractionError)
                .extractTasksFromText_WebApp(text);
        }
    }

    function handleAiExtractionResult(res) {
        if (res.success) {
            aiPreviewTasks = res.tasks || [];
            showToast('success', 'AIタスク抽出が完了しました！');
            renderAiTaskPreview();
        } else {
            showToast('error', '抽出エラー: ' + res.error);
        }
    }

    function handleAiExtractionError(e) {
        showToast('error', 'AIサーバとの通信エラー: ' + e.message);
    }

    function renderAiTaskPreview() {
        document.getElementById('aiTaskPreviewArea').style.display = 'block';
        var listEl = document.getElementById('aiTaskPreviewList');

        if (aiPreviewTasks.length === 0) {
            listEl.innerHTML = '<div style="color:var(--text-hint);">抽出されたタスクはありません。</div>';
            return;
        }

        listEl.innerHTML = aiPreviewTasks.map((t, idx) => `
            <div style="background:var(--surface); border:1px solid #1a73e8; border-radius:6px; padding:10px; margin-bottom:8px; font-size:0.85rem;">
                <div style="font-weight:bold; color:var(--text-main); margin-bottom:4px;"><span class="material-symbols-outlined fs-6">task_alt</span> ${escHtml(t.task)}</div>
                <div style="color:var(--text-sub); display:flex; gap:10px;">
                    <span><i class="bi bi-box-seam"></i> ${escHtml(t.resource || '設定なし')}</span>
                    <span><i class="bi bi-calendar-event"></i> ${t.dueDate || '未設定'}</span>
                    <span><i class="bi bi-journal-text"></i> ${escHtml(t.source || '不明')}</span>
                </div>
            </div>
        `).join('');
    }

    function cancelAiTaskPreview() {
        document.getElementById('aiTaskPreviewArea').style.display = 'none';
        aiPreviewTasks = [];
    }

    function confirmAiTaskSave() {
        if (!aiPreviewTasks || aiPreviewTasks.length === 0) return;

        // 保存用フォーマットに変換
        var saveTasks = aiPreviewTasks.map(t => ({
            content: t.task,
            resource: t.resource,
            dueDate: t.dueDate,
            source: t.source
        }));

        showToast('info', 'タスクリストに保存中...');
        google.script.run
            .withSuccessHandler(function (res) {
                if (res.success) {
                    showToast('success', res.message);
                    cancelAiTaskPreview(); // プレビュークリア
                    loadTasks();          // 一覧リロード
                } else {
                    showToast('error', '保存エラー: ' + res.error);
                }
            })
            .withFailureHandler(e => showToast('error', '通信エラー: ' + e.message))
            .saveTasksFromWebApp(saveTasks);
    }

</script>
