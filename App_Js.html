            }).then(function (result) {
                if (!result.isConfirmed) return;
                NW.pushHistory();
                var newVal = result.value;
                if (newVal === origVal) {
                    delete block.cellOverrides[overKey];
                } else {
                    block.cellOverrides[overKey] = newVal;
                }
                var el = document.querySelector('[data-block-id="' + id + '"] .nw-schedule-block');
                if (el) el.innerHTML = NW.renderScheduleHTML(block);
            });
        }
    };

    // ---- Image upload (FileReader → base64) ----
    NW.uploadImage = function (blockId) {
        var input = document.createElement('input');
        input.type = 'file';
        input.accept = 'image/*';
        input.onchange = function (e) {
            var file = e.target.files[0];
            if (!file) return;
            var reader = new FileReader();
            reader.onload = function (evt) {
                var block = NW.blocks.find(function (b) { return b.id === blockId; });
                if (block) { block.src = evt.target.result; NW.render(); }
            };
            reader.readAsDataURL(file);
        };
        input.click();
    };

    // ---- Gallery image management ----
    NW.addGalleryImage = function (blockId) {
        var input = document.createElement('input');
        input.type = 'file';
        input.accept = 'image/*';
        input.multiple = true;
        input.onchange = function (e) {
            var files = Array.from(e.target.files);
            var block = NW.blocks.find(function (b) { return b.id === blockId; });
            if (!block) return;
            var loaded = 0;
            files.forEach(function (file) {
                var reader = new FileReader();
                reader.onload = function (evt) {
                    block.images.push({ src: evt.target.result, caption: '' });
                    loaded++;
                    if (loaded === files.length) NW.render();
                };
                reader.readAsDataURL(file);
            });
        };
        input.click();
    };

    NW.removeGalleryImage = function (blockId, index) {
        var block = NW.blocks.find(function (b) { return b.id === blockId; });
        if (!block) return;
        block.images.splice(index, 1);
        NW.render();
    };

    NW.setGalleryColumns = function (id, cols) {
        var block = NW.blocks.find(function (b) { return b.id === id; });
        if (!block) return;
        block.columns = parseInt(cols, 10);
        var el = document.querySelector('[data-block-id="' + id + '"] .nw-gallery-grid');
        if (el) el.style.gridTemplateColumns = 'repeat(' + block.columns + ', 1fr)';
    };

    // ---- Columns block management ----
    NW.setColumnsCount = function (id, count) {
        var block = NW.blocks.find(function (b) { return b.id === id; });
        if (!block || block.type !== 'columns') return;
        NW.saveEditable();
        NW.pushHistory();
        block.columns = parseInt(count, 10);
        while (block.colData.length < block.columns) {
            block.colData.push({ content: '', src: '', caption: '' });
        }
        if (block.columns < 3 && block.colRatio && block.colRatio !== 'equal') {
            // Keep ratio for 2 columns, reset for others
        }
        NW.render();
    };

    NW.setColRatio = function (id, ratio) {
        var block = NW.blocks.find(function (b) { return b.id === id; });
        if (!block || block.type !== 'columns') return;
        NW.saveEditable();
        block.colRatio = ratio;
        NW.render();
    };

    NW.uploadColumnImage = function (blockId, colIndex) {
        var input = document.createElement('input');
        input.type = 'file';
        input.accept = 'image/*';
        input.onchange = function (e) {
            var file = e.target.files[0];
            if (!file) return;
            var reader = new FileReader();
            reader.onload = function (evt) {
                var block = NW.blocks.find(function (b) { return b.id === blockId; });
                if (block && block.colData[colIndex]) {
                    block.colData[colIndex].src = evt.target.result;
                    NW.render();
                }
            };
            reader.readAsDataURL(file);
        };
        input.click();
    };

    // ---- WordArt editor (エフェクト自由組み合わせ式) ----
    // エフェクト適用ヘルパー
    NW._applyWordArtFx = function (el, b) {
        var shadows = [];
        // グラデーション
        if (b.waGradient) {
            var grad = 'linear-gradient(' + (b.waGradAngle || 135) + 'deg,' + (b.waGradC1 || '#ff0000') + (b.waGradExtra || '') + ',' + (b.waGradC2 || '#0000ff') + ')';
            el.style.background = grad;
            el.style.webkitBackgroundClip = 'text';
            el.style.backgroundClip = 'text';
            el.style.webkitTextFillColor = 'transparent';
            el.style.color = 'transparent';
        } else if (b.waStroke && !b.waGradient) {
            // アウトラインのみの場合、塗りを透明に
            el.style.webkitTextFillColor = 'transparent';
            el.style.color = 'transparent';
        } else {
            el.style.color = b.waColor || '#202124';
        }
        // アウトライン
        if (b.waStroke) {
            el.style.webkitTextStroke = (b.waStrokeWidth || 3) + 'px ' + (b.waStrokeColor || '#1a73e8');
        }
        // 3D立体 (積み重ねtext-shadow)
        if (b.wa3d) {
            var d3c = b.wa3dColor || '#c0392b';
            for (var d = 1; d <= (b.wa3dDepth || 5); d++) {
                shadows.push(d + 'px ' + d + 'px 0 ' + d3c);
            }
            shadows.push((b.wa3dDepth || 5) + 1 + 'px ' + ((b.wa3dDepth || 5) + 1) + 'px 10px rgba(0,0,0,0.3)');
        }
        // 影
        if (b.waShadow) {
            shadows.push((b.waShadowX || 3) + 'px ' + (b.waShadowY || 3) + 'px ' + (b.waShadowBlur || 6) + 'px ' + (b.waShadowColor || '#888888'));
        }
        if (shadows.length) el.style.textShadow = shadows.join(',');
    };

    // ツールバー: プロパティ設定
    NW.waSet = function (id, prop, value) {
        var block = NW.blocks.find(function (b) { return b.id === id; });
        if (!block) return;
        if (prop === 'fontSize') value = parseInt(value, 10);
        block[prop] = value;
        NW.render();
    };

    // ツールバー: エフェクトON/OFFトグル
    NW.waToggle = function (id, prop) {
        var block = NW.blocks.find(function (b) { return b.id === id; });
        if (!block) return;
        NW.pushHistory();
        block[prop] = !block[prop];
        NW.render();
    };

            title: 'ワードアートのテキスト',

    NW.saveAsTemplate = function () {
        NW.saveEditable();
        if (NW.blocks.length === 0) { showToast('error', 'ブロックがありません'); return; }
        Swal.fire({
            title: 'テンプレートとして保存',
            input: 'text',

            showCancelButton: true,
            confirmButtonText: '保存',
            cancelButtonText: 'キャンセル'
        }).then(function (result) {
            if (!result.isConfirmed || !result.value) return;
            // Strip content but keep structure
            var tplBlocks = JSON.parse(JSON.stringify(NW.blocks));
            tplBlocks.forEach(function (b) {
                if (b.type === 'heading') b.content = b.content.replace(/<[^>]*>/g, '').trim() ? b.content : '見出し';
                if (b.type === 'text') b.content = '';
                if (b.type === 'image') { b.src = ''; b.wrapText = ''; b.caption = ''; }
                if (b.type === 'gallery') { b.images = []; }
                if (b.type === 'schedule') { b.weekData = null; }
                if (b.type === 'qrcode') { b.url = ''; b.label = ''; }
                if (b.type === 'columns') {
                    b.colData = b.colData.map(function () { return { content: '', src: '', caption: '' }; });
                }
            });
            var templates = JSON.parse(localStorage.getItem('nw_templates') || '[]');
            templates.push({ name: result.value, blocks: tplBlocks, createdAt: new Date().toISOString() });
            localStorage.setItem('nw_templates', JSON.stringify(templates));
            showToast('success', 'テンプレート「' + result.value + '」を保存しました');
        });

    // ---- localStorage auto-save / restore ----
    NW.autoSave = function () {
        clearTimeout(NW._saveTimer);
        NW._saveTimer = setTimeout(function () {
            try {
                var data = { blocks: NW.blocks, nextId: NW.nextId, mondayStr: NW.mondayStr };
                localStorage.setItem('nw_autosave', JSON.stringify(data));
            } catch (e) {
                // Quota exceeded - try without base64 images
                try {
                    var stripped = JSON.parse(JSON.stringify(NW.blocks));
                    stripped.forEach(function (b) {
                        if (b.src && b.src.length > 1000) b.src = '';
                        if (b.images) b.images.forEach(function (img) {
                            if (img.src && img.src.length > 1000) img.src = '';
                        });
                    });
                    localStorage.setItem('nw_autosave', JSON.stringify({
                        blocks: stripped, nextId: NW.nextId, mondayStr: NW.mondayStr
                    }));
                } catch (ignore) { }
            }
        }, 800);
    };

    NW.autoRestore = function () {
        try {
            var saved = localStorage.getItem('nw_autosave');
            if (!saved) return false;
            var data = JSON.parse(saved);
            if (data.blocks && data.blocks.length > 0) {
                NW.blocks = data.blocks;
                NW.nextId = data.nextId || 1;
                if (data.mondayStr) {
                    NW.mondayStr = data.mondayStr;
                    document.getElementById('nwWeekLabel').textContent = NW.mondayStr + '週';
                }
                NW.render();
                return true;
            }
        } catch (e) { }
        return false;
    };

            inputValue: defaultTitle,
            showCancelButton: true,
            confirmButtonText: '保存',
            cancelButtonText: 'キャンセル'
        }).then(function (result) {
            if (!result.isConfirmed) return;
            showToast('info', '保存中...');
            var jsonStr = JSON.stringify({
                blocks: NW.blocks,
                nextId: NW.nextId,
                mondayStr: NW.mondayStr,
                scheduleData: NW.scheduleData
            });
            google.script.run
                .withSuccessHandler(function (res) {
                    if (!res) { showToast('error', '保存失敗: サーバーから応答がありません'); return; }
                    if (res.success) showToast('success', res.message);
                    else showToast('error', '保存失敗: ' + res.error);
                })
                .withFailureHandler(_onCommError)
                .saveNewsletterData(result.value || defaultTitle, NW.mondayStr || '', jsonStr);
        });
    };

    NW.openFromSheet = function () {
        showToast('info', '保存済み一覧を読み込み中...');
        google.script.run
            .withSuccessHandler(function (res) {
                if (!res) { showToast('error', 'データ取得に失敗しました'); return; }
                if (!res.success) { showToast('error', '取得失敗: ' + res.error); return; }
                if (!res.list || res.list.length === 0) { showToast('info', '保存済みの学級通信はありません'); return; }
                var html = '<div style="max-height:400px;overflow-y:auto;">';
                html += '<table style="width:100%;border-collapse:collapse;font-size:0.85rem;">';
                html += '<thead><tr style="border-bottom:2px solid #dadce0;"><th style="text-align:left;padding:8px;">タイトル</th><th style="padding:8px;">対象週</th><th style="padding:8px;">保存日時</th><th style="padding:8px;">操作</th></tr></thead><tbody>';
                res.list.forEach(function (item) {
                    html += '<tr style="border-bottom:1px solid #f1f3f4;">'
                        + '<td style="padding:8px;font-weight:600;">' + escHtml(item.title) + '</td>'
                        + '<td style="padding:8px;text-align:center;">' + escHtml(item.mondayStr) + '</td>'
                        + '<td style="padding:8px;text-align:center;font-size:0.78rem;color:#5f6368;">' + escHtml(item.savedAt) + '</td>'

                        + '<button class="btn btn-primary btn-sm" onclick="NW.doLoadFromSheet(\'' + item.fileId + '\');Swal.close();">開く</button> '
                        + '<button class="btn btn-outline btn-sm" style="color:#ea4335;border-color:#ea4335;" onclick="NW.doDeleteFromSheet(' + item.rowIndex + ',\'' + item.fileId + '\');Swal.close();">削除</button>'

    NW._applyLoadedData = function (data) {
        NW.blocks = data.blocks || [];
        NW.nextId = data.nextId || 1;
        if (data.mondayStr) {
            NW.mondayStr = data.mondayStr;
            document.getElementById('nwWeekLabel').textContent = NW.mondayStr + '週';
        }
        if (data.scheduleData) NW.scheduleData = data.scheduleData;
        NW._history = [];
        NW._historyIdx = -1;
        NW.render();
        NW.pushHistory();
        showToast('success', '読み込みました');
    };

    NW.doLoadFromSheet = function (fileId) {
        if (!fileId) { showToast('error', 'ファイルIDが見つかりません'); return; }
        showToast('info', '読み込み中...');
        google.script.run
            .withSuccessHandler(function (res) {
                if (!res) { showToast('error', '読込失敗: サーバーから応答がありません'); return; }
                if (!res.success) { showToast('error', '読込失敗: ' + (res.error || '不明なエラー')); return; }
                // サーバーが jsonString を返した場合（大きいデータ向け）
                if (res.jsonString) {
                    try {
                        NW._applyLoadedData(JSON.parse(res.jsonString));
                    } catch (pe) {
                        showToast('error', '読込失敗: JSONパースエラー');
                    }
                    return;
                }
                if (!res.data) { showToast('error', '読込失敗: データが空です'); return; }
                NW._applyLoadedData(res.data);
            })
            .withFailureHandler(_onCommError)
            .loadNewsletterData(fileId);
    };

    NW.doDeleteFromSheet = function (rowIndex, fileId) {
        Swal.fire({
            title: '削除確認',
            text: 'この学級通信を削除しますか？',
            icon: 'warning',
            showCancelButton: true,
            confirmButtonText: '削除',
            cancelButtonText: 'キャンセル',
            confirmButtonColor: '#ea4335'
        }).then(function (result) {
            if (!result.isConfirmed) return;
            google.script.run
                .withSuccessHandler(function (res) {
                    if (!res) { showToast('error', '削除失敗: サーバーから応答がありません'); return; }
                    if (res.success) {
                        showToast('success', '削除しました');
                        NW.openFromSheet();
                    } else {
                        showToast('error', '削除失敗: ' + res.error);
                    }
                })
                .withFailureHandler(_onCommError)
                .deleteNewsletterData(rowIndex, fileId);
        });
    };

    // ---- Load schedule data from backend ----
    NW.loadScheduleData = function () {
        var mondayStr = NW.mondayStr || STATE.mondayStr;
        if (!mondayStr) { showToast('error', '週を選択してください'); return; }
        showToast('info', '週案データを読み込み中...');
        google.script.run
            .withSuccessHandler(function (data) {
                if (!data.success) { showToast('error', 'データ取得失敗: ' + data.error); return; }
                NW.scheduleData = data;
                showToast('success', '週案データを読み込みました');
                var hasSchedule = NW.blocks.some(function (b) { return b.type === 'schedule'; });
                if (hasSchedule) {
                    NW.blocks.forEach(function (b) { if (b.type === 'schedule') b.weekData = data; });
                    NW.render();
                } else if (NW.blocks.length === 0) {
                    // Auto-create default layout
                    NW.addBlock('heading', null, { content: data.title || '学級通信', fontSize: 20 });
                    NW.addBlock('text', null, { content: data.date + '〜 の予定', fontSize: 11, align: 'center' });
                    NW.addBlock('divider');
                    NW.addBlock('schedule', null, { weekData: data });
                    NW.addBlock('divider');
                    NW.addBlock('text', null, { content: '', fontSize: 12 });
                } else {
                    NW.render();
                }
            })
            .withFailureHandler(_onCommError)
            .getNewsletterData(mondayStr);

    NW.buildPrintHTML = function () {
        NW.saveEditable();
        var page = document.getElementById('nwEditorPage');
        var clone = page.cloneNode(true);
        clone.querySelectorAll('.nw-block-handle,.nw-block-actions,.nw-schedule-options,.nw-empty-editor,.nw-image-placeholder,.nw-gallery-add,.nw-gallery-remove,.nw-page-break-marker,.nw-insert-row,.nw-col-img-placeholder,.nw-col-img-remove').forEach(function (el) { el.remove(); });
        clone.querySelectorAll('.nw-block').forEach(function (el) {
            var decoBorder = el.getAttribute('data-deco-border');
            el.style.border = decoBorder ? ('2px solid ' + decoBorder) : 'none';
            el.style.padding = '2px';
        });
        clone.querySelectorAll('[style*="cursor"]').forEach(function (el) { el.style.cursor = 'default'; });
        clone.querySelectorAll('[contenteditable]').forEach(function (el) { el.removeAttribute('contenteditable'); });
        clone.querySelectorAll('[onclick]').forEach(function (el) { el.removeAttribute('onclick'); });
        return '<!DOCTYPE html><html><head>'
            + '<meta charset="utf-8">'

    // ---- Print via iframe ----
    NW.printNewsletter = function () {
        if (NW.blocks.length === 0) { showToast('error', 'ブロックがありません'); return; }
        var html = NW.buildPrintHTML();
        var iframe = document.createElement('iframe');
        iframe.style.cssText = 'position:fixed;top:-10000px;left:-10000px;width:210mm;height:297mm;';
        document.body.appendChild(iframe);
        var doc = iframe.contentDocument;
        doc.open();
        doc.write(html);
        doc.close();
        iframe.onload = function () {
            setTimeout(function () {
                iframe.contentWindow.print();
                setTimeout(function () { document.body.removeChild(iframe); }, 1000);
            }, 500);
        };
    };

    // ---- Google Docs互換HTML生成 (Classroom投稿用) ----
    // DOM cloneではなく、ブロックデータからシンプルなHTML構造を直接生成
    NW.buildClassroomHTML = function () {
        NW.saveEditable();
        var body = '';
        // A4 printable area ≈ 174mm ≈ 550px
        var pageW = 550;
        NW.blocks.forEach(function (block) {
            // ブロックデコレーション: 枠線・背景
            var bdrS = '';
            if (block.borderColor) bdrS += 'border:2px solid ' + block.borderColor + ';';
            if (block.blockBgColor) bdrS += 'background-color:' + block.blockBgColor + ';';
            if (block.borderRadius) bdrS += 'border-radius:' + block.borderRadius + 'px;';
            if (bdrS) bdrS += 'padding:4px;margin:2px 0;';
            var wrapOpen = bdrS ? '<div style="' + bdrS + '">' : '';
            var wrapClose = bdrS ? '</div>' : '';

            switch (block.type) {
                case 'heading':
                    var hs = 'font-size:' + block.fontSize + 'px;text-align:' + (block.align || 'center') + ';margin:4px 0;';
                    if (block.bold) hs += 'font-weight:bold;';
                    if (block.color) hs += 'color:' + block.color + ';';
                    if (block.bgColor) hs += 'background-color:' + block.bgColor + ';';
                    if (block.fontFamily) hs += 'font-family:' + block.fontFamily + ';';
                    body += wrapOpen + '<p style="' + hs + '">' + (block.content || '') + '</p>' + wrapClose;
                    break;
                case 'text':
                    var ts = 'font-size:' + block.fontSize + 'px;text-align:' + (block.align || 'left') + ';margin:2px 0;line-height:1.7;';
                    if (block.bold) ts += 'font-weight:bold;';
                    if (block.color) ts += 'color:' + block.color + ';';
                    if (block.bgColor) ts += 'background-color:' + block.bgColor + ';';
                    if (block.fontFamily) ts += 'font-family:' + block.fontFamily + ';';
                    body += wrapOpen + '<p style="' + ts + '">' + (block.content || '&nbsp;') + '</p>' + wrapClose;
                    break;
                case 'image':
                    if (!block.src) break;
                    var imgW = Math.round(pageW * (block.width || 50) / 100);
                    if (block.float !== 'none' && block.wrapText) {
                        // 回り込み → table化
                        var imgCell = '<td style="width:' + imgW + 'px;vertical-align:top;padding:4px;"><img src="' + block.src + '" width="' + imgW + '"></td>';
                        var wts = 'vertical-align:top;padding:4px;font-size:' + (block.wrapFontSize || 12) + 'px;line-height:1.7;';
                        if (block.wrapFontFamily) wts += 'font-family:' + block.wrapFontFamily + ';';
                        if (block.wrapBold) wts += 'font-weight:bold;';
                        if (block.wrapColor) wts += 'color:' + block.wrapColor + ';';
                        if (block.wrapAlign) wts += 'text-align:' + block.wrapAlign + ';';
                        var txtCell = '<td style="' + wts + '">' + (block.wrapText || '') + '</td>';
                        body += wrapOpen + '<table style="width:100%;border:none;"><tr>'
                            + (block.float === 'right' ? txtCell + imgCell : imgCell + txtCell)
                            + '</tr></table>' + wrapClose;
                    } else {
                        body += wrapOpen + '<p style="text-align:center;margin:4px 0;"><img src="' + block.src + '" width="' + imgW + '"></p>';
                        if (block.caption) body += '<p style="text-align:center;font-size:10px;color:#5f6368;margin:2px 0;">' + block.caption + '</p>';
                        body += wrapClose;
                    }
                    break;
                case 'columns':
                    var cCols = block.columns || 2;
                    body += wrapOpen + '<table style="width:100%;border:none;border-collapse:collapse;"><tr>';
                    for (var ci = 0; ci < cCols; ci++) {
                        var cd = (block.colData && block.colData[ci]) ? block.colData[ci] : {};
                        var cw = Math.round(100 / cCols);
                        if (block.colRatio && cCols === 2) {
                            var parts = block.colRatio.split(':');
                            if (parts.length === 2) {
                                var total = parseInt(parts[0]) + parseInt(parts[1]);
                                cw = Math.round((parseInt(parts[ci]) / total) * 100);
                            }
                        }
                        body += '<td style="width:' + cw + '%;vertical-align:top;padding:6px;border:none;">';
                        if (cd.src) {
                            body += '<img src="' + cd.src + '" style="width:100%;display:block;border-radius:4px;margin-bottom:4px;">';
                        }
                        if (cd.content) {
                            body += '<div style="font-size:12px;line-height:1.6;">' + cd.content + '</div>';
                        }
                        body += '</td>';
                    }
                    body += '</tr></table>' + wrapClose;
                    break;
                case 'gallery':
                    var cols = block.columns || 2;
                    var gw = Math.round((pageW - cols * 8) / cols);
                    body += wrapOpen + '<table style="width:100%;border:none;border-collapse:collapse;"><tr>';
                    (block.images || []).forEach(function (img, i) {
                        if (img.src) {
                            body += '<td style="width:' + Math.round(100 / cols) + '%;text-align:center;vertical-align:top;padding:4px;border:none;">'
                                + '<img src="' + img.src + '" width="' + gw + '" style="display:block;margin:0 auto;">'
                                + (img.caption ? '<p style="font-size:9px;text-align:center;margin:2px 0;">' + img.caption + '</p>' : '')
                                + '</td>';
                            if ((i + 1) % cols === 0 && i < block.images.length - 1) body += '</tr><tr>';
                        }
                    });
                    body += '</tr></table>' + wrapClose;
                    break;
                case 'schedule':
                    var schedHtml = NW.renderScheduleHTML(block);
                    // Remove options panel and onclick for export
                    schedHtml = schedHtml.replace(/<div class="nw-schedule-options">[\s\S]*$/, '');
                    schedHtml = schedHtml.replace(/ onclick="[^"]*"/g, '');
                    schedHtml = schedHtml.replace(/ class="nw-sched-cell"/g, '');
                    body += wrapOpen + schedHtml + wrapClose;
                    break;
                case 'qrcode':
                    if (block.url) {
                        body += wrapOpen + '<p style="text-align:center;margin:4px 0;"><img src="https://api.qrserver.com/v1/create-qr-code/?size='
                            + (block.qrSize || 200) + 'x' + (block.qrSize || 200)
                            + '&data=' + encodeURIComponent(block.url) + '" width="' + (block.qrSize || 200) + '"></p>';
                        if (block.label) body += '<p style="text-align:center;font-size:10px;margin:2px 0;">' + block.label + '</p>';
                        body += wrapClose;
                    }
                    break;
                case 'divider':
                    body += '<hr style="border:none;border-top:1px solid #dadce0;margin:6px 0;">';
                    break;
                case 'wordart':
                    // Google DocsはCSSグラデーション非対応 → 太字＋色で代替表現
                    var wc = block.waColor || '#202124';
                    if (block.waGradient) wc = block.waGradC1 || '#ff0000';
                    var ws = 'font-size:' + (block.fontSize || 48) + 'px;text-align:' + (block.align || 'center')
                        + ';font-weight:900;color:' + wc + ';margin:4px 0;';
                    if (block.fontFamily) ws += 'font-family:' + block.fontFamily + ';';
                    if (block.waSpacing) ws += 'letter-spacing:' + block.waSpacing + 'px;';
                    body += wrapOpen + '<p style="' + ws + '">' + escHtml(block.content || '') + '</p>' + wrapClose;
                    break;
            }
        });

        return '<!DOCTYPE html><html><head><meta charset="utf-8">'
            + '<style>body{font-family:sans-serif;font-size:12px;color:#202124;margin:8px;padding:0;}'
            + 'p{margin:4px 0;}table{width:100%;border-collapse:collapse;}'
            + 'th{background-color:#1a73e8;color:#ffffff;padding:4px 6px;font-size:11px;text-align:center;}'
            + 'td{padding:3px 5px;border:1px solid #dadce0;text-align:center;font-size:11px;}'
            + 'img{max-width:100%;}</style></head>'
            + '<body>' + body + '</body></html>';
    };

    // ===== データ連携 (PDF処理) =====
    function fetchPdfList(type) {
        var listEl = document.getElementById(type + 'FileList');
        var statusEl = document.getElementById(type + 'StatusText');
        listEl.innerHTML = '<div class="empty-message">読み込み中...</div>';
        statusEl.textContent = '一覧を取得中...';

        google.script.run
            .withSuccessHandler(function (res) {
                if (res.success) {
                    renderFileList(type, res.files);
                    statusEl.textContent = res.files.length + '件のPDFを取得しました。';
                } else {
                    listEl.innerHTML = '<div class="empty-message" style="color:var(--danger)">エラー: ' + escHtml(res.error) + '</div>';
                    statusEl.textContent = '';
                }
            })
            .withFailureHandler(function (e) {
                listEl.innerHTML = '<div class="empty-message" style="color:var(--danger)">通信エラー: ' + escHtml(e.message) + '</div>';
                statusEl.textContent = '';
            })
            .getPdfFileListForWebApp(type);

    function renderFileList(type, files) {

            cb.type = 'checkbox';

            cb.className = type + '-file-cb';

            cb.onchange = function () { updateSelection(type); };

            var label = document.createElement('label');
            label.htmlFor = 'cb_' + file.id;
            label.textContent = file.name;

            var dateSpan = document.createElement('span');
            dateSpan.className = 'file-date';
            dateSpan.textContent = new Date(file.dateCreated).toLocaleDateString('ja-JP');

            item.appendChild(cb);

    function checkProcessingStatus() {
        // 現在データ連携タブを開いていない場合はポーリングしない
        var viewIntegration = document.getElementById('view-integration');
        if (!viewIntegration || !viewIntegration.classList.contains('active')) return;

        google.script.run
            .withSuccessHandler(function (res) {
                if (!res.success) return;

                var unitBtn = document.getElementById('startUnitBtn');
                var eventBtn = document.getElementById('startEventBtn');
                var unitStatusMsg = document.getElementById('unitStatusText');
                var eventStatusMsg = document.getElementById('eventStatusText');

                if (res.unitStatus.isRunning) {
                    unitBtn.disabled = true;
                    unitBtn.innerHTML = '<span class="material-symbols-outlined fs-6">hourglass_empty</span> 処理中...';
                    unitStatusMsg.innerHTML = '<span style="color:var(--danger)">実行中 (残件: ' + res.unitStatus.remaining + ' / 全 ' + res.unitStatus.total + ')</span>';
                } else {
                    unitBtn.innerHTML = '<span class="material-symbols-outlined fs-6">play_arrow</span> 単元マスタ再構築を開始';
                    updateSelection('unit');
                }

                if (res.eventStatus.isRunning) {
                    eventBtn.disabled = true;
                    eventBtn.innerHTML = '<span class="material-symbols-outlined fs-6">hourglass_empty</span> 処理中...';
                    eventStatusMsg.innerHTML = '<span style="color:var(--danger)">実行中 (残件: ' + res.eventStatus.remaining + ' / 全 ' + res.eventStatus.total + ')</span>';
                } else {
                    eventBtn.innerHTML = '<span class="material-symbols-outlined fs-6">play_arrow</span> 行事予定読み込みを開始';
                    updateSelection('event');
                }

                if (res.unitStatus.isRunning || res.eventStatus.isRunning) {
                    setTimeout(checkProcessingStatus, 3000);
                }
            })
            .withFailureHandler(function (e) {
                // 一時的な通信エラーでポーリングが止まり「処理中...」のまま固まらないよう、
                // トーストは出さず（連発防止）少し待って再試行する。タブを離れると先頭ガードで停止する。
                console.error('PDF処理状況の取得に失敗（ポーリング継続）:', e && e.message);
                setTimeout(checkProcessingStatus, 5000);
            })
            .getPdfProcessingStatusForWebApp();
    }

    // ===== ユーティリティ =====
    function formatDateLocal(date) {
        var y = date.getFullYear();
        var m = String(date.getMonth() + 1).padStart(2, '0');
        var d = String(date.getDate()).padStart(2, '0');
        return y + '/' + m + '/' + d;
    }
    function escHtml(str) {
        if (!str) return '';
        return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }
    function escAttr(str) {
        if (!str) return '';
        return String(str).replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }

    /**
     * テキスト中の URL と Markdown 形式リンク [表示テキスト](URL) を
     * クリック可能な <a> タグに変換する。
     * escHtml 済みテキストに対して呼ぶこと。
     */
    function linkify(escapedHtml) {
        if (!escapedHtml) return '';
        // 1) Markdown 形式: [表示テキスト](URL)
        //    escHtml 後は &quot; は含まないが念のため
        var md = escapedHtml.replace(
            /\[([^\]]+)\]\((https?:\/\/[^\s\)]+)\)/g,
            '<a href="$2" target="_blank" rel="noopener noreferrer" class="cell-link" onclick="event.stopPropagation()">$1<span class="material-symbols-outlined cell-link-icon">open_in_new</span></a>'
        );
        // 2) 素の URL（Markdown リンクに変換済みの href="..." 内は除外）
        md = md.replace(
            /(^|[^"=])(https?:\/\/[^\s<&]+)/g,
            '$1<a href="$2" target="_blank" rel="noopener noreferrer" class="cell-link" onclick="event.stopPropagation()">$2<span class="material-symbols-outlined cell-link-icon">open_in_new</span></a>'
        );
        return md;
    }

    /**
     * リンク挿入ダイアログを開き、対象 textarea にリンクテキストを挿入する。
     * target: 挿入先 textarea 要素
     */
    function openLinkInsertDialog(target) {
        Swal.fire({
            title: 'リンクを挿入',
            html:
                '<div style="text-align:left;font-size:0.85rem;margin-bottom:8px;color:var(--text-sub);">Google ドライブや外部サイトの URL を埋め込めます</div>'
                + '<input id="swal-link-url" class="swal2-input" placeholder="https://..." style="font-size:0.85rem;">'
                + '<input id="swal-link-text" class="swal2-input" placeholder="表示テキスト（省略可）" style="font-size:0.85rem;">',
            focusConfirm: false,
            showCancelButton: true,
            confirmButtonText: '挿入',
            cancelButtonText: 'キャンセル',
            preConfirm: function () {
                var url = document.getElementById('swal-link-url').value.trim();
                var text = document.getElementById('swal-link-text').value.trim();
                if (!url) {
                    Swal.showValidationMessage('URL を入力してください');
                    return false;
                }
                if (!/^https?:\/\//i.test(url)) url = 'https://' + url;
                return { url: url, text: text };
            }
        }).then(function (result) {
            if (!result.isConfirmed || !result.value) return;
            var url = result.value.url;
            var text = result.value.text;
            var insert = text ? '[' + text + '](' + url + ')' : url;
            // textarea のカーソル位置に挿入
            var start = target.selectionStart || 0;
            var end = target.selectionEnd || 0;
            var before = target.value.substring(0, start);
            var after = target.value.substring(end);
            target.value = before + insert + after;
            target.focus();
            target.selectionStart = target.selectionEnd = start + insert.length;
            // 高さ自動調整
            autoResizeTextarea(target);
        });
    }

    function renderTimetableEditor(data) {
        var tbody = document.getElementById('timetableBody');
        tbody.innerHTML = '';
        data.forEach(function (dayData, dayIndex) {
            var tr = document.createElement('tr');
            // 曜日ラベル
            var tdLabel = document.createElement('td');
            tdLabel.textContent = DAY_NAMES[dayIndex];
            tr.appendChild(tdLabel);
            // 時程
            tr.appendChild(makeEditorCell('tt_' + dayIndex + '_time', dayData.time || ''));
            // 朝学習
            tr.appendChild(makeEditorCell('tt_' + dayIndex + '_morning', dayData.morning || ''));
            // 1〜6校時
            for (var p = 0; p < 6; p++) {
                tr.appendChild(makeEditorCell('tt_' + dayIndex + '_p' + p, (dayData.periods && dayData.periods[p]) || '', true));
            }
            tbody.appendChild(tr);

    function makeEditorCell(id, value, isSubjectCell) {
        var td = document.createElement('td');
        var input = document.createElement('input');
        input.type = 'text';
        input.id = id;
        input.value = value;
        if (isSubjectCell) {
            // 教科セルは「教科名+分数（合計1）」形式の検証をリアルタイムに行う
            input.addEventListener('input', function () { updateSubjectInputValidity(input); });
            updateSubjectInputValidity(input);
        }
        td.appendChild(input);
        return td;
    }

    function gatherTimetableData() {
        var data = [];
        for (var d = 0; d < 5; d++) {
            var periods = [];
            for (var p = 0; p < 6; p++) {
                var el = document.getElementById('tt_' + d + '_p' + p);
                periods.push(el ? el.value : '');
            }
            data.push({
                day: d,
                time: (document.getElementById('tt_' + d + '_time') || {}).value || '',
                morning: (document.getElementById('tt_' + d + '_morning') || {}).value || '',
                periods: periods
            });
        }
        return data;
    }

    function saveTimetable() {
        var data = gatherTimetableData();

        // 教科セルの検証: 「教科名+分数」形式は分数の合計が必ず1
        var errors = [];
        data.forEach(function (dayData, d) {
            dayData.periods.forEach(function (value, p) {
                if (!value) return;
                var check = validateSubjectCellValue(value);
                if (!check.valid) {
                    errors.push(DAY_NAMES[d] + '曜 ' + (p + 1) + '校時「' + value + '」: ' + check.message);
                }
            });
        });
        if (errors.length > 0) {
            showToast('error', '教科名の入力に誤りがあります: ' + errors[0]
                + (errors.length > 1 ? '（他' + (errors.length - 1) + '件）' : ''));
            return;
        }

        showToast('info', '保存中...');
        google.script.run
            .withSuccessHandler(function (res) {
                if (res.success) {
                    showToast('success', '' + res.message);
                } else {
                    showToast('error', 'エラー: ' + res.error);
                }
            })
            .withFailureHandler(_onCommError)
            .saveTimetableFromEditor(data);
    }

                '<td>' + row.standard + '</td>' +
                '<td><div class="progress-bar-wrap"><div class="progress-bar-fill' + overClass + '" style="width:' + Math.min(pct, 100) + '%"></div></div></td>' +
                '<td class="pct-label">' + row.percent + '%</td>' +
                '</tr>';
        });
        html += '</tbody></table>';

    /**
     * Gemini APIから利用可能なモデル一覧を取得し、プルダウンに反映する。
     * @param {boolean} forceReload キャッシュを無視して再取得するか
     */
    function loadGeminiModels(forceReload) {
        if (STATE.geminiModelsCache && !forceReload) {
            populateGeminiModelSelect(STATE.geminiModelsCache);
            return;
        }
        var select = document.getElementById('sysGeminiModelName');
        select.innerHTML = '<option value="">読み込み中...</option>';
        select.disabled = true;
        var warningDiv = document.getElementById('geminiModelWarning');
        warningDiv.style.display = 'none';

        google.script.run
            .withSuccessHandler(function (result) {
                select.disabled = false;
                if (result.success && result.models.length > 0) {
                    STATE.geminiModelsCache = result.models;
                    populateGeminiModelSelect(result.models);
                } else {
                    // API取得失敗時はフォールバック（手入力可能にはしない）
                    select.innerHTML = '<option value="gemini-2.5-flash">gemini-2.5-flash</option>';
                    if (result.error) {
                        warningDiv.textContent = 'モデル一覧の自動取得に失敗しました: ' + result.error;
                        warningDiv.style.display = 'block';
                    }
                    applyCurrentModelSelection();
                }
            })
            .withFailureHandler(function (e) {
                select.disabled = false;
                select.innerHTML = '<option value="gemini-2.5-flash">gemini-2.5-flash</option>';
                var warningDiv = document.getElementById('geminiModelWarning');
                warningDiv.textContent = 'モデル一覧の取得中にエラーが発生しました: ' + e.message;
                warningDiv.style.display = 'block';
                applyCurrentModelSelection();
            })
            .getAvailableGeminiModels();
    }

    /**
     * モデル一覧をセレクトボックスに反映する。
     * @param {Array} models モデル配列 [{name, displayName}]
     */
    function populateGeminiModelSelect(models) {
        var select = document.getElementById('sysGeminiModelName');
        var currentValue = select.dataset.pendingValue || select.value || '';
        select.innerHTML = '';

        models.forEach(function (m) {
            var opt = document.createElement('option');
            opt.value = m.name;
            opt.textContent = m.name + (m.displayName !== m.name ? ' (' + m.displayName + ')' : '');
            select.appendChild(opt);
        });

        applyCurrentModelSelection();
    }

    /**
     * 現在保存されているモデル名をセレクトに反映し、利用不可の場合は警告を表示する。
     */
    function applyCurrentModelSelection() {
        var select = document.getElementById('sysGeminiModelName');
        var savedModel = select.dataset.pendingValue || '';
        var warningDiv = document.getElementById('geminiModelWarning');

        if (!savedModel) return;

        // 保存されているモデルがリストにあるか確認
        var found = false;
        for (var i = 0; i < select.options.length; i++) {
            if (select.options[i].value === savedModel) {
                found = true;
                break;
            }
        }

        if (found) {
            select.value = savedModel;
            warningDiv.style.display = 'none';
        } else {
            // リストにない場合：選択肢の先頭に追加し警告を表示
            var opt = document.createElement('option');
            opt.value = savedModel;
            opt.textContent = savedModel + ' (利用不可)';
            opt.style.color = '#dc3545';
            select.insertBefore(opt, select.firstChild);
            select.value = savedModel;
            warningDiv.innerHTML = '<strong>⚠ 注意:</strong> 現在設定されているモデル「' + savedModel + '」は利用可能なモデル一覧に含まれていません。モデルが廃止された可能性があります。別のモデルを選択してください。';
            warningDiv.style.display = 'block';
        }
        delete select.dataset.pendingValue;
    }

    // ===== 共通ヘルパー =====

    /** dueDate（yyyy-MM-dd）と比較可能な形式で今日の日付を返す */
    function taskTodayStr() {
        // dueDate は "yyyy-MM-dd" 形式のため、比較用の今日の日付も同じ区切り文字に揃える
        //（"yyyy/MM/dd" と比較すると '-' < '/' のため同年内の未来の期日まで期限切れ扱いになる）
        return formatDateLocal(new Date()).replace(/\//g, '-');
    }

    /** ステータスに応じたアイコン・クラス・次ステータスを返す */
    function taskStatusMeta(status) {
        if (status === '完了') return { icon: 'check_circle', cls: 'status-done', label: '完了' };
        if (status === '進行中') return { icon: 'timelapse', cls: 'status-inprogress', label: '進行中' };
        return { icon: 'radio_button_unchecked', cls: 'status-notstarted', label: '未着手' };
    }

    /** ステータス切替ボタンのHTMLを生成（クリックで 未着手→進行中→完了 を循環） */
    function taskStatusBtnHtml(t, small) {
        var s = taskStatusMeta(t.status || '未着手');
        return `<button class="task-status-btn ${s.cls}${small ? ' sm' : ''}" onclick="cycleTaskStatus('${t.id}')" title="${s.label}（クリックで切替: 未着手→進行中→完了）"><span class="material-symbols-outlined">${s.icon}</span></button>`;
    }

    /** 優先度バッジのHTMLを生成 */
    function taskPriorityBadgeHtml(priority) {
        var p = priority || '中';
        var cls = p === '高' ? 'p-high' : (p === '低' ? 'p-low' : 'p-mid');
        return `<span class="task-priority-badge ${cls}" title="優先度: ${p}">${p}</span>`;
    }

    /** タスク関連の全表示（一覧・サイドバー・ナビバッジ）をまとめて再描画 */
    function refreshTaskViews() {
        if (document.getElementById('taskListContainer')) renderTaskList();
        if (document.getElementById('sidebarTaskList')) renderWeeklyTaskPanel();
        updateTaskNavBadge();
    }

    /** ナビの「タスク」ボタンに期限切れ＋今日締切の未完了件数バッジを表示 */
    function updateTaskNavBadge() {
        var badge = document.getElementById('taskNavBadge');
        if (!badge) return;
        var todayStr = taskTodayStr();
        var count = (STATE.allTaskData || []).filter(function (t) {
            return t.status !== '完了' && t.dueDate && t.dueDate <= todayStr;
        }).length;
        badge.style.display = count > 0 ? 'inline-flex' : 'none';
        badge.textContent = count > 99 ? '99+' : String(count);
    }

    function setTaskFilter(filter) {
        STATE.taskFilter = filter;
        document.querySelectorAll('.task-filter-chip').forEach(function (chip) {
            chip.classList.toggle('active', chip.dataset.filter === filter);
        });
        renderTaskList();
    }

    function onTaskSearchInput() {
        var input = document.getElementById('taskSearchInput');
        STATE.taskSearchKeyword = (input ? input.value : '').trim().toLowerCase();

    function setTaskSortMode(mode) {

    /** フィルタ・検索・並び替えを適用したタスク配列を返す */
    function getVisibleTasks() {
        var showCompleted = document.getElementById('chkShowCompletedTasks');
        showCompleted = showCompleted ? showCompleted.checked : false;
        var todayStr = taskTodayStr();
        var weekLater = new Date();
        weekLater.setDate(weekLater.getDate() + 6);
        var weekLaterStr = formatDateLocal(weekLater).replace(/\//g, '-');
        var kw = STATE.taskSearchKeyword;

        var filtered = STATE.allTaskData.filter(function (t) {
            if (!showCompleted && t.status === '完了') return false;
            switch (STATE.taskFilter) {
                case 'overdue': if (!(t.dueDate && t.dueDate < todayStr && t.status !== '完了')) return false; break;
                case 'today': if (t.dueDate !== todayStr) return false; break;
                case 'week': if (!(t.dueDate && t.dueDate >= todayStr && t.dueDate <= weekLaterStr)) return false; break;
                case 'nodate': if (t.dueDate) return false; break;
            }
            if (kw) {
                var haystack = [t.content, t.resource, t.memo, t.source].join(' ').toLowerCase();
                if (haystack.indexOf(kw) < 0) return false;
            }
            return true;
        });

        var prioOrder = { '高': 0, '中': 1, '低': 2 };
        var byDue = function (a, b) {
            if (!a.dueDate && !b.dueDate) return 0;
            if (!a.dueDate) return 1;
            if (!b.dueDate) return -1;
            return a.dueDate.localeCompare(b.dueDate);
        };
        if (STATE.taskSortMode === 'priority') {
            filtered.sort(function (a, b) {
                var d = (prioOrder[a.priority] !== undefined ? prioOrder[a.priority] : 1) - (prioOrder[b.priority] !== undefined ? prioOrder[b.priority] : 1);
                return d !== 0 ? d : byDue(a, b);
            });
        } else if (STATE.taskSortMode === 'created') {
            // シート格納順（＝追加順）のまま
        } else {
            filtered.sort(byDue);
        }
        return filtered;
    }

    // ===== 進行状況サマリー =====

    function renderTaskSummary() {
        var bar = document.getElementById('taskSummaryBar');
        if (!bar) return;
        var all = STATE.allTaskData || [];
        var todayStr = taskTodayStr();
        var total = all.length;
        var done = all.filter(function (t) { return t.status === '完了'; }).length;
        var inProgress = all.filter(function (t) { return t.status === '進行中'; }).length;
        var notStarted = total - done - inProgress;
        var overdue = all.filter(function (t) { return t.status !== '完了' && t.dueDate && t.dueDate < todayStr; }).length;
        var dueToday = all.filter(function (t) { return t.status !== '完了' && t.dueDate === todayStr; }).length;
        var pct = total > 0 ? Math.round(done / total * 100) : 0;

        bar.innerHTML = `
            <div class="task-stat-chips">
                <button class="task-stat-chip stat-overdue${overdue ? '' : ' zero'}" onclick="setTaskFilter('overdue')" title="期限切れの未完了タスク"><span class="material-symbols-outlined">warning</span> 期限切れ <b>${overdue}</b></button>
                <button class="task-stat-chip stat-today${dueToday ? '' : ' zero'}" onclick="setTaskFilter('today')" title="今日が期日のタスク"><span class="material-symbols-outlined">today</span> 今日 <b>${dueToday}</b></button>
                <span class="task-stat-chip stat-notstarted">未着手 <b>${notStarted}</b></span>
                <span class="task-stat-chip stat-inprogress">進行中 <b>${inProgress}</b></span>
                <span class="task-stat-chip stat-done">完了 <b>${done}</b></span>
            </div>
            <div class="task-progress-wrap" title="完了率 ${pct}%（${done}/${total}件）">
                <div class="task-progress-track"><div class="task-progress-fill" style="width:${pct}%"></div></div>
                <span class="task-progress-label">${pct}%</span>
            </div>
        `;
    }

    // ===== タスク一覧の描画 =====

    function renderTaskList() {
        var container = document.getElementById('taskListContainer');
        if (!container) return;
        renderTaskSummary();
        updateTaskNavBadge();

        var filtered = getVisibleTasks();

        if (filtered.length === 0) {
            var msg = STATE.allTaskData.length === 0
                ? '現在登録されているタスクはありません。上の入力欄からすぐに追加できます。'
                : '条件に合うタスクはありません。（フィルタ・検索条件を確認してください）';
            container.className = 'task-list-view';
            container.innerHTML = '<div style="text-align: center; padding: 40px 20px; background: var(--surface-2); border-radius: 8px; border: 1px dashed var(--border); color: var(--text-hint);">' + msg + '</div>';
            return;
        }

        var todayStr = taskTodayStr();

        // コンテナのクラスを表示モードに応じて切替
        container.className = STATE.taskViewMode === 'list' ? 'task-list-view' : 'task-grid';

        container.innerHTML = filtered.map(t => {
            var isComp = (t.status === '完了');
            var compClass = isComp ? ' completed' : (t.status === '進行中' ? ' inprogress' : '');
            var isOverdue = !isComp && t.dueDate && (t.dueDate < todayStr);
            var isUrgent = !isComp && t.dueDate && (t.dueDate <= todayStr);
            var dateBadgeClass = isUrgent ? 'task-date-badge urgent' : 'task-date-badge';
            var dateDisplay = t.dueDate ? t.dueDate.replace(/^\d{4}-/, '').replace('-', '/') : '期日未設定';
            if (isOverdue) dateDisplay += ' 期限切れ';
            var postponeBtn = isOverdue
                ? `<button class="task-postpone-btn" onclick="postponeTask('${t.id}', 1)" title="期日を明日に先送り"><span class="material-symbols-outlined">event_upcoming</span></button>`
                : '';
            var memoIcon = t.memo
                ? `<span class="task-memo-icon" title="${escHtmlAttr(t.memo)}"><i class="bi bi-sticky"></i></span>`
                : '';

            if (STATE.taskViewMode === 'list') {
                // リスト表示（コンパクト1行）
                return `
                    <div class="task-list-item${compClass}">
                        ${taskStatusBtnHtml(t, false)}
                        ${taskPriorityBadgeHtml(t.priority)}
                        <span class="task-list-title">${escHtml(t.content)}</span>
                        ${memoIcon}
                        ${t.resource ? `<span class="task-list-resource"><i class="bi bi-box-seam"></i> ${escHtml(t.resource)}</span>` : ''}
                        <span class="${dateBadgeClass}"><i class="bi bi-calendar-event"></i> ${dateDisplay}</span>
                        ${postponeBtn}
                        <button class="task-edit-btn" onclick="showEditTaskInput('${t.id}')" title="編集"><i class="bi bi-pencil"></i></button>
                        <button class="task-del-btn" onclick="deleteTaskById('${t.id}')" title="削除"><i class="bi bi-trash3"></i></button>
                    </div>
                `;
            } else {
                // カード表示
                return `
                    <div class="task-card${compClass}">
                        <div class="task-checkbox-wrapper">
                            ${taskStatusBtnHtml(t, false)}
                        </div>
                        <div class="task-content-wrapper">
                            <div class="task-title">${taskPriorityBadgeHtml(t.priority)} ${escHtml(t.content)}</div>
                            <div class="task-meta">
                                ${t.resource ? `<div class="task-meta-item"><i class="bi bi-box-seam task-meta-icon"></i> ${escHtml(t.resource)}</div>` : ''}
                                ${t.memo ? `<div class="task-meta-item"><i class="bi bi-sticky task-meta-icon"></i> ${escHtml(t.memo)}</div>` : ''}
                                ${t.source ? `<div class="task-meta-item"><i class="bi bi-journal-text task-meta-icon"></i> ${escHtml(t.source)}</div>` : ''}
                                <div class="task-meta-item mt-1">
                                    <span class="${dateBadgeClass}"><i class="bi bi-calendar-event"></i> ${dateDisplay}</span>
                                </div>
                            </div>
                            <div class="task-actions">
                                ${postponeBtn}
                                <button class="task-edit-btn" onclick="showEditTaskInput('${t.id}')" title="編集"><i class="bi bi-pencil"></i></button>
                                <button class="task-del-btn" onclick="deleteTaskById('${t.id}')" title="削除"><i class="bi bi-trash3"></i></button>
                            </div>
                        </div>
                    </div>
                `;
            }
        }).join('');
    }

    function setTaskViewMode(mode) {
        STATE.taskViewMode = mode;
        document.getElementById('taskViewListBtn').classList.toggle('active', mode === 'list');
        document.getElementById('taskViewCardBtn').classList.toggle('active', mode === 'card');

    function renderWeeklyTaskPanel() {
        var container = document.getElementById('sidebarTaskList');
        if (!container) return;

        if (!STATE.taskDataLoaded || !STATE.weekData || !STATE.weekData.days) {
            container.innerHTML = '<div class="st-empty">タスク読込中...</div>';
            return;
        }

        var endStr = STATE.weekData.days[6].date.replace(/\//g, '-');
        var todayStr = taskTodayStr();
        var countBadge = document.getElementById('sidebarTaskCount');

        var weekTasks = STATE.allTaskData.filter(t => {
            if (t.status === '完了') return false; // 完了済みタスクは非表示
            if (!t.dueDate) return true; // 期限未設定は常に表示
            if (t.dueDate <= endStr) return true; // 当週を含め、過去の未完了は「やるべき」として表示
            return false; // 来週以降のタスクは隠す
        });

        var prioOrder = { '高': 0, '中': 1, '低': 2 };
        weekTasks.sort((a, b) => {
            if (!a.dueDate && b.dueDate) return 1;
            if (a.dueDate && !b.dueDate) return -1;
            if (a.dueDate !== b.dueDate) return String(a.dueDate).localeCompare(String(b.dueDate));
            // 同じ期日なら優先度が高い順
            return (prioOrder[a.priority] !== undefined ? prioOrder[a.priority] : 1) - (prioOrder[b.priority] !== undefined ? prioOrder[b.priority] : 1);
        });

        if (countBadge) {
            countBadge.style.display = weekTasks.length > 0 ? 'inline-flex' : 'none';
            countBadge.textContent = String(weekTasks.length);
        }

        if (weekTasks.length === 0) {
            container.innerHTML = '<div class="st-empty">今週のタスクはありません。</div>';
            return;
        }

        container.innerHTML = weekTasks.map(t => {
            var isComp = (t.status === '完了');
            var isOverdue = !isComp && t.dueDate && t.dueDate < todayStr;
            var cardClass = (isComp ? ' completed' : '') + (isOverdue ? ' overdue' : '');
            var prioClass = t.priority === '高' ? ' prio-high' : (t.priority === '低' ? ' prio-low' : ' prio-mid');
            var dateDisplay = t.dueDate ? t.dueDate.replace(/^\d{4}-/, '').replace('-', '/') : '未設定';
            var statusLabel = t.status === '進行中' ? ' <span class="st-inprogress-label">進行中</span>' : '';
            var overdueLabel = isOverdue ? ' <span class="st-overdue-label">期限切れ</span>' : '';

            return `
                <div class="sidebar-task-card${cardClass}${prioClass}">
                    <div class="st-checkbox-wrapper">
                        ${taskStatusBtnHtml(t, true)}
                    </div>
                    <div class="st-content">
                        <div class="st-title">${escHtml(t.content)}</div>
                        <div class="st-meta">
                            期日: ${dateDisplay}${overdueLabel}${statusLabel}
                        </div>
                    </div>
                </div>
            `;
        }).join('');
    }

    // ===== 個別タスクステータス操作 =====

    /** ステータスを 未着手→進行中→完了→未着手 と循環させる */
    function cycleTaskStatus(taskId) {
        var targetTask = STATE.allTaskData.find(t => t.id === taskId);
        if (!targetTask) return;
        var prevStatus = targetTask.status || '未着手';
        var newStatus = prevStatus === '未着手' ? '進行中' : (prevStatus === '進行中' ? '完了' : '未着手');

        // UI即座反映（楽観的更新）
        targetTask.status = newStatus;
        refreshTaskViews();

        // サーバー通信
        google.script.run
            .withSuccessHandler(function (res) {
                if (!res.success) {
                    showToast('error', 'ステータス更新失敗: ' + (res.error || '不明'));
                    targetTask.status = prevStatus; // ロールバック
                    refreshTaskViews();
                }
            })
            .withFailureHandler(function (e) {
                showToast('error', 'ステータス更新失敗: ' + e.message);
                targetTask.status = prevStatus; // ロールバック
                refreshTaskViews();
            })
            .updateTaskStatusFromWebApp(taskId, newStatus);
    }

    /** 期限切れタスクの期日を今日からN日後へ先送りする */
    function postponeTask(taskId, days) {
        var targetTask = STATE.allTaskData.find(t => t.id === taskId);
        if (!targetTask) return;
        var prevDue = targetTask.dueDate;
        var d = new Date();
        d.setDate(d.getDate() + days);
        var newDue = formatDateLocal(d).replace(/\//g, '-');

        // UI即座反映（楽観的更新）
        targetTask.dueDate = newDue;
        refreshTaskViews();

        google.script.run
            .withSuccessHandler(function (res) {
                if (res.success) {
                    showToast('success', '期日を ' + newDue + ' に先送りしました');
                } else {
                    showToast('error', '期日変更失敗: ' + (res.error || '不明'));
                    targetTask.dueDate = prevDue; // ロールバック
                    refreshTaskViews();
                }
            })
            .withFailureHandler(function (e) {
                showToast('error', '期日変更失敗: ' + e.message);
                targetTask.dueDate = prevDue; // ロールバック
                refreshTaskViews();
            })
            .updateTaskFromWebApp(taskId, { dueDate: newDue });
    }

    function getFilteredUmRows() {
        var subjectFilter = document.getElementById('umFilterSubject').value;
        var unitFilter = (document.getElementById('umFilterUnit').value || '').trim().toLowerCase();
        return STATE.umAllRows.filter(function (r) {
            if (subjectFilter && r.subject !== subjectFilter) return false;
            if (unitFilter && (r.unitName || '').toLowerCase().indexOf(unitFilter) === -1) return false;
            return true;
        });
    }

    function renderUnitMasterTable() {
        var filtered = getFilteredUmRows();
        var tbody = document.getElementById('umTableBody');
        var countEl = document.getElementById('umRowCount');
        countEl.textContent = filtered.length + ' / ' + STATE.umAllRows.length + ' 件';

        if (filtered.length === 0) {
            tbody.innerHTML = '<tr><td colspan="6" style="text-align:center; padding:40px; color:var(--text-hint);">該当するデータがありません</td></tr>';
            return;
        }

        // 単元の先頭行を判定（同教科+同単元の最初の行）
        var prevKey = '';
        var html = '';
        for (var i = 0; i < filtered.length; i++) {
            var r = filtered[i];
            var key = r.subject + '||' + r.unitName;
            var isFirst = (key !== prevKey);
            prevKey = key;
            var isEditing = (STATE.umEditingRowIndex === r.rowIndex);
            var trClass = (isFirst ? ' um-unit-first' : '') + (isEditing ? ' um-editing' : '');

            if (isEditing) {
                html += '<tr class="' + trClass.trim() + '" data-row="' + r.rowIndex + '">'
                    + '<td><input class="um-input" id="umEditSubject" value="' + escAttr(r.subject) + '"></td>'
                    + '<td><input class="um-input" id="umEditUnitName" value="' + escAttr(r.unitName) + '"></td>'
                    + '<td class="um-cell-center"><input class="um-input um-input-sm" id="umEditTotal" type="number" min="0" value="' + escAttr(String(r.totalHours)) + '"></td>'
                    + '<td class="um-cell-center"><input class="um-input um-input-sm" id="umEditHour" type="number" min="0" value="' + escAttr(String(r.hourNum)) + '"></td>'
                    + '<td><input class="um-input" id="umEditActivity" value="' + escAttr(r.activity) + '"></td>'
                    + '<td><div class="um-btn-group">'
                    + '<button class="um-btn um-btn-save" onclick="saveUmEdit(' + r.rowIndex + ')" title="保存"><span class="material-symbols-outlined" style="font-size:18px;">check</span></button>'
                    + '<button class="um-btn um-btn-cancel" onclick="cancelUmEdit()" title="キャンセル"><span class="material-symbols-outlined" style="font-size:18px;">close</span></button>'
                    + '</div></td></tr>';
            } else {
                html += '<tr class="' + trClass.trim() + '" data-row="' + r.rowIndex + '">'
                    + '<td>' + escHtml(r.subject) + '</td>'
                    + '<td>' + escHtml(r.unitName) + '</td>'
                    + '<td class="um-cell-center">' + escHtml(String(r.totalHours)) + '</td>'
                    + '<td class="um-cell-center">' + escHtml(String(r.hourNum)) + '</td>'
                    + '<td>' + escHtml(r.activity) + '</td>'
                    + '<td><div class="um-btn-group">'
                    + '<button class="um-btn" onclick="startUmEdit(' + r.rowIndex + ')" title="編集"><span class="material-symbols-outlined" style="font-size:18px;">edit</span></button>'
                    + '<button class="um-btn um-btn-insert" onclick="insertUmRowAfter(' + r.rowIndex + ')" title="この行の後に追加"><span class="material-symbols-outlined" style="font-size:18px;">add</span></button>'
                    + '<button class="um-btn um-btn-danger" onclick="deleteUmRow(' + r.rowIndex + ')" title="削除"><span class="material-symbols-outlined" style="font-size:18px;">delete</span></button>'
                    + '</div></td></tr>';
            }
        }
        tbody.innerHTML = html;
    }

    // --- 編集 ---
    function startUmEdit(rowIndex) {
        STATE.umEditingRowIndex = rowIndex;
        renderUnitMasterTable();
        // 最初の入力欄にフォーカス
        setTimeout(function () {
            var el = document.getElementById('umEditSubject');
            if (el) el.focus();
        }, 50);
    }

    function cancelUmEdit() {
        STATE.umEditingRowIndex = null;
        renderUnitMasterTable();
    }

    function saveUmEdit(rowIndex) {
        var data = {
            subject: document.getElementById('umEditSubject').value.trim(),
            unitName: document.getElementById('umEditUnitName').value.trim(),
            totalHours: document.getElementById('umEditTotal').value.trim(),
            hourNum: document.getElementById('umEditHour').value.trim(),
            activity: document.getElementById('umEditActivity').value.trim()
        };

        if (!data.subject) { showToast('error', '教科名を入力してください'); return; }

        // UIを即座に反映
        var localRow = STATE.umAllRows.find(function (r) { return r.rowIndex === rowIndex; });
        if (localRow) {
            localRow.subject = data.subject;
            localRow.unitName = data.unitName;
            localRow.totalHours = data.totalHours;
            localRow.hourNum = data.hourNum;
            localRow.activity = data.activity;
        }
        STATE.umEditingRowIndex = null;
        renderUnitMasterTable();

        google.script.run
            .withSuccessHandler(function (res) {
                if (res.success) {
                    showToast('success', '保存しました');
                } else {
                    showToast('error', '保存エラー: ' + res.error);
                    loadUnitMasterData(); // ロールバック
                }
            })
            .withFailureHandler(function (e) {
                showToast('error', '通信エラー: ' + e.message);
                loadUnitMasterData();
            })
            .updateUnitMasterRow(rowIndex, data);
    }

    // --- 行追加（ヘッダーの「行追加」ボタン） ---
    async function showAddUnitMasterRow() {
        var result = await Swal.fire({
            title: '単元マスタに行追加',
            html:
                '<div style="text-align:left;font-size:0.85rem;">' +
                '<label class="mb-1"><strong>教科名</strong></label>' +
                '<input id="swalUmSubject" class="swal2-input" placeholder="例: 国語" style="font-size:0.85rem;">' +
                '<label class="mb-1 mt-2"><strong>単元名</strong></label>' +
                '<input id="swalUmUnit" class="swal2-input" placeholder="例: ごんぎつね" style="font-size:0.85rem;">' +
                '<label class="mb-1 mt-2"><strong>総時数</strong></label>' +
                '<input id="swalUmTotal" class="swal2-input" type="number" min="0" value="1" style="font-size:0.85rem;">' +
                '<label class="mb-1 mt-2"><strong>時数（何時間目）</strong></label>' +
                '<input id="swalUmHour" class="swal2-input" type="number" min="0" value="1" style="font-size:0.85rem;">' +
                '<label class="mb-1 mt-2"><strong>学習活動</strong></label>' +
                '<input id="swalUmActivity" class="swal2-input" placeholder="学習活動の内容" style="font-size:0.85rem;">' +
                '</div>',
            focusConfirm: false,
            showCancelButton: true,
            confirmButtonText: '追加',
            cancelButtonText: 'キャンセル',
            preConfirm: function () {
                var subject = document.getElementById('swalUmSubject').value.trim();
                if (!subject) { Swal.showValidationMessage('教科名を入力してください'); return false; }
                return {
                    subject: subject,
                    unitName: document.getElementById('swalUmUnit').value.trim(),
                    totalHours: document.getElementById('swalUmTotal').value.trim(),
                    hourNum: document.getElementById('swalUmHour').value.trim(),
                    activity: document.getElementById('swalUmActivity').value.trim()
                };
            }
        });
        if (!result.isConfirmed) return;

        showToast('info', '行を追加中...');
        // 最後の行の後に追加
        var lastRow = STATE.umAllRows.length > 0 ? STATE.umAllRows[STATE.umAllRows.length - 1].rowIndex : 1;
        google.script.run
            .withSuccessHandler(function (res) {
                if (res.success) {
                    showToast('success', '行を追加しました');
                    loadUnitMasterData();
                } else {
                    showToast('error', '追加エラー: ' + res.error);
                }
            })
            .withFailureHandler(_onCommError)
            .insertUnitMasterRow(lastRow, result.value);
    }

    // --- 行挿入（特定行の後）---
    function insertUmRowAfter(afterRowIndex) {
        // 前の行のデータをコピーして挿入（教科名と単元名を引き継ぐ）
        var srcRow = STATE.umAllRows.find(function (r) { return r.rowIndex === afterRowIndex; });
        var newData = {
            subject: srcRow ? srcRow.subject : '',
            unitName: srcRow ? srcRow.unitName : '',
            totalHours: srcRow ? srcRow.totalHours : '',
            hourNum: srcRow ? (parseInt(srcRow.hourNum, 10) + 1) || '' : '',
            activity: ''
        };

        showToast('info', '行を挿入中...');
        google.script.run
            .withSuccessHandler(function (res) {
                if (res.success) {
                    showToast('success', '行を挿入しました');
                    loadUnitMasterData();
                } else {
                    showToast('error', '挿入エラー: ' + res.error);
                }
            })
            .withFailureHandler(_onCommError)
            .insertUnitMasterRow(afterRowIndex, newData);
    }

    // --- 行削除 ---
    async function deleteUmRow(rowIndex) {
        var targetRow = STATE.umAllRows.find(function (r) { return r.rowIndex === rowIndex; });
        var msg = targetRow
            ? (targetRow.subject + ' / ' + targetRow.unitName + ' (' + targetRow.hourNum + '時間目)')
            : '行 ' + rowIndex;

        var result = await Swal.fire({
            title: '行を削除',
            text: '「' + msg + '」を削除しますか？ 元に戻せません。',
            icon: 'warning',
            showCancelButton: true,
            confirmButtonText: '削除する',
            cancelButtonText: 'キャンセル',
            confirmButtonColor: '#ea4335'
        });
        if (!result.isConfirmed) return;

        showToast('info', '行を削除中...');
        google.script.run
            .withSuccessHandler(function (res) {
                if (res.success) {
                    showToast('success', '削除しました');
                    loadUnitMasterData();
                } else {
                    showToast('error', '削除エラー: ' + res.error);
                }
            })
            .withFailureHandler(_onCommError)
            .deleteUnitMasterRow(rowIndex);
    }

    // =========================================================
    // ===== 表示テーマ（自動 / ライト / ダーク）            =====
    // =========================================================

    var THEME_ORDER = ['auto', 'light', 'dark'];
    var THEME_META = {
        auto: { icon: 'brightness_auto', label: '自動（端末設定に追従）' },
        light: { icon: 'light_mode', label: 'ライト' },
        dark: { icon: 'dark_mode', label: 'ダーク' }
    };

    function applyTheme(theme) {
        var root = document.documentElement;
        if (theme === 'auto') {
            root.removeAttribute('data-theme');
        } else {
            root.setAttribute('data-theme', theme);
        }
        var icon = document.getElementById('themeToggleIcon');
        var btn = document.getElementById('themeToggleBtn');
        var meta = THEME_META[theme] || THEME_META.auto;
        if (icon) icon.textContent = meta.icon;
        if (btn) btn.title = '表示テーマ: ' + meta.label + '（クリックで切替）';
    }

    function getSavedTheme() {
        try {
            var t = localStorage.getItem('spn_theme');
            return THEME_ORDER.indexOf(t) >= 0 ? t : 'auto';
        } catch (e) { return 'auto'; }
    }

    function cycleTheme() {
        var cur = getSavedTheme();
        var next = THEME_ORDER[(THEME_ORDER.indexOf(cur) + 1) % THEME_ORDER.length];
        try { localStorage.setItem('spn_theme', next); } catch (e) { }
        applyTheme(next);
        if (typeof showToast === 'function') {
            showToast('info', '表示テーマ: ' + THEME_META[next].label);
        }
    }

    // 起動時に保存済みテーマを適用（FOUC低減のため即時実行）
    applyTheme(getSavedTheme());

    // =========================================================
    // ===== メンテナンス・ツール / Classroom手動投稿        =====
    // ===== （旧スプレッドシートメニュー機能のWebボタン化） =====
    // =========================================================

    /** google.script.run を Promise 化して呼び出す薄いラッパー。 */
    function _callServerAsync(method) {
        var args = Array.prototype.slice.call(arguments, 1);
        return new Promise(function (resolve, reject) {
            var runner = google.script.run
                .withSuccessHandler(resolve)
                .withFailureHandler(reject);
            runner[method].apply(runner, args);
        });
    }

    /** メンテナンスセクションのステータス行を更新する。 */
    function _setMaintMsg(message, isError) {
        var el = document.getElementById('maintenanceToast');
        if (el) {
            el.textContent = message || '';
            el.style.color = isError ? 'var(--danger)' : 'var(--text-sub)';
        }
    }

    /**
     * ツール系ボタンの共通実行ヘルパー。
     * 確認ダイアログ → ボタンのローディング表示 → サーバ呼び出し → トースト/ステータス更新。
     */
    function _runToolAction(btn, opts) {
        function exec() {
            var orig = btn ? btn.innerHTML : '';
            if (btn) {
                btn.disabled = true;
                btn.innerHTML = '<span class="material-symbols-outlined fs-6">hourglass_empty</span> ' + (opts.busyLabel || '実行中...');
            }
            function restore() { if (btn) { btn.disabled = false; btn.innerHTML = orig; } }
            _callServerAsync.apply(null, [opts.method].concat(opts.args || []))
                .then(function (res) {
                    restore();
                    var ok = !res || res.success !== false;
                    var msg = (res && res.message) ? res.message : (ok ? '完了しました。' : '処理に失敗しました。');
                    if (opts.toMaint) _setMaintMsg(msg, !ok);
                    showToast(ok ? 'success' : 'error', msg);
                    if (ok && typeof opts.onDone === 'function') opts.onDone(res);
                })
                .catch(function (e) {
                    restore();
                    var msg = '通信エラー: ' + (e && e.message ? e.message : e);
                    if (opts.toMaint) _setMaintMsg(msg, true);
                    showToast('error', msg);
                });
        }
        if (opts.confirmText) {
            Swal.fire({
                title: opts.confirmTitle || '確認',
                text: opts.confirmText,
                icon: opts.danger ? 'warning' : 'question',
                showCancelButton: true,
                confirmButtonText: opts.confirmButton || '実行する',
                cancelButtonText: 'キャンセル',
                confirmButtonColor: opts.danger ? '#ea4335' : '#1a73e8',
                reverseButtons: true
            }).then(function (r) { if (r.isConfirmed) exec(); });
        } else {
            exec();
        }
    }

    function postScheduleToClassroomWeb(btn) {
        _runToolAction(btn, {
            method: 'postScheduleToClassroomFromWeb',
            busyLabel: '投稿中...',
            confirmTitle: '明日の予定を投稿',
            confirmText: '次の登校日の予定をGoogle Classroomへ投稿します。よろしいですか？',

        });

    function resetPdfProcessingWeb(btn) {
        _runToolAction(btn, {
            method: 'resetAllPdfProcessingFromWeb',
            busyLabel: '停止中...',
            toMaint: true,
            confirmTitle: 'PDF読込処理の強制停止',
            confirmText: '実行中のすべてのPDF読み込み処理（指導計画・行事予定）を停止し、待機状態を解除します。よろしいですか？',
            confirmButton: '停止する'
        });
    }

    function clearDatabaseWeb(btn) {
        _runToolAction(btn, {
            method: 'clearDatabaseDataFromWeb',
            busyLabel: 'クリア中...',
            toMaint: true,
            danger: true,
            confirmTitle: 'データベースのクリア',
            confirmText: '「データベース」シートの入力内容（時程〜放課後）をすべてクリアします。この操作は元に戻せません。よろしいですか？',
            confirmButton: 'クリアする',
            onDone: function () {
                if (typeof loadWeeklyPlan === 'function' && STATE && STATE.mondayStr) {
                    try { loadWeeklyPlan(STATE.mondayStr); } catch (e) { }
                }
            }
        });
    }

</script>
