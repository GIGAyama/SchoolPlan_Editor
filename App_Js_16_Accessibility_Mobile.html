<script>
    'use strict';

    function p4MobileSwitchView(viewName) {
        if (!viewName) return;
        switchView(viewName);
        p4CloseMoreSheet(false);
    }

    function p4InjectMobileNavigation() {
        if (!document.getElementById('p4MobileNav')) {
            var nav = document.createElement('nav');
            nav.id = 'p4MobileNav';
            nav.className = 'p4-mobile-nav';
            nav.setAttribute('aria-label', 'スマートフォン用ナビゲーション');
            nav.innerHTML = '<button type="button" data-view="plan" onclick="p4MobileSwitchView(\'plan\')"><span class="material-symbols-outlined" aria-hidden="true">calendar_view_week</span><span>週案</span></button>'
                + '<button type="button" data-view="task" onclick="p4MobileSwitchView(\'task\')"><span class="material-symbols-outlined" aria-hidden="true">task_alt</span><span>タスク</span></button>'
                + '<button type="button" data-view="hours" onclick="p4MobileSwitchView(\'hours\')"><span class="material-symbols-outlined" aria-hidden="true">bar_chart</span><span>時数</span></button>'
                + '<button type="button" data-view="settings" onclick="p4MobileSwitchView(\'settings\')"><span class="material-symbols-outlined" aria-hidden="true">settings</span><span>設定</span></button>'
                + '<button type="button" data-action="more" aria-haspopup="dialog" aria-expanded="false" onclick="p4OpenMoreSheet()"><span class="material-symbols-outlined" aria-hidden="true">more_horiz</span><span>その他</span></button>';
            document.body.appendChild(nav);
        }

        if (!document.getElementById('p4MoreSheet')) {
            var sheet = document.createElement('div');
            sheet.id = 'p4MoreSheet';
            sheet.className = 'p4-more-sheet';
            sheet.setAttribute('role', 'dialog');
            sheet.setAttribute('aria-modal', 'true');
            sheet.setAttribute('aria-labelledby', 'p4MoreTitle');
            sheet.setAttribute('aria-hidden', 'true');
            sheet.innerHTML = '<div class="p4-more-panel" tabindex="-1">'
                + '<div class="p4-more-head"><span id="p4MoreTitle">その他の機能</span><button type="button" class="btn-icon" aria-label="その他の機能を閉じる" onclick="p4CloseMoreSheet(true)"><span class="material-symbols-outlined" aria-hidden="true">close</span></button></div>'
                + '<div class="p4-more-grid">'
                + '<button type="button" onclick="p4MobileSwitchView(\'events\')"><span class="material-symbols-outlined" aria-hidden="true">event</span>行事予定</button>'
                + '<button type="button" onclick="p4MobileSwitchView(\'unitmaster\')"><span class="material-symbols-outlined" aria-hidden="true">menu_book</span>単元マスタ</button>'
                + '<button type="button" onclick="p4MobileSwitchView(\'newsletter\')"><span class="material-symbols-outlined" aria-hidden="true">newspaper</span>学級通信</button>'
                + '<button type="button" onclick="p4MobileSwitchView(\'integration\')"><span class="material-symbols-outlined" aria-hidden="true">cable</span>PDF読み込み</button>'
                + '<button type="button" onclick="cycleTheme();p4CloseMoreSheet(false)"><span class="material-symbols-outlined" aria-hidden="true">brightness_auto</span>表示テーマ</button>'
                + '<button type="button" onclick="p4ToggleFocusMode();p4CloseMoreSheet(false)"><span class="material-symbols-outlined" aria-hidden="true">fullscreen</span>週案を全画面</button>'
                + '</div></div>';
            sheet.addEventListener('click', function (event) {
                if (event.target === sheet) p4CloseMoreSheet(true);
            });
            sheet.addEventListener('keydown', p4MoreSheetKeydown);
            document.body.appendChild(sheet);
        }
        p4SyncMobileNavigation();
    }

    function p4OpenMoreSheet() {
        var sheet = document.getElementById('p4MoreSheet');
        var trigger = document.querySelector('#p4MobileNav [data-action="more"]');
        if (!sheet) return;
        P4.lastFocus = document.activeElement;
        P4.moreOpen = true;
        sheet.classList.add('open');
        sheet.setAttribute('aria-hidden', 'false');
        if (trigger) trigger.setAttribute('aria-expanded', 'true');
        var panel = sheet.querySelector('.p4-more-panel');
        if (panel) panel.focus();
        p4Announce('その他の機能メニューを開きました');
    }

    function p4CloseMoreSheet(restoreFocus) {
        var sheet = document.getElementById('p4MoreSheet');
        var trigger = document.querySelector('#p4MobileNav [data-action="more"]');
        if (!sheet || !P4.moreOpen) return;
        P4.moreOpen = false;
        sheet.classList.remove('open');
        sheet.setAttribute('aria-hidden', 'true');
        if (trigger) trigger.setAttribute('aria-expanded', 'false');
        if (restoreFocus && P4.lastFocus && typeof P4.lastFocus.focus === 'function') P4.lastFocus.focus();
    }

    function p4MoreSheetKeydown(event) {
        if (event.key === 'Escape') {
            event.preventDefault();
            p4CloseMoreSheet(true);
            return;
        }
        if (event.key !== 'Tab') return;
        var sheet = document.getElementById('p4MoreSheet');
        var focusables = sheet ? Array.prototype.slice.call(sheet.querySelectorAll('button:not(:disabled), [tabindex]:not([tabindex="-1"])')) : [];
        if (!focusables.length) return;
        var first = focusables[0], last = focusables[focusables.length - 1];
        if (event.shiftKey && document.activeElement === first) { event.preventDefault(); last.focus(); }
        else if (!event.shiftKey && document.activeElement === last) { event.preventDefault(); first.focus(); }
    }

    function p4SyncMobileNavigation() {
        document.querySelectorAll('#p4MobileNav [data-view]').forEach(function (button) {
            var active = button.dataset.view === STATE.view;
            button.classList.toggle('active', active);
            if (active) button.setAttribute('aria-current', 'page');
            else button.removeAttribute('aria-current');
        });
        document.querySelectorAll('.header-nav .nav-btn[data-view]').forEach(function (button) {
            var active = button.dataset.view === STATE.view;
            button.setAttribute('aria-current', active ? 'page' : 'false');
            button.setAttribute('aria-pressed', active ? 'true' : 'false');
        });
    }

    function p4InjectTaskDrawerControls() {
        if (!document.getElementById('p4DrawerBackdrop')) {
            var backdrop = document.createElement('div');
            backdrop.id = 'p4DrawerBackdrop';
            backdrop.className = 'p4-drawer-backdrop';
            backdrop.setAttribute('aria-hidden', 'true');
            backdrop.addEventListener('click', function () {
                var sidebar = document.getElementById('weeklyTaskSidebar');
                if (sidebar && !sidebar.classList.contains('collapsed')) toggleTaskSidebar();
            });
            document.body.appendChild(backdrop);
        }
        if (!document.getElementById('p4TaskDrawerButton')) {
            var actions = document.querySelector('#view-plan .toolbar-actions');
            if (actions) {
                var button = document.createElement('button');
                button.id = 'p4TaskDrawerButton';
                button.type = 'button';
                button.className = 'btn btn-outline d-flex align-items-center gap-1';
                button.style.display = 'none';
                button.setAttribute('aria-controls', 'weeklyTaskSidebar');
                button.setAttribute('aria-expanded', 'false');
                button.innerHTML = '<span class="material-symbols-outlined" aria-hidden="true">view_sidebar</span><span>今週のタスク</span>';
                button.addEventListener('click', toggleTaskSidebar);
                actions.insertBefore(button, actions.firstChild);
            }
        }
    }

    function p4SyncTaskDrawer() {
        var sidebar = document.getElementById('weeklyTaskSidebar');
        var backdrop = document.getElementById('p4DrawerBackdrop');
        var button = document.getElementById('p4TaskDrawerButton');
        var tablet = P4.tabletQuery.matches;
        if (button) button.style.display = tablet ? 'inline-flex' : 'none';
        if (!sidebar) return;
        var open = tablet && !sidebar.classList.contains('collapsed');
        sidebar.setAttribute('aria-hidden', open || !tablet ? 'false' : 'true');
        if (button) button.setAttribute('aria-expanded', open ? 'true' : 'false');
        if (backdrop) {
            backdrop.classList.toggle('open', open);
            backdrop.setAttribute('aria-hidden', open ? 'false' : 'true');
        }
        var originalButton = sidebar.querySelector('.weekly-task-toggle-btn');
        if (originalButton) originalButton.setAttribute('aria-expanded', open ? 'true' : 'false');
    }

    function p4InstallTaskDrawerWrapper() {
        if (window.__p4TaskDrawerWrapped || typeof window.toggleTaskSidebar !== 'function') return;
        window.__p4TaskDrawerWrapped = true;
        var original = window.toggleTaskSidebar;
        window.toggleTaskSidebar = function () {
            original();
            p4SyncTaskDrawer();
            var sidebar = document.getElementById('weeklyTaskSidebar');
            p4Announce(sidebar && sidebar.classList.contains('collapsed') ? '今週のタスクを閉じました' : '今週のタスクを開きました');
        };
    }

    function p4EnhanceToolbarMenus() {
        document.addEventListener('keydown', function (event) {
            var toggle = event.target.closest && event.target.closest('.tb-dropdown-toggle');
            if (toggle && (event.key === 'ArrowDown' || event.key === 'Enter' || event.key === ' ')) {
                event.preventDefault();
                var dropdown = toggle.closest('.tb-dropdown');
                if (!dropdown.classList.contains('open')) toggleToolbarDropdown(toggle);
                toggle.setAttribute('aria-expanded', 'true');
                var first = dropdown.querySelector('.tb-menu-item:not(:disabled)');
                if (first) first.focus();
                return;
            }
            var item = event.target.closest && event.target.closest('.tb-menu-item');
            if (!item) return;
            var menu = item.closest('.tb-menu');
            var items = Array.prototype.filter.call(menu.querySelectorAll('.tb-menu-item:not(:disabled)'), function (el) { return el.offsetParent !== null; });
            var index = items.indexOf(item);
            if (event.key === 'ArrowDown') { event.preventDefault(); items[(index + 1) % items.length].focus(); }
            else if (event.key === 'ArrowUp') { event.preventDefault(); items[(index - 1 + items.length) % items.length].focus(); }
            else if (event.key === 'Home') { event.preventDefault(); items[0].focus(); }
            else if (event.key === 'End') { event.preventDefault(); items[items.length - 1].focus(); }
            else if (event.key === 'Escape') {
                event.preventDefault();
                var parent = item.closest('.tb-dropdown');
                parent.classList.remove('open');
                var parentToggle = parent.querySelector('.tb-dropdown-toggle');
                if (parentToggle) { parentToggle.setAttribute('aria-expanded', 'false'); parentToggle.focus(); }
            }
        });
    }

    function p4InstallDaySwipe() {
        var wrapper = document.querySelector('#view-plan .week-grid-wrapper');
        if (!wrapper || wrapper.__p4SwipeInstalled) return;
        wrapper.__p4SwipeInstalled = true;
        var startX = 0, startY = 0, startTime = 0;
        wrapper.addEventListener('touchstart', function (event) {
            if (!P4.mobileQuery.matches || P4.prefs.singleDay === 'scroll' || event.touches.length !== 1) return;
            startX = event.touches[0].clientX;
            startY = event.touches[0].clientY;
            startTime = Date.now();
        }, { passive: true });
        wrapper.addEventListener('touchend', function (event) {
            if (!startTime || !P4.mobileQuery.matches || P4.prefs.singleDay === 'scroll') return;
            var touch = event.changedTouches[0];
            var dx = touch.clientX - startX;
            var dy = touch.clientY - startY;
            var elapsed = Date.now() - startTime;
            startTime = 0;
            if (elapsed > 700 || Math.abs(dx) < 65 || Math.abs(dy) > Math.abs(dx) * 0.7) return;
            var visible = p4VisibleDayIndexes();
            var current = visible.indexOf(P4.activeMobileDay);
            var next = current + (dx < 0 ? 1 : -1);
            if (next >= 0 && next < visible.length) p4SetActiveMobileDay(visible[next], true);
        }, { passive: true });
    }

    function p4ScaleNewsletter() {
        var page = document.getElementById('nwEditorPage');
        var scroller = document.querySelector('.nw-page-scroll');
        if (!page || !scroller) return;
        if (!P4.mobileQuery.matches) {
            page.style.transform = '';
            page.style.marginBottom = '';
            return;
        }
        var naturalWidth = page.offsetWidth;
        if (!naturalWidth) return;
        var scale = Math.min(1, Math.max(0.42, (scroller.clientWidth - 16) / naturalWidth));
        page.style.transform = 'scale(' + scale.toFixed(3) + ')';
        page.style.transformOrigin = 'top center';
        page.style.marginBottom = (-page.offsetHeight * (1 - scale)) + 'px';
    }

    function p4UpdateViewportSize() {
        var viewport = window.visualViewport;
        var height = viewport ? viewport.height : window.innerHeight;
        document.documentElement.style.setProperty('--p4-viewport-height', height + 'px');
    }

    function p4ApplyResponsiveLayout() {
        p4UpdateViewportSize();
        if (typeof p4ApplyGridResponsiveMode === 'function') p4ApplyGridResponsiveMode();
        p4SyncTaskDrawer();
        p4SyncMobileNavigation();
        p4ScaleNewsletter();
        var focus = document.getElementById('p4FocusToggle');
        if (focus) focus.style.display = STATE.view === 'plan' ? 'inline-flex' : 'none';
    }

    function p4InstallResponsiveListeners() {
        var update = function () { window.requestAnimationFrame(p4ApplyResponsiveLayout); };
        if (P4.mobileQuery.addEventListener) P4.mobileQuery.addEventListener('change', update);
        else P4.mobileQuery.addListener(update);
        if (P4.tabletQuery.addEventListener) P4.tabletQuery.addEventListener('change', update);
        else P4.tabletQuery.addListener(update);
        window.addEventListener('resize', update, { passive: true });
        window.addEventListener('orientationchange', update, { passive: true });
        if (window.visualViewport) {
            window.visualViewport.addEventListener('resize', update, { passive: true });
            window.visualViewport.addEventListener('scroll', update, { passive: true });
        }
    }

    function p4InstallMobileLayer() {
        if (window.__p4MobileInstalled) return;
        window.__p4MobileInstalled = true;
        p4InjectMobileNavigation();
        p4InjectTaskDrawerControls();
        p4InstallTaskDrawerWrapper();
        p4EnhanceToolbarMenus();
        p4InstallDaySwipe();
        p4InstallResponsiveListeners();
        p4ApplyResponsiveLayout();
    }

    p4InstallCore();
    p4InstallGridAccessibility();
    p4InstallMobileLayer();
</script>
