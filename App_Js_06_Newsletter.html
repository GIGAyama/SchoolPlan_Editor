<script>
    'use strict';
    // ===== 学級通信ブロックエディタ (NW module) =====
    var NW_FONTS = [
        { label: '丸ゴシック', value: "'Zen Maru Gothic', sans-serif" },
        { label: 'ゴシック', value: "'Noto Sans JP', sans-serif" },
        { label: '明朝体', value: "'Noto Serif JP', serif" },
        { label: '教科書体', value: "'Klee One', cursive" },
        { label: '手書き風', value: "'Yusei Magic', cursive" }
    ];

    // WordArt: エフェクト自由組み合わせ式のデフォルト色リスト
    var NW_WA_GRAD_PRESETS = [
        { c1: '#ff0000', c2: '#0000ff', label: '赤→青' },
        { c1: '#ff8c00', c2: '#ff006e', label: '橙→桃' },
        { c1: '#ffd700', c2: '#b8860b', label: 'ゴールド' },
        { c1: '#00c853', c2: '#0077b6', label: '緑→青' },
        { c1: '#ff2e7e', c2: '#ffcce0', label: '桜' },
        { c1: '#240046', c2: '#c77dff', label: '紫' },
        { c1: '#ff0000', c2: '#9c27b0', label: '虹', extra: ',#ff8c00,#ffd700,#00c853,#2196f3' }
    ];

    var NW = {
        blocks: [],
        nextId: 1,
        mondayStr: null,
        dragId: null,
        scheduleData: null,
        initialized: false,
        _saveTimer: null,
        // Undo/Redo
        _history: [],
        _historyIdx: -1,
        _historyMax: 50,
        _skipHistory: false
    };

    NW.init = function () {
        if (NW.initialized) return;
        NW.mondayStr = STATE.mondayStr;
        if (NW.mondayStr) {
            document.getElementById('nwWeekLabel').textContent = NW.mondayStr + '週';
        }
        // Event delegation: click to select/deselect blocks
        document.getElementById('nwEditorPage').addEventListener('click', function (e) {
            var blockEl = e.target.closest('.nw-block');
            document.querySelectorAll('.nw-block.nw-block-selected').forEach(function (el) {
                if (el !== blockEl) el.classList.remove('nw-block-selected');
            });
            if (blockEl) blockEl.classList.add('nw-block-selected');
        });
        // Keyboard shortcuts
        document.addEventListener('keydown', function (e) {
            if (STATE.view !== 'newsletter') return;
            var mod = e.ctrlKey || e.metaKey;
            if (!mod) return;
            var k = e.key.toLowerCase();
            // Ctrl+Z = undo, Ctrl+Shift+Z / Ctrl+Y = redo
            if (k === 'z' && !e.shiftKey) { e.preventDefault(); NW.undo(); return; }
            if ((k === 'z' && e.shiftKey) || k === 'y') { e.preventDefault(); NW.redo(); return; }
            if (k === 's') { e.preventDefault(); NW.saveToSheet(); return; }
            if (k === 'p') { e.preventDefault(); NW.printNewsletter(); return; }
        });
        // Restore from localStorage if available
        if (NW.blocks.length === 0) NW.autoRestore();
        NW.pushHistory(); // initial state
        NW.initialized = true;
    };

    // ---- Undo / Redo ----
    NW.pushHistory = function () {
        if (NW._skipHistory) return;
        NW.saveEditable();
        var snap = JSON.stringify({ blocks: NW.blocks, nextId: NW.nextId });
        // Don't push duplicate
        if (NW._historyIdx >= 0 && NW._history[NW._historyIdx] === snap) return;
        NW._history = NW._history.slice(0, NW._historyIdx + 1);
        NW._history.push(snap);
        if (NW._history.length > NW._historyMax) NW._history.shift();
        NW._historyIdx = NW._history.length - 1;
    };

    NW.undo = function () {
        if (NW._historyIdx <= 0) { showToast('info', '元に戻せません'); return; }
        NW.saveEditable();
        NW._historyIdx--;
        NW._restoreHistory();
    };

    NW.redo = function () {
        if (NW._historyIdx >= NW._history.length - 1) { showToast('info', 'やり直せません'); return; }
        NW.saveEditable(); // undoと対称に、編集中の内容を破棄しない
        NW._historyIdx++;
        NW._restoreHistory();
    };

    NW._restoreHistory = function () {
        var snap = JSON.parse(NW._history[NW._historyIdx]);
        NW._skipHistory = true;
        NW.blocks = snap.blocks;
        NW.nextId = snap.nextId;
        NW.render();
        NW._skipHistory = false;
    };

    NW.navWeek = function (delta) {
        var base = NW.mondayStr || STATE.mondayStr;
        if (!base) return;
        var parts = base.split('/');
        var d = new Date(+parts[0], +parts[1] - 1, +parts[2]);
        d.setDate(d.getDate() + delta * 7);
        NW.mondayStr = formatDateLocal(d);
        document.getElementById('nwWeekLabel').textContent = NW.mondayStr + '週';
    };

    NW.genId = function () { return 'nwb-' + (NW.nextId++); };

    // ---- Block CRUD ----
    NW.addBlock = function (type, afterId, data) {
        NW.pushHistory();
        var block = { id: NW.genId(), type: type };
        data = data || {};
        switch (type) {
            case 'heading':
                block.content = data.content || '見出し';
                block.fontSize = data.fontSize || 18;
                block.align = data.align || 'center';
                block.bold = data.bold !== undefined ? data.bold : true;
                block.fontFamily = data.fontFamily || '';
                block.color = data.color || '';
                block.bgColor = data.bgColor || '';
                break;
            case 'text':
                block.content = data.content || '';
                block.fontSize = data.fontSize || 12;
                block.align = data.align || 'left';
                block.bold = !!data.bold;
                block.fontFamily = data.fontFamily || '';
                block.color = data.color || '';
                block.bgColor = data.bgColor || '';
                break;
            case 'image':
                block.src = data.src || '';
                block.width = data.width || 50;
                block.float = data.float || 'none';
                block.wrapText = data.wrapText || '';
                block.wrapAlign = data.wrapAlign || 'left';
                block.wrapFontSize = data.wrapFontSize || 12;
                block.wrapFontFamily = data.wrapFontFamily || '';
                block.wrapBold = !!data.wrapBold;
                block.wrapColor = data.wrapColor || '';
                block.caption = data.caption || '';
                break;
            case 'gallery':
                block.images = data.images || [];
                block.columns = data.columns || 2;
                break;
            case 'schedule':
                block.weekData = data.weekData || null;
                block.cellOverrides = data.cellOverrides || {};
                block.options = {
                    showRecess: true,
                    showAfterSchool: true,
                    showHomework: true,
                    showItems: true,
                    showSaturday: false,
                    hiddenPeriods: [],
                    displayMode: 'subject'
                };
                if (data.options) {
                    for (var k in data.options) block.options[k] = data.options[k];
                }
                break;
            case 'qrcode':
                block.url = data.url || '';
                block.qrSize = data.qrSize || 200;
                block.label = data.label || '';
                break;
            case 'divider':
                break;
            case 'columns':
                block.columns = data.columns || 2;
                block.colData = data.colData || [];
                // Initialize columns with empty data
                while (block.colData.length < block.columns) {
                    block.colData.push({ content: '', src: '', caption: '' });
                }
                block.colRatio = data.colRatio || 'equal';
                break;
            case 'wordart':
                block.content = data.content || 'ワードアート';
                block.fontSize = data.fontSize || 48;
                block.align = data.align || 'center';
                block.fontFamily = data.fontFamily || '';
                block.waColor = data.waColor || '#202124';
                block.waGradient = data.waGradient || false;
                block.waGradC1 = data.waGradC1 || '#ff0000';
                block.waGradC2 = data.waGradC2 || '#0000ff';
                block.waGradAngle = data.waGradAngle || 135;
                block.waGradExtra = data.waGradExtra || '';
                block.waStroke = data.waStroke || false;
                block.waStrokeColor = data.waStrokeColor || '#1a73e8';
                block.waStrokeWidth = data.waStrokeWidth || 3;
                block.waShadow = data.waShadow || false;
                block.waShadowColor = data.waShadowColor || '#888888';
                block.waShadowX = data.waShadowX || 3;
                block.waShadowY = data.waShadowY || 3;
                block.waShadowBlur = data.waShadowBlur || 6;
                block.wa3d = data.wa3d || false;
                block.wa3dColor = data.wa3dColor || '#c0392b';
                block.wa3dDepth = data.wa3dDepth || 5;
                block.waBgDark = data.waBgDark || false;
                block.waSpacing = data.waSpacing || 2;
                break;
        }
        // Block decoration (all block types)
        block.borderColor = data.borderColor || '';
        block.borderRadius = data.borderRadius || 0;
        block.blockBgColor = data.blockBgColor || '';
        if (afterId) {
            var idx = NW.blocks.findIndex(function (b) { return b.id === afterId; });
            NW.blocks.splice(idx + 1, 0, block);
        } else {
            NW.blocks.push(block);
        }
        NW.render();
        return block;
    };

    NW.removeBlock = function (id) {
        NW.pushHistory();
        NW.blocks = NW.blocks.filter(function (b) { return b.id !== id; });
        NW.render();
    };

    NW.moveBlock = function (id, dir) {
        var idx = NW.blocks.findIndex(function (b) { return b.id === id; });
        if (idx < 0) return;
        var newIdx = idx + dir;
        if (newIdx < 0 || newIdx >= NW.blocks.length) return;
        NW.pushHistory();
        NW.saveEditable();
        var tmp = NW.blocks[idx];
        NW.blocks[idx] = NW.blocks[newIdx];
        NW.blocks[newIdx] = tmp;
        NW.render();
    };

    NW.duplicateBlock = function (id) {
        var orig = NW.blocks.find(function (b) { return b.id === id; });
        if (!orig) return;
        NW.pushHistory();
        NW.saveEditable();
        var clone = JSON.parse(JSON.stringify(orig));
        clone.id = NW.genId();
        var idx = NW.blocks.findIndex(function (b) { return b.id === id; });
        NW.blocks.splice(idx + 1, 0, clone);
        NW.render();
    };

    // ---- Save contenteditable before re-render ----
    NW.saveEditable = function () {
        NW.blocks.forEach(function (block) {
            if (block.type === 'heading' || block.type === 'text') {
                var el = document.querySelector('[data-block-id="' + block.id + '"] [contenteditable]');
                if (el) block.content = el.innerHTML;
            }
            if (block.type === 'image' && block.float !== 'none') {
                var wt = document.querySelector('[data-block-id="' + block.id + '"] .nw-float-text-side');
                if (wt) block.wrapText = wt.innerHTML;
            }
            if (block.type === 'gallery') {
                var cells = document.querySelectorAll('[data-block-id="' + block.id + '"] .nw-gallery-caption');
                cells.forEach(function (cap, i) {
                    if (block.images[i]) block.images[i].caption = cap.innerHTML;
                });
            }
            if (block.type === 'qrcode') {
                var ql = document.querySelector('[data-block-id="' + block.id + '"] .nw-qrcode-label');
                if (ql) block.label = ql.innerHTML;
            }
            if (block.type === 'image') {
                var capEl = document.querySelector('[data-block-id="' + block.id + '"] .nw-image-caption');
                if (capEl) block.caption = capEl.innerHTML;
            }
            if (block.type === 'columns') {
                var colCells = document.querySelectorAll('[data-block-id="' + block.id + '"] .nw-col-text');
                colCells.forEach(function (cell, i) {
                    if (block.colData[i]) block.colData[i].content = cell.innerHTML;
                });
            }
        });
    };

    // ---- Rendering ----
    NW.render = function () {
        NW.saveEditable();
        var page = document.getElementById('nwEditorPage');
        if (NW.blocks.length === 0) {
            page.innerHTML = '<div class="nw-empty-editor" id="nwEmptyState">'
                + '<span class="material-symbols-outlined" style="font-size:48px;opacity:0.3;display:block;margin-bottom:12px;">newspaper</span>'
                + '<p style="margin-bottom:16px;">ブロックを追加して学級通信を作成しましょう</p>'
                + '<div class="nw-quickstart">'
                + '<button class="nw-quickstart-btn" onclick="NW.quickStart(\'basic\')">'
                + '<span class="material-symbols-outlined">article</span><span>基本レイアウト</span>'
                + '<small>見出し+テキスト+区切り線</small></button>'
                + '<button class="nw-quickstart-btn" onclick="NW.quickStart(\'schedule\')">'
                + '<span class="material-symbols-outlined">calendar_month</span><span>時間割付き</span>'
                + '<small>見出し+時間割+テキスト</small></button>'
                + '<button class="nw-quickstart-btn" onclick="NW.quickStart(\'photo\')">'
                + '<span class="material-symbols-outlined">photo_library</span><span>写真レイアウト</span>'
                + '<small>見出し+段組み+ギャラリー</small></button>'
                + '<button class="nw-quickstart-btn nw-quickstart-ai" onclick="NW.generateFullNewsletter()">'
                + '<span class="material-symbols-outlined">auto_awesome</span><span>AIで一括生成</span>'
                + '<small>AIが通信全体を自動作成</small></button>'
                + '</div></div>';
            NW.autoSave();
            return;
        }
        page.innerHTML = '';
        // Insert button at the top
        page.appendChild(NW._createInsertBtn(null));
        NW.blocks.forEach(function (block) {
            page.appendChild(NW.renderBlock(block));
            // Insert button after each block
            page.appendChild(NW._createInsertBtn(block.id));
        });
        NW.autoSave();
        // Render A4 page break markers
        NW.renderPageBreaks();
    };

    // ---- Insert button between blocks ----
    NW._createInsertBtn = function (afterId) {
        var wrapper = document.createElement('div');
        wrapper.className = 'nw-insert-row';
        var btn = document.createElement('button');
        btn.className = 'nw-insert-btn';
        btn.innerHTML = '<span class="material-symbols-outlined">add</span>';
        btn.title = 'ブロックを挿入';
        btn.addEventListener('click', function (e) {
            e.stopPropagation();
            NW._showInsertMenu(afterId, btn);
        });
        wrapper.appendChild(btn);
        return wrapper;
    };

    NW._showInsertMenu = function (afterId, anchorEl) {
        var items = [
            { type: 'heading', icon: 'title', label: '見出し' },
            { type: 'text', icon: 'notes', label: 'テキスト' },
            { type: 'image', icon: 'image', label: '画像' },
            { type: 'columns', icon: 'view_column', label: '段組み' },
            { type: 'gallery', icon: 'auto_awesome_mosaic', label: 'ギャラリー' },
            { type: 'schedule', icon: 'calendar_month', label: '時間割' },
            { type: 'divider', icon: 'horizontal_rule', label: '区切り線' },
            { type: 'qrcode', icon: 'qr_code_2', label: 'QRコード' },
            { type: 'wordart', icon: 'title', label: 'ワードアート' }
        ];
        var html = '<div class="nw-insert-menu-grid">';
        items.forEach(function (it) {
            html += '<button class="nw-insert-menu-item" data-type="' + it.type + '">'
                + '<span class="material-symbols-outlined">' + it.icon + '</span>' + it.label + '</button>';
        });
        html += '</div>';
        Swal.fire({
            html: html,
            showConfirmButton: false,
            showCloseButton: true,
            width: 340,
            customClass: { popup: 'nw-insert-popup' },
            didOpen: function (popup) {
                popup.querySelectorAll('.nw-insert-menu-item').forEach(function (btn) {
                    btn.addEventListener('click', function () {
                        Swal.close();
                        NW.addBlock(btn.getAttribute('data-type'), afterId);
                    });
                });
            }
        });
    };

    // ---- Quick-start layouts ----
    NW.quickStart = function (preset) {
        NW.blocks = [];
        NW.nextId = 1;
        switch (preset) {
            case 'basic':
                NW.addBlock('heading', null, { content: '学級通信', fontSize: 20, align: 'center' });
                NW.addBlock('text', null, { content: '', fontSize: 11, align: 'center' });
                NW.addBlock('divider');
                NW.addBlock('text', null, { content: '', fontSize: 12 });
                NW.addBlock('divider');
                NW.addBlock('text', null, { content: '', fontSize: 12 });
                break;
            case 'schedule':
                NW.addBlock('heading', null, { content: '学級通信', fontSize: 20, align: 'center' });
                NW.addBlock('text', null, { content: '', fontSize: 11, align: 'center' });
                NW.addBlock('divider');
                NW.addBlock('text', null, { content: '', fontSize: 12 });
                NW.addBlock('divider');
                NW.addBlock('schedule');
                NW.addBlock('divider');
                NW.addBlock('text', null, { content: '', fontSize: 12 });
                break;
            case 'photo':
                NW.addBlock('heading', null, { content: '学級通信', fontSize: 20, align: 'center' });
                NW.addBlock('text', null, { content: '', fontSize: 11, align: 'center' });
                NW.addBlock('divider');
                NW.addBlock('columns', null, { columns: 2 });
                NW.addBlock('divider');
                NW.addBlock('gallery', null, { columns: 3 });
                NW.addBlock('divider');
                NW.addBlock('text', null, { content: '', fontSize: 12 });
                break;
        }
        NW._history = [];
        NW._historyIdx = -1;
        NW.pushHistory();
        showToast('success', 'レイアウトを作成しました');
    };

    NW.renderPageBreaks = function () {
        var page = document.getElementById('nwEditorPage');
        page.querySelectorAll('.nw-page-break-marker').forEach(function (el) { el.remove(); });
        // Derive px-per-mm from the known CSS padding-top (15mm)
        var cs = window.getComputedStyle(page);
        var paddingTopPx = parseFloat(cs.paddingTop);
        if (!paddingTopPx || paddingTopPx <= 0) return;
        var mmToPx = paddingTopPx / 15; // padding-top = 15mm
        // Print uses @page{margin:15mm 18mm}, printable height = 267mm per page
        var pageContentH = 267 * mmToPx;
        var totalH = page.scrollHeight;
        // First break at paddingTop + 267mm; subsequent every 267mm
        for (var i = 1; ; i++) {
            var y = paddingTopPx + pageContentH * i;
            if (y >= totalH - 10) break;
            var marker = document.createElement('div');
            marker.className = 'nw-page-break-marker';
            marker.style.top = y + 'px';
            marker.setAttribute('data-page', 'ページ ' + i + ' / ' + (i + 1));
            page.appendChild(marker);
        }
    };

    /**
     * ブロック種別ごとの「書式設定ツールバー」HTML文字列を生成する純粋関数群。
     * いずれも block を読むだけで副作用なし。該当しない場合は空文字を返す。
     * （NW.renderBlock から機械的に抽出。出力は抽出前と完全一致することをNodeで検証済み）
     */
    NW.buildTextToolbar_ = function (block) {
        if (block.type !== 'heading' && block.type !== 'text') return '';
        var fmt = '<div class="nw-fmt-toolbar">'
            + '<select onchange="NW.setFontFamily(\'' + block.id + '\',this.value)" title="フォント">';
        fmt += '<option value=""' + (!block.fontFamily ? ' selected' : '') + '>標準</option>';
        NW_FONTS.forEach(function (f) {
            fmt += '<option value="' + f.value + '"' + (block.fontFamily === f.value ? ' selected' : '') + ' style="font-family:' + f.value + '">' + f.label + '</option>';
        });
        fmt += '</select>'
            + '<select onchange="NW.setFontSize(\'' + block.id + '\',this.value)" title="フォントサイズ">';
        [9, 10, 11, 12, 14, 16, 18, 20, 24, 28, 32, 36, 40, 48, 56, 64, 72].forEach(function (s) {
            fmt += '<option value="' + s + '"' + (s === block.fontSize ? ' selected' : '') + '>' + s + '</option>';
        });
        fmt += '</select>'
            + '<button title="太字" onclick="NW.toggleBold(\'' + block.id + '\')" class="' + (block.bold ? 'nw-active' : '') + '" style="font-weight:900">B</button>'
            + '<button title="左揃え" onclick="NW.setAlign(\'' + block.id + '\',\'left\')" class="' + (block.align === 'left' ? 'nw-active' : '') + '"><span class="material-symbols-outlined">format_align_left</span></button>'
            + '<button title="中央" onclick="NW.setAlign(\'' + block.id + '\',\'center\')" class="' + (block.align === 'center' ? 'nw-active' : '') + '"><span class="material-symbols-outlined">format_align_center</span></button>'
            + '<button title="右揃え" onclick="NW.setAlign(\'' + block.id + '\',\'right\')" class="' + (block.align === 'right' ? 'nw-active' : '') + '"><span class="material-symbols-outlined">format_align_right</span></button>'
            + '<div class="nw-act-sep"></div>'
            + '<button title="文字色" onclick="NW.pickColor(\'' + block.id + '\',\'color\')" style="position:relative;"><span class="material-symbols-outlined">format_color_text</span><span class="nw-color-dot" style="background:' + (block.color || '#202124') + ';"></span></button>'
            + '<button title="背景色" onclick="NW.pickColor(\'' + block.id + '\',\'bgColor\')" style="position:relative;"><span class="material-symbols-outlined">format_color_fill</span><span class="nw-color-dot" style="background:' + (block.bgColor || 'transparent') + ';border:1px solid #ccc;"></span></button>'
            + '<div class="nw-act-sep"></div>'
            + '<button title="AIでリライト" onclick="NW.aiRewriteBlock(\'' + block.id + '\')" class="nw-ai-btn"><span class="material-symbols-outlined">auto_awesome</span></button>'
            + '</div><div class="nw-act-sep"></div>';
        return fmt;
    };

    NW.buildWordartToolbar_ = function (block) {
        if (block.type !== 'wordart') return '';
        var bid = block.id;
        var waFmt = '<div class="nw-fmt-toolbar">'
            + '<select onchange="NW.waSet(\'' + bid + '\',\'fontFamily\',this.value)" title="フォント">';
        waFmt += '<option value=""' + (!block.fontFamily ? ' selected' : '') + '>標準</option>';
        NW_FONTS.forEach(function (f) {
            waFmt += '<option value="' + f.value + '"' + (block.fontFamily === f.value ? ' selected' : '') + '>' + f.label + '</option>';
        });
        waFmt += '</select>'
            + '<select onchange="NW.waSet(\'' + bid + '\',\'fontSize\',this.value)" title="サイズ">';
        [28, 32, 36, 40, 48, 56, 64, 72, 96].forEach(function (s) {
            waFmt += '<option value="' + s + '"' + (s === (block.fontSize || 48) ? ' selected' : '') + '>' + s + '</option>';
        });
        waFmt += '</select>'
            + '<button title="左揃え" onclick="NW.waSet(\'' + bid + '\',\'align\',\'left\')" class="' + (block.align === 'left' ? 'nw-active' : '') + '"><span class="material-symbols-outlined">format_align_left</span></button>'
            + '<button title="中央" onclick="NW.waSet(\'' + bid + '\',\'align\',\'center\')" class="' + (block.align === 'center' ? 'nw-active' : '') + '"><span class="material-symbols-outlined">format_align_center</span></button>'
            + '<button title="右揃え" onclick="NW.waSet(\'' + bid + '\',\'align\',\'right\')" class="' + (block.align === 'right' ? 'nw-active' : '') + '"><span class="material-symbols-outlined">format_align_right</span></button>'
            + '<div class="nw-act-sep"></div>'
            + '<button title="グラデーション" onclick="NW.waToggle(\'' + bid + '\',\'waGradient\')" class="nw-wa-fx-btn' + (block.waGradient ? ' nw-active' : '') + '"><span class="material-symbols-outlined">gradient</span></button>'
            + '<button title="アウトライン" onclick="NW.waToggle(\'' + bid + '\',\'waStroke\')" class="nw-wa-fx-btn' + (block.waStroke ? ' nw-active' : '') + '"><span class="material-symbols-outlined">border_color</span></button>'
            + '<button title="影" onclick="NW.waToggle(\'' + bid + '\',\'waShadow\')" class="nw-wa-fx-btn' + (block.waShadow ? ' nw-active' : '') + '"><span class="material-symbols-outlined">blur_on</span></button>'
            + '<button title="3D立体" onclick="NW.waToggle(\'' + bid + '\',\'wa3d\')" class="nw-wa-fx-btn' + (block.wa3d ? ' nw-active' : '') + '"><span class="material-symbols-outlined">view_in_ar</span></button>'
            + '<div class="nw-act-sep"></div>'

            + '<button title="右に画像" onclick="NW.setFloat(\'' + block.id + '\',\'right\')" class="' + (block.float === 'right' ? 'nw-active' : '') + '"><span class="material-symbols-outlined">format_image_right</span></button>'
            + '<select onchange="NW.setImageWidth(\'' + block.id + '\',this.value)" title="画像幅">';

                + '<select onchange="NW.setWrapFontSize(\'' + block.id + '\',this.value)" title="フォントサイズ">';

                imgFmt += '<option value="' + s + '"' + (s === (block.wrapFontSize || 12) ? ' selected' : '') + '>' + s + '</option>';
            });
            imgFmt += '</select>'
                + '<button title="太字" onclick="NW.toggleWrapBold(\'' + block.id + '\')" class="' + (block.wrapBold ? 'nw-active' : '') + '" style="font-weight:900">B</button>'
                + '<button title="左揃え" onclick="NW.setWrapAlign(\'' + block.id + '\',\'left\')" class="' + (block.wrapAlign === 'left' ? 'nw-active' : '') + '"><span class="material-symbols-outlined">format_align_left</span></button>'
                + '<button title="中央" onclick="NW.setWrapAlign(\'' + block.id + '\',\'center\')" class="' + (block.wrapAlign === 'center' ? 'nw-active' : '') + '"><span class="material-symbols-outlined">format_align_center</span></button>'
                + '<button title="右揃え" onclick="NW.setWrapAlign(\'' + block.id + '\',\'right\')" class="' + (block.wrapAlign === 'right' ? 'nw-active' : '') + '"><span class="material-symbols-outlined">format_align_right</span></button>'

                + '<button title="文字色" onclick="NW.pickColor(\'' + block.id + '\',\'wrapColor\')" style="position:relative;"><span class="material-symbols-outlined">format_color_text</span><span class="nw-color-dot" style="background:' + (block.wrapColor || '#202124') + ';"></span></button>'
                + '</div>';

    NW.buildQrcodeToolbar_ = function (block) {

    /** ブロック種別に応じた書式ツールバーHTMLをまとめて返す（該当1種のみ非空）。 */

        return NW.buildTextToolbar_(block)

    NW.renderBlock = function (block) {
        var wrapper = document.createElement('div');
        wrapper.className = 'nw-block';
        wrapper.setAttribute('data-block-id', block.id);
        wrapper.setAttribute('draggable', 'true');

        // Drag handle
        var handle = document.createElement('span');
        handle.className = 'nw-block-handle material-symbols-outlined';
        handle.textContent = 'drag_indicator';
        wrapper.appendChild(handle);

        // Action bar
        var actions = document.createElement('div');
        actions.className = 'nw-block-actions';

        // ブロック種別ごとの書式ツールバー（純粋関数で生成・該当種別のみ非空）
        var toolbarHtml = NW.buildBlockToolbar_(block);
        if (toolbarHtml) actions.insertAdjacentHTML('beforeend', toolbarHtml);

        // Common action buttons: decoration, up, down, duplicate, delete
        actions.insertAdjacentHTML('beforeend',
            '<button title="装飾" onclick="NW.openDecoration(\'' + block.id + '\')"><span class="material-symbols-outlined">palette</span></button>'
            + '<div class="nw-act-sep"></div>'
            + '<button title="上へ" onclick="NW.moveBlock(\'' + block.id + '\',-1)"><span class="material-symbols-outlined">arrow_upward</span></button>'
            + '<button title="下へ" onclick="NW.moveBlock(\'' + block.id + '\',1)"><span class="material-symbols-outlined">arrow_downward</span></button>'
            + '<button title="複製" onclick="NW.duplicateBlock(\'' + block.id + '\')"><span class="material-symbols-outlined">content_copy</span></button>'
            + '<button title="削除" onclick="NW.removeBlock(\'' + block.id + '\')"><span class="material-symbols-outlined">delete</span></button>');
        wrapper.appendChild(actions);

        // Apply block decoration via CSS custom properties (to avoid overriding hover/selected)
        if (block.blockBgColor) wrapper.style.background = block.blockBgColor;
        if (block.borderColor) {
            wrapper.setAttribute('data-deco-border', block.borderColor);
            wrapper.style.setProperty('--deco-border', block.borderColor);
        }
        if (block.borderRadius) wrapper.style.borderRadius = block.borderRadius + 'px';

        // Content area
        wrapper.appendChild(NW.renderContent(block));

        // Drag & drop events
        wrapper.addEventListener('dragstart', function (e) {
            NW.dragId = block.id;
            e.dataTransfer.effectAllowed = 'move';
            wrapper.style.opacity = '0.4';
        });
        wrapper.addEventListener('dragend', function () {
            wrapper.style.opacity = '1';
            NW.dragId = null;
            document.querySelectorAll('.nw-drag-over').forEach(function (el) { el.classList.remove('nw-drag-over'); });
        });
        wrapper.addEventListener('dragover', function (e) {
            e.preventDefault();
            e.dataTransfer.dropEffect = 'move';
            wrapper.classList.add('nw-drag-over');
        });
        wrapper.addEventListener('dragleave', function () {
            wrapper.classList.remove('nw-drag-over');
        });
        wrapper.addEventListener('drop', function (e) {
            e.preventDefault();
            wrapper.classList.remove('nw-drag-over');
            if (!NW.dragId || NW.dragId === block.id) return;
            NW.pushHistory();
            NW.saveEditable();
            var fromIdx = NW.blocks.findIndex(function (b) { return b.id === NW.dragId; });
            var toIdx = NW.blocks.findIndex(function (b) { return b.id === block.id; });
            if (fromIdx < 0 || toIdx < 0) return;
            var moved = NW.blocks.splice(fromIdx, 1)[0];
            NW.blocks.splice(toIdx, 0, moved);
            NW._skipHistory = true;
            NW.render();
            NW._skipHistory = false;
        });

        return wrapper;
    };

    NW.renderContent = function (block) {
        var div = document.createElement('div');
        switch (block.type) {
            case 'heading':
                div.className = 'nw-heading-content';
                div.contentEditable = 'true';
                div.innerHTML = block.content;
                div.style.fontSize = block.fontSize + 'px';
                div.style.textAlign = block.align;
                if (block.bold) div.style.fontWeight = '700';
                if (block.fontFamily) div.style.fontFamily = block.fontFamily;
                if (block.color) div.style.color = block.color;
                if (block.bgColor) div.style.backgroundColor = block.bgColor;
                div.setAttribute('data-placeholder', '見出しを入力...');
                div.addEventListener('blur', function () { block.content = div.innerHTML; });
                break;

            case 'text':
                div.className = 'nw-text-content';
                div.contentEditable = 'true';
                div.innerHTML = block.content;
                div.style.fontSize = block.fontSize + 'px';
                div.style.textAlign = block.align;
                if (block.bold) div.style.fontWeight = '700';
                if (block.fontFamily) div.style.fontFamily = block.fontFamily;
                if (block.color) div.style.color = block.color;
                if (block.bgColor) div.style.backgroundColor = block.bgColor;
                div.setAttribute('data-placeholder', 'テキストを入力...');
                div.addEventListener('blur', function () { block.content = div.innerHTML; });
                // Enter key → new text block below
                div.addEventListener('keydown', function (e) {
                    if (e.key === 'Enter' && !e.shiftKey) {
                        e.preventDefault();
                        block.content = div.innerHTML;
                        var newBlock = NW.addBlock('text', block.id);
                        setTimeout(function () {
                            var newEl = document.querySelector('[data-block-id="' + newBlock.id + '"] [contenteditable]');
                            if (newEl) newEl.focus();
                        }, 50);
                    }
                    // Backspace on empty → delete block
                    if (e.key === 'Backspace' && !div.textContent.trim() && !div.innerHTML.includes('<img')) {
                        e.preventDefault();
                        NW.removeBlock(block.id);
                    }
                });
                break;

            case 'image':
                div.className = 'nw-image-block';
                if (block.src) {
                    if (block.float !== 'none') {
                        // Float layout: image + text side by side
                        var floatDiv = document.createElement('div');
                        floatDiv.className = 'nw-float-wrapper' + (block.float === 'right' ? ' nw-float-right' : '');
                        var imgSide = document.createElement('div');
                        imgSide.className = 'nw-float-img-side';
                        imgSide.style.width = block.width + '%';
                        var img = document.createElement('img');
                        img.src = block.src;
                        img.style.width = '100%';
                        imgSide.appendChild(img);
                        var textSide = document.createElement('div');
                        textSide.className = 'nw-float-text-side';
                        textSide.contentEditable = 'true';
                        textSide.style.textAlign = block.wrapAlign || 'left';
                        textSide.style.fontSize = (block.wrapFontSize || 12) + 'px';
                        if (block.wrapFontFamily) textSide.style.fontFamily = block.wrapFontFamily;
                        if (block.wrapBold) textSide.style.fontWeight = '700';
                        if (block.wrapColor) textSide.style.color = block.wrapColor;
                        textSide.innerHTML = block.wrapText;
                        textSide.addEventListener('blur', function () { block.wrapText = textSide.innerHTML; });
                        floatDiv.appendChild(imgSide);
                        floatDiv.appendChild(textSide);
                        div.appendChild(floatDiv);
                    } else {
                        // Centered image, no wrapping
                        var imgEl = document.createElement('img');
                        imgEl.src = block.src;
                        imgEl.style.width = block.width + '%';
                        div.appendChild(imgEl);
                        // Image caption
                        var imgCap = document.createElement('div');
                        imgCap.className = 'nw-image-caption';
                        imgCap.contentEditable = 'true';
                        imgCap.innerHTML = block.caption || '';
                        imgCap.setAttribute('data-placeholder', 'キャプションを入力...');
                        imgCap.addEventListener('blur', function () { block.caption = imgCap.innerHTML; });
                        div.appendChild(imgCap);
                    }
                } else {
                    var ph = document.createElement('div');
                    ph.className = 'nw-image-placeholder';
                    ph.innerHTML = '<span class="material-symbols-outlined" style="font-size:32px;display:block;">add_photo_alternate</span>クリックして画像をアップロード';
                    ph.addEventListener('click', function () { NW.uploadImage(block.id); });
                    div.appendChild(ph);
                }
                break;

            case 'gallery':
                div.className = 'nw-gallery-grid';
                div.style.gridTemplateColumns = 'repeat(' + block.columns + ', 1fr)';
                block.images.forEach(function (img, i) {
                    var cell = document.createElement('div');
                    cell.className = 'nw-gallery-cell';
                    if (img.src) {
                        var imgEl = document.createElement('img');
                        imgEl.src = img.src;
                        cell.appendChild(imgEl);
                        var rmBtn = document.createElement('button');
                        rmBtn.className = 'nw-gallery-remove';
                        rmBtn.innerHTML = '&times;';
                        (function (idx) {
                            rmBtn.addEventListener('click', function (e) {
                                e.stopPropagation();
                                NW.removeGalleryImage(block.id, idx);
                            });
                        })(i);
                        cell.appendChild(rmBtn);
                    }
                    var cap = document.createElement('div');
                    cap.className = 'nw-gallery-caption';
                    cap.contentEditable = 'true';
                    cap.innerHTML = img.caption || '';
                    cap.addEventListener('blur', function () { img.caption = cap.innerHTML; });
                    cell.appendChild(cap);
                    div.appendChild(cell);
                });
                var addCell = document.createElement('div');
                addCell.className = 'nw-gallery-add';
                addCell.innerHTML = '<span class="material-symbols-outlined" style="font-size:28px;">add_photo_alternate</span>';
                addCell.addEventListener('click', function () { NW.addGalleryImage(block.id); });
                div.appendChild(addCell);
                break;

            case 'columns':
                div.className = 'nw-columns-block';
                var colGrid = document.createElement('div');
                colGrid.className = 'nw-columns-grid';
                // Calculate column widths based on ratio
                var colTemplate = 'repeat(' + block.columns + ', 1fr)';
                if (block.columns === 2) {
                    if (block.colRatio === '1:2') colTemplate = '1fr 2fr';
                    else if (block.colRatio === '2:1') colTemplate = '2fr 1fr';
                    else if (block.colRatio === '1:3') colTemplate = '1fr 3fr';
                    else if (block.colRatio === '3:1') colTemplate = '3fr 1fr';
                }
                colGrid.style.gridTemplateColumns = colTemplate;
                for (var ci = 0; ci < block.columns; ci++) {
                    var colCell = document.createElement('div');
                    colCell.className = 'nw-col-cell';
                    var colData = block.colData[ci] || { content: '', src: '', caption: '' };
                    // Image area
                    if (colData.src) {
                        var colImg = document.createElement('img');
                        colImg.src = colData.src;
                        colImg.className = 'nw-col-img';
                        colCell.appendChild(colImg);
                        var colImgRm = document.createElement('button');
                        colImgRm.className = 'nw-col-img-remove';
                        colImgRm.innerHTML = '&times;';
                        (function (idx) {
                            colImgRm.addEventListener('click', function (e) {
                                e.stopPropagation();
                                NW.pushHistory();
                                block.colData[idx].src = '';
                                NW.render();
                            });
                        })(ci);
                        colCell.appendChild(colImgRm);
                    } else {
                        var colImgPh = document.createElement('div');
                        colImgPh.className = 'nw-col-img-placeholder';
                        colImgPh.innerHTML = '<span class="material-symbols-outlined" style="font-size:22px;">add_photo_alternate</span>';
                        (function (idx) {
                            colImgPh.addEventListener('click', function () { NW.uploadColumnImage(block.id, idx); });
                        })(ci);
                        colCell.appendChild(colImgPh);
                    }
                    // Text area
                    var colText = document.createElement('div');
                    colText.className = 'nw-col-text';
                    colText.contentEditable = 'true';
                    colText.innerHTML = colData.content || '';
                    colText.setAttribute('data-placeholder', 'テキストを入力...');
                    (function (idx) {
                        colText.addEventListener('blur', function () {
                            if (block.colData[idx]) block.colData[idx].content = colText.innerHTML;
                        });
                    })(ci);
                    colCell.appendChild(colText);
                    colGrid.appendChild(colCell);
                }
                div.appendChild(colGrid);
                break;

            case 'schedule':
                div.className = 'nw-schedule-block';
                div.innerHTML = NW.renderScheduleHTML(block);
                break;

            case 'qrcode':
                div.className = 'nw-qrcode-block';
                if (block.url) {
                    var qrImg = document.createElement('img');
                    qrImg.src = 'https://api.qrserver.com/v1/create-qr-code/?size=' + block.qrSize + 'x' + block.qrSize + '&data=' + encodeURIComponent(block.url);
                    qrImg.alt = 'QR Code';
                    qrImg.style.width = block.qrSize + 'px';
                    qrImg.style.cursor = 'pointer';
                    qrImg.title = 'クリックしてQRコードを編集';
                    (function (bid) { qrImg.addEventListener('click', function () { NW.editQrCode(bid); }); })(block.id);
                    div.appendChild(qrImg);
                    var lbl = document.createElement('div');
                    lbl.className = 'nw-qrcode-label';
                    lbl.contentEditable = 'true';
                    lbl.innerHTML = block.label || '';
                    lbl.addEventListener('blur', function () { block.label = lbl.innerHTML; });
                    div.appendChild(lbl);
                } else {
                    var qrPh = document.createElement('div');
                    qrPh.className = 'nw-image-placeholder';
                    qrPh.innerHTML = '<span class="material-symbols-outlined" style="font-size:32px;display:block;">qr_code_2</span>クリックしてURLを入力';
                    qrPh.addEventListener('click', function () { NW.editQrCode(block.id); });
                    div.appendChild(qrPh);
                }
                break;

            case 'divider':
                div.innerHTML = '<hr class="nw-divider-content">';
                break;

            case 'wordart':
                div.className = 'nw-wordart-block';
                if (block.waBgDark) { div.style.background = '#1a1a2e'; div.style.borderRadius = '8px'; div.style.padding = '16px 8px'; }
                var waText = document.createElement('div');
                waText.className = 'nw-wordart-text';
                waText.textContent = block.content || 'ワードアート';
                waText.style.fontSize = (block.fontSize || 48) + 'px';
                waText.style.textAlign = block.align || 'center';
                waText.style.fontWeight = '900';
                waText.style.lineHeight = '1.3';
                if (block.fontFamily) waText.style.fontFamily = block.fontFamily;
                if (block.waSpacing) waText.style.letterSpacing = block.waSpacing + 'px';
                NW._applyWordArtFx(waText, block);
                waText.style.cursor = 'pointer';
                waText.title = 'クリックしてテキストを編集';
                (function (bid) { waText.addEventListener('click', function () { NW.editWordArt(bid); }); })(block.id);
                div.appendChild(waText);
                break;
        }
        return div;
    };

    // ---- 1年生用: 教科名ひらがな変換マップ ----
    var SUBJECT_HIRAGANA_MAP = {
        '国語': 'こくご',
        '算数': 'さんすう',
        '生活': 'せいかつ',
        '音楽': 'おんがく',
        '図画工作': 'ずがこうさく',
        '体育': 'たいいく',
        '道徳': 'どうとく',
        '学活': 'がっかつ',
        '図工': 'ずこう',
        '図書': 'としょ',
        '書写': 'しょしゃ',
        '行事': 'ぎょうじ'
    };

    /**
     * 学年が1年の場合、教科名をひらがなに変換します。
     * 分数付き複数教科（例: "国語1/3　音楽2/3"）は分数を除去し
     * 各教科をひらがなに変換して"／"で結合します（例: "こくご／おんがく"）。
     * マップにない教科名はそのまま返します。
     */
    function subjectToHiragana(name) {
        if (STATE.grade !== 1 || !name) return name;
        // 直接マッチする場合はそのまま返す
        if (SUBJECT_HIRAGANA_MAP[name]) return SUBJECT_HIRAGANA_MAP[name];
        // 分数付き複数教科の解析（例: "国語1/3　音楽2/3"）
        var normalized = name.toString().trim().replace(/　/g, ' ');
        var regex = /([^\s\d\/\.]+)(?:\s*(?:\d+\/\d+|\d+\.\d+))?/g;
        var match;
        var subjects = [];
        while ((match = regex.exec(normalized)) !== null) {
            var subj = match[1].trim();
            if (subj) subjects.push(SUBJECT_HIRAGANA_MAP[subj] || subj);
        }
        if (subjects.length > 0) return subjects.join('／');
        return name;
    }

    // ---- Schedule table rendering (transposed: days=columns, periods=rows) ----
    NW.renderScheduleHTML = function (block) {
        var data = block.weekData || NW.scheduleData;
        if (!data || !data.days) {
            return '<div style="color:var(--text-hint);text-align:center;padding:16px;">'
                + '「予定を読込」をクリックして週案データを読み込んでください</div>';
        }
        var opts = block.options;
        var days = data.days.slice(0, opts.showSaturday ? 6 : 5);
        var bid = block.id;

        // Helper: render cell content based on displayMode
        function cellContent(per) {
            if (!per || !per.subject) return '';
            var c = escHtml(subjectToHiragana(per.subject));
            if (opts.displayMode === 'subjectUnit' && per.unit) {
                c += '<br><span class="nw-sched-sub">' + escHtml(per.unit) + '</span>';
            } else if (opts.displayMode === 'full') {
                if (per.unit) c += '<br><span class="nw-sched-sub">' + escHtml(per.unit) + '</span>';
                if (per.content) c += '<br><span class="nw-sched-detail">' + escHtml(per.content) + '</span>';
            }
            return c;
        }

        // Header row: blank + day columns
        var html = '<table><thead><tr><th class="nw-sched-label-col"></th>';
        days.forEach(function (day) {
            html += '<th>' + escHtml(day.dayLabel) + '<br><span class="nw-sched-date">' + escHtml(day.date.slice(5)) + '</span></th>';
        });
        html += '</tr></thead><tbody>';

        var overrides = block.cellOverrides || {};
        // Helper: get cell content with override support
        function getCellVal(key, original) {
            return overrides.hasOwnProperty(key) ? overrides[key] : original;
        }

        // Event row
        html += '<tr><td class="nw-sched-label">行事</td>';
        days.forEach(function (day, di) {
            var val = getCellVal('event_' + di, day.event || '');
            var ev = val ? '<span class="nw-sched-event">' + escHtml(val) + '</span>' : '';
            html += '<td class="nw-sched-cell" onclick="NW.editSchedCell(\'' + bid + '\',\'event\',' + di + ')">' + ev + '</td>';
        });
        html += '</tr>';

        // Period rows (1-6), skip hidden
        var hiddenP = opts.hiddenPeriods || [];
        for (var p = 0; p < 6; p++) {
            if (hiddenP.indexOf(p + 1) >= 0) continue;
            html += '<tr><td class="nw-sched-label">' + (p + 1) + '校時</td>';
            (function (pp) {
                days.forEach(function (day, di) {
                    var per = day.periods[pp];
                    var key = 'period_' + pp + '_' + di;
                    if (overrides.hasOwnProperty(key)) {
                        html += '<td class="nw-sched-cell" onclick="NW.editSchedCell(\'' + bid + '\',\'period\',' + di + ',' + pp + ')">' + escHtml(overrides[key]) + '</td>';
                    } else {
                        html += '<td class="nw-sched-cell" onclick="NW.editSchedCell(\'' + bid + '\',\'period\',' + di + ',' + pp + ')">' + cellContent(per) + '</td>';
                    }
                });
            })(p);
            html += '</tr>';
        }

        // Optional rows
        if (opts.showRecess) {
            html += '<tr><td class="nw-sched-label">中休み</td>';
            days.forEach(function (day, di) {
                var val = getCellVal('recess1_' + di, day.recess1 || '');
                html += '<td class="nw-sched-small nw-sched-cell" onclick="NW.editSchedCell(\'' + bid + '\',\'recess1\',' + di + ')">' + escHtml(val) + '</td>';
            });
            html += '</tr><tr><td class="nw-sched-label">昼休み</td>';
            days.forEach(function (day, di) {
                var val = getCellVal('recess2_' + di, day.recess2 || '');
                html += '<td class="nw-sched-small nw-sched-cell" onclick="NW.editSchedCell(\'' + bid + '\',\'recess2\',' + di + ')">' + escHtml(val) + '</td>';
            });
            html += '</tr>';
        }
        if (opts.showAfterSchool) {
            html += '<tr><td class="nw-sched-label">放課後</td>';
            days.forEach(function (day, di) {
                var val = getCellVal('afterschool_' + di, day.afterschool || '');
                html += '<td class="nw-sched-small nw-sched-cell" onclick="NW.editSchedCell(\'' + bid + '\',\'afterschool\',' + di + ')">' + escHtml(val) + '</td>';
            });
            html += '</tr>';
        }
        if (opts.showHomework) {
            html += '<tr><td class="nw-sched-label">宿題</td>';
            days.forEach(function (day, di) {
                var val = getCellVal('homework_' + di, day.homework || '');
                html += '<td class="nw-sched-small nw-sched-cell" onclick="NW.editSchedCell(\'' + bid + '\',\'homework\',' + di + ')">' + escHtml(val) + '</td>';
            });
            html += '</tr>';
        }
        if (opts.showItems) {
            html += '<tr><td class="nw-sched-label">持ち物</td>';
            days.forEach(function (day, di) {
                var val = getCellVal('items_' + di, day.items || '');
                html += '<td class="nw-sched-small nw-sched-cell" onclick="NW.editSchedCell(\'' + bid + '\',\'items\',' + di + ')">' + escHtml(val) + '</td>';
            });
            html += '</tr>';
        }

        html += '</tbody></table>';

        // Options panel
        html += '<div class="nw-schedule-options">';
        // Period visibility
        html += '<span style="font-size:0.72rem;font-weight:600;color:var(--text-sub);">校時:</span>';
        for (var pi = 1; pi <= 6; pi++) {
            var checked = hiddenP.indexOf(pi) < 0;
            html += '<label><input type="checkbox"' + (checked ? ' checked' : '') + ' onchange="NW.toggleSchedPeriod(\'' + bid + '\',' + pi + ',this.checked)"> ' + pi + '</label>';
        }
        html += '<span style="color:var(--border);">|</span>'
            + '<label><input type="checkbox"' + (opts.showRecess ? ' checked' : '') + ' onchange="NW.toggleSchedOpt(\'' + bid + '\',\'showRecess\',this.checked)"> 休み時間</label>'
            + '<label><input type="checkbox"' + (opts.showAfterSchool ? ' checked' : '') + ' onchange="NW.toggleSchedOpt(\'' + bid + '\',\'showAfterSchool\',this.checked)"> 放課後</label>'
            + '<label><input type="checkbox"' + (opts.showHomework ? ' checked' : '') + ' onchange="NW.toggleSchedOpt(\'' + bid + '\',\'showHomework\',this.checked)"> 宿題</label>'
            + '<label><input type="checkbox"' + (opts.showItems ? ' checked' : '') + ' onchange="NW.toggleSchedOpt(\'' + bid + '\',\'showItems\',this.checked)"> 持ち物</label>'
            + '<label><input type="checkbox"' + (opts.showSaturday ? ' checked' : '') + ' onchange="NW.toggleSchedOpt(\'' + bid + '\',\'showSaturday\',this.checked)"> 土曜日</label>'
            + '<span style="color:var(--border);">|</span>'
            + '<label><input type="radio" name="sm_' + bid + '" value="subject"' + (opts.displayMode === 'subject' ? ' checked' : '') + ' onchange="NW.setSchedMode(\'' + bid + '\',\'subject\')"> 教科のみ</label>'
            + '<label><input type="radio" name="sm_' + bid + '" value="subjectUnit"' + (opts.displayMode === 'subjectUnit' ? ' checked' : '') + ' onchange="NW.setSchedMode(\'' + bid + '\',\'subjectUnit\')"> 教科+単元</label>'
            + '<label><input type="radio" name="sm_' + bid + '" value="full"' + (opts.displayMode === 'full' ? ' checked' : '') + ' onchange="NW.setSchedMode(\'' + bid + '\',\'full\')"> 詳細</label>'
            + '</div>';
        return html;
    };

    NW.setSchedMode = function (id, mode) {

        if (!block) return;
        block.options.displayMode = mode;
        var el = document.querySelector('[data-block-id="' + id + '"] .nw-schedule-block');
        if (el) el.innerHTML = NW.renderScheduleHTML(block);

    NW.toggleSchedPeriod = function (id, period, show) {
        var block = NW.blocks.find(function (b) { return b.id === id; });
        if (!block) return;
        var hp = block.options.hiddenPeriods || [];
        if (show) {
            hp = hp.filter(function (p) { return p !== period; });
        } else {
            if (hp.indexOf(period) < 0) hp.push(period);
        }
        block.options.hiddenPeriods = hp;
        var el = document.querySelector('[data-block-id="' + id + '"] .nw-schedule-block');
        if (el) el.innerHTML = NW.renderScheduleHTML(block);
    };

    NW.editSchedCell = function (id, rowType, dayIdx, periodIdx) {
        var block = NW.blocks.find(function (b) { return b.id === id; });
        if (!block) return;
        var data = block.weekData || NW.scheduleData;
        if (!data || !data.days) return;
        var day = data.days[dayIdx];
        if (!day) return;
        var overrides = block.cellOverrides || {};

        if (rowType === 'period') {
            // Period cell: subject, unit, content fields
            var per = (day.periods && day.periods[periodIdx]) || {};
            var overKey = 'period_' + periodIdx + '_' + dayIdx;
            var hasOverride = overrides.hasOwnProperty(overKey);
            Swal.fire({
                title: day.dayLabel + ' ' + (periodIdx + 1) + '校時',
                html: '<div style="text-align:left;">'
                    + '<label style="font-size:0.85rem;font-weight:600;">教科</label>'
                    + '<input id="swalSchedSubj" class="swal2-input" value="' + escHtml(per.subject || '') + '" style="margin-top:4px;">'
                    + '<label style="font-size:0.85rem;font-weight:600;margin-top:8px;display:block;">単元</label>'
                    + '<input id="swalSchedUnit" class="swal2-input" value="' + escHtml(per.unit || '') + '" style="margin-top:4px;">'
                    + '<label style="font-size:0.85rem;font-weight:600;margin-top:8px;display:block;">内容</label>'
                    + '<input id="swalSchedCont" class="swal2-input" value="' + escHtml(per.content || '') + '" style="margin-top:4px;">'
                    + (hasOverride ? '<label style="font-size:0.8rem;color:var(--text-hint);margin-top:8px;display:block;"><input type="checkbox" id="swalSchedFreeText" checked> 自由テキストで上書き</label>'
                        + '<input id="swalSchedOverride" class="swal2-input" value="' + escHtml(overrides[overKey] || '') + '" style="margin-top:4px;">'
                        : '<label style="font-size:0.8rem;color:var(--text-hint);margin-top:8px;display:block;"><input type="checkbox" id="swalSchedFreeText"> 自由テキストで上書き</label>'
                        + '<input id="swalSchedOverride" class="swal2-input" value="" style="margin-top:4px;display:none;">')
                    + '</div>',
                showCancelButton: true,
                confirmButtonText: '保存',
                cancelButtonText: 'キャンセル',
                didOpen: function () {
                    var cb = document.getElementById('swalSchedFreeText');
                    var ov = document.getElementById('swalSchedOverride');
                    var subj = document.getElementById('swalSchedSubj');
                    var unit = document.getElementById('swalSchedUnit');
                    var cont = document.getElementById('swalSchedCont');
                    function toggleMode() {
                        if (cb.checked) {
                            ov.style.display = ''; subj.disabled = true; unit.disabled = true; cont.disabled = true;
                            subj.style.opacity = '0.5'; unit.style.opacity = '0.5'; cont.style.opacity = '0.5';
                        } else {
                            ov.style.display = 'none'; subj.disabled = false; unit.disabled = false; cont.disabled = false;
                            subj.style.opacity = '1'; unit.style.opacity = '1'; cont.style.opacity = '1';
                        }
                    }
                    cb.addEventListener('change', toggleMode);
                    toggleMode();
                },
                preConfirm: function () {
                    return {
                        freeText: document.getElementById('swalSchedFreeText').checked,
                        override: document.getElementById('swalSchedOverride').value,
                        subject: document.getElementById('swalSchedSubj').value,
                        unit: document.getElementById('swalSchedUnit').value,
                        content: document.getElementById('swalSchedCont').value
                    };
                }
            }).then(function (result) {
                if (!result.isConfirmed) return;
                NW.pushHistory();
                var v = result.value;
                if (v.freeText) {
                    block.cellOverrides[overKey] = v.override;
                } else {
                    delete block.cellOverrides[overKey];
                    if (!day.periods) day.periods = [];
                    if (!day.periods[periodIdx]) day.periods[periodIdx] = {};
                    day.periods[periodIdx].subject = v.subject;
                    day.periods[periodIdx].unit = v.unit;
                    day.periods[periodIdx].content = v.content;
                }
                var el = document.querySelector('[data-block-id="' + id + '"] .nw-schedule-block');
                if (el) el.innerHTML = NW.renderScheduleHTML(block);
            });
        } else {
            // Simple text cell (event, recess1, recess2, afterschool, homework, items)
            var labels = { event: '行事', recess1: '中休み', recess2: '昼休み', afterschool: '放課後', homework: '宿題', items: '持ち物' };
            var overKey = rowType + '_' + dayIdx;
            var origVal = day[rowType] || '';
            var curVal = overrides.hasOwnProperty(overKey) ? overrides[overKey] : origVal;
            Swal.fire({
                title: day.dayLabel + ' - ' + (labels[rowType] || rowType),
                input: 'text',
                inputValue: curVal,
                showCancelButton: true,
                confirmButtonText: '保存',
                cancelButtonText: 'キャンセル',
                inputPlaceholder: labels[rowType] + 'を入力...'
            }).then(function (result) {
                if (!result.isConfirmed) return;
                NW.pushHistory();
                var newVal = result.value;
                if (newVal === origVal) {
                    delete block.cellOverrides[overKey];
                } else {
                    block.cellOverrides[overKey] = newVal;
                }
                var el = document.querySelector('[data-block-id="' + id + '"] .nw-schedule-block');
                if (el) el.innerHTML = NW.renderScheduleHTML(block);
            });
        }
    };

    // ---- Image upload (FileReader → base64) ----
    NW.uploadImage = function (blockId) {
        var input = document.createElement('input');
        input.type = 'file';
        input.accept = 'image/*';
        input.onchange = function (e) {
            var file = e.target.files[0];
            if (!file) return;
            var reader = new FileReader();
            reader.onload = function (evt) {
                var block = NW.blocks.find(function (b) { return b.id === blockId; });
                if (block) { block.src = evt.target.result; NW.render(); }
            };
            reader.readAsDataURL(file);
        };
        input.click();
    };

    // ---- Gallery image management ----
    NW.addGalleryImage = function (blockId) {
        var input = document.createElement('input');
        input.type = 'file';
        input.accept = 'image/*';
        input.multiple = true;
        input.onchange = function (e) {
            var files = Array.from(e.target.files);
            var block = NW.blocks.find(function (b) { return b.id === blockId; });
            if (!block) return;
            var loaded = 0;
            files.forEach(function (file) {
                var reader = new FileReader();
                reader.onload = function (evt) {
                    block.images.push({ src: evt.target.result, caption: '' });
                    loaded++;
                    if (loaded === files.length) NW.render();
                };
                reader.readAsDataURL(file);
            });
        };
        input.click();
    };

    NW.removeGalleryImage = function (blockId, index) {
        var block = NW.blocks.find(function (b) { return b.id === blockId; });
        if (!block) return;
        block.images.splice(index, 1);
        NW.render();
    };

    NW.setGalleryColumns = function (id, cols) {
        var block = NW.blocks.find(function (b) { return b.id === id; });
        if (!block) return;
        block.columns = parseInt(cols, 10);
        var el = document.querySelector('[data-block-id="' + id + '"] .nw-gallery-grid');
        if (el) el.style.gridTemplateColumns = 'repeat(' + block.columns + ', 1fr)';
    };

    // ---- Columns block management ----
    NW.setColumnsCount = function (id, count) {
        var block = NW.blocks.find(function (b) { return b.id === id; });
        if (!block || block.type !== 'columns') return;
        NW.saveEditable();
        NW.pushHistory();
        block.columns = parseInt(count, 10);
        while (block.colData.length < block.columns) {
            block.colData.push({ content: '', src: '', caption: '' });
        }
        if (block.columns < 3 && block.colRatio && block.colRatio !== 'equal') {
            // Keep ratio for 2 columns, reset for others
        }
        NW.render();
    };

    NW.setColRatio = function (id, ratio) {
        var block = NW.blocks.find(function (b) { return b.id === id; });
        if (!block || block.type !== 'columns') return;
        NW.saveEditable();
        block.colRatio = ratio;

    NW.uploadColumnImage = function (blockId, colIndex) {
        var input = document.createElement('input');
        input.type = 'file';
        input.accept = 'image/*';
        input.onchange = function (e) {
            var file = e.target.files[0];
            if (!file) return;

            reader.onload = function (evt) {
                var block = NW.blocks.find(function (b) { return b.id === blockId; });

    // ---- WordArt editor (エフェクト自由組み合わせ式) ----
    // エフェクト適用ヘルパー
    NW._applyWordArtFx = function (el, b) {
        var shadows = [];
        // グラデーション
        if (b.waGradient) {
            var grad = 'linear-gradient(' + (b.waGradAngle || 135) + 'deg,' + (b.waGradC1 || '#ff0000') + (b.waGradExtra || '') + ',' + (b.waGradC2 || '#0000ff') + ')';
            el.style.background = grad;
            el.style.webkitBackgroundClip = 'text';
            el.style.backgroundClip = 'text';
            el.style.webkitTextFillColor = 'transparent';
            el.style.color = 'transparent';
        } else if (b.waStroke && !b.waGradient) {
            // アウトラインのみの場合、塗りを透明に
            el.style.webkitTextFillColor = 'transparent';
            el.style.color = 'transparent';
        } else {
            el.style.color = b.waColor || '#202124';
        }
        // アウトライン
        if (b.waStroke) {
            el.style.webkitTextStroke = (b.waStrokeWidth || 3) + 'px ' + (b.waStrokeColor || '#1a73e8');
        }
        // 3D立体 (積み重ねtext-shadow)
        if (b.wa3d) {
            var d3c = b.wa3dColor || '#c0392b';
            for (var d = 1; d <= (b.wa3dDepth || 5); d++) {
                shadows.push(d + 'px ' + d + 'px 0 ' + d3c);
            }
            shadows.push((b.wa3dDepth || 5) + 1 + 'px ' + ((b.wa3dDepth || 5) + 1) + 'px 10px rgba(0,0,0,0.3)');
        }
        // 影
        if (b.waShadow) {
            shadows.push((b.waShadowX || 3) + 'px ' + (b.waShadowY || 3) + 'px ' + (b.waShadowBlur || 6) + 'px ' + (b.waShadowColor || '#888888'));
        }
        if (shadows.length) el.style.textShadow = shadows.join(',');
    };

    // ---- Templates ----
    NW.saveAsTemplate = function () {
        NW.saveEditable();
        if (NW.blocks.length === 0) { showToast('error', 'ブロックがありません'); return; }
        Swal.fire({
            title: 'テンプレートとして保存',
            input: 'text',
            inputLabel: 'テンプレート名',
            inputPlaceholder: '例: 基本レイアウト',
            showCancelButton: true,
            confirmButtonText: '保存',
            cancelButtonText: 'キャンセル'
        }).then(function (result) {
            if (!result.isConfirmed || !result.value) return;
            // Strip content but keep structure
            var tplBlocks = JSON.parse(JSON.stringify(NW.blocks));
            tplBlocks.forEach(function (b) {
                if (b.type === 'heading') b.content = b.content.replace(/<[^>]*>/g, '').trim() ? b.content : '見出し';
                if (b.type === 'text') b.content = '';
                if (b.type === 'image') { b.src = ''; b.wrapText = ''; b.caption = ''; }
                if (b.type === 'gallery') { b.images = []; }
                if (b.type === 'schedule') { b.weekData = null; }
                if (b.type === 'qrcode') { b.url = ''; b.label = ''; }
                if (b.type === 'columns') {
                    b.colData = b.colData.map(function () { return { content: '', src: '', caption: '' }; });
                }
            });
            var templates = JSON.parse(localStorage.getItem('nw_templates') || '[]');
            templates.push({ name: result.value, blocks: tplBlocks, createdAt: new Date().toISOString() });
            localStorage.setItem('nw_templates', JSON.stringify(templates));
            showToast('success', 'テンプレート「' + result.value + '」を保存しました');
        });
    };

    NW.openTemplates = function () {
        var templates = JSON.parse(localStorage.getItem('nw_templates') || '[]');
        if (templates.length === 0) { showToast('info', 'テンプレートがありません。「テンプレ保存」で作成してください。'); return; }
        var html = '<div style="max-height:350px;overflow-y:auto;">';
        templates.forEach(function (tpl, i) {
            html += '<div style="display:flex;align-items:center;justify-content:space-between;padding:10px 8px;border-bottom:1px solid #f1f3f4;">'
                + '<div><strong>' + escHtml(tpl.name) + '</strong><br><span style="font-size:0.75rem;color:#5f6368;">ブロック数: ' + tpl.blocks.length + '</span></div>'
                + '<div style="white-space:nowrap;">'
                + '<button class="btn btn-primary btn-sm" onclick="NW.applyTemplate(' + i + ');Swal.close();">適用</button> '
                + '<button class="btn btn-outline btn-sm" style="color:#ea4335;border-color:#ea4335;" onclick="NW.deleteTemplate(' + i + ');Swal.close();">削除</button>'
                + '</div></div>';
        });
        html += '</div>';
        Swal.fire({ title: 'テンプレート一覧', html: html, showConfirmButton: false, showCloseButton: true, width: 500 });
    };

    NW.applyTemplate = function (index) {
        var templates = JSON.parse(localStorage.getItem('nw_templates') || '[]');
        if (!templates[index]) return;
        NW.blocks = JSON.parse(JSON.stringify(templates[index].blocks));
        NW.blocks.forEach(function (b) { b.id = NW.genId(); });
        NW._history = [];
        NW._historyIdx = -1;
        NW.render();
        NW.pushHistory();
        showToast('success', 'テンプレートを適用しました');
    };

    NW.deleteTemplate = function (index) {
        var templates = JSON.parse(localStorage.getItem('nw_templates') || '[]');
        templates.splice(index, 1);
        localStorage.setItem('nw_templates', JSON.stringify(templates));
        showToast('success', 'テンプレートを削除しました');
    };

    // ---- localStorage auto-save / restore ----
    NW.autoSave = function () {
        clearTimeout(NW._saveTimer);
        NW._saveTimer = setTimeout(function () {
            try {
                var data = { blocks: NW.blocks, nextId: NW.nextId, mondayStr: NW.mondayStr };
                localStorage.setItem('nw_autosave', JSON.stringify(data));
            } catch (e) {
                // Quota exceeded - try without base64 images
                try {
                    var stripped = JSON.parse(JSON.stringify(NW.blocks));
                    stripped.forEach(function (b) {
                        if (b.src && b.src.length > 1000) b.src = '';
                        if (b.images) b.images.forEach(function (img) {
                            if (img.src && img.src.length > 1000) img.src = '';
                        });
                    });
                    localStorage.setItem('nw_autosave', JSON.stringify({
                        blocks: stripped, nextId: NW.nextId, mondayStr: NW.mondayStr
                    }));
                } catch (ignore) { }
            }
        }, 800);
    };

    NW.autoRestore = function () {
        try {
            var saved = localStorage.getItem('nw_autosave');
            if (!saved) return false;
            var data = JSON.parse(saved);
            if (data.blocks && data.blocks.length > 0) {
                NW.blocks = data.blocks;
                NW.nextId = data.nextId || 1;
                if (data.mondayStr) {
                    NW.mondayStr = data.mondayStr;
                    document.getElementById('nwWeekLabel').textContent = NW.mondayStr + '週';
                }
                NW.render();
                return true;
            }
        } catch (e) { }
        return false;
    };

    NW._applyLoadedData = function (data) {
        NW.blocks = data.blocks || [];
        NW.nextId = data.nextId || 1;
        if (data.mondayStr) {
            NW.mondayStr = data.mondayStr;
            document.getElementById('nwWeekLabel').textContent = NW.mondayStr + '週';
        }
        if (data.scheduleData) NW.scheduleData = data.scheduleData;
        NW._history = [];
        NW._historyIdx = -1;
        NW.render();
        NW.pushHistory();
        showToast('success', '読み込みました');
    };

    NW.doLoadFromSheet = function (fileId) {
        if (!fileId) { showToast('error', 'ファイルIDが見つかりません'); return; }
        showToast('info', '読み込み中...');
        google.script.run
            .withSuccessHandler(function (res) {
                if (!res) { showToast('error', '読込失敗: サーバーから応答がありません'); return; }
                if (!res.success) { showToast('error', '読込失敗: ' + (res.error || '不明なエラー')); return; }
                // サーバーが jsonString を返した場合（大きいデータ向け）
                if (res.jsonString) {
                    try {
                        NW._applyLoadedData(JSON.parse(res.jsonString));
                    } catch (pe) {
                        showToast('error', '読込失敗: JSONパースエラー');
                    }
                    return;
                }
                if (!res.data) { showToast('error', '読込失敗: データが空です'); return; }
                NW._applyLoadedData(res.data);
            })
            .withFailureHandler(_onCommError)
            .loadNewsletterData(fileId);
    };

    NW.loadScheduleData = function () {

        showToast('info', '週案データを読み込み中...');
        google.script.run
            .withSuccessHandler(function (data) {
                if (!data.success) { showToast('error', 'データ取得失敗: ' + data.error); return; }
                NW.scheduleData = data;
                showToast('success', '週案データを読み込みました');
                var hasSchedule = NW.blocks.some(function (b) { return b.type === 'schedule'; });
                if (hasSchedule) {
                    NW.blocks.forEach(function (b) { if (b.type === 'schedule') b.weekData = data; });
                    NW.render();
                } else if (NW.blocks.length === 0) {
                    // Auto-create default layout
                    NW.addBlock('heading', null, { content: data.title || '学級通信', fontSize: 20 });
                    NW.addBlock('text', null, { content: data.date + '〜 の予定', fontSize: 11, align: 'center' });
                    NW.addBlock('divider');
                    NW.addBlock('schedule', null, { weekData: data });
                    NW.addBlock('divider');
                    NW.addBlock('text', null, { content: '', fontSize: 12 });
                } else {
                    NW.render();
                }
            })
            .withFailureHandler(_onCommError)
            .getNewsletterData(mondayStr);
    };
