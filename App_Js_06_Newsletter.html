        clone.querySelectorAll('[contenteditable]').forEach(function (el) { el.removeAttribute('contenteditable'); });
        clone.querySelectorAll('[onclick]').forEach(function (el) { el.removeAttribute('onclick'); });
        return '<!DOCTYPE html><html><head>'
            + '<meta charset="utf-8">'
            + '<style>' + NW._PRINT_CSS + '</style>'
            + '<link href="' + NW._PRINT_FONTS + '" rel="stylesheet">'
            + '</head><body>' + clone.innerHTML + '</body></html>';
    };

    // ---- Print via iframe ----
    NW.printNewsletter = function () {
        if (NW.blocks.length === 0) { showToast('error', 'ブロックがありません'); return; }
        var html = NW.buildPrintHTML();
        var iframe = document.createElement('iframe');
        iframe.style.cssText = 'position:fixed;top:-10000px;left:-10000px;width:210mm;height:297mm;';
        document.body.appendChild(iframe);
        var doc = iframe.contentDocument;
        doc.open();
        doc.write(html);
        doc.close();
        iframe.onload = function () {
            setTimeout(function () {
                iframe.contentWindow.print();
                setTimeout(function () { document.body.removeChild(iframe); }, 1000);
            }, 500);
        };
    };

    // ---- Google Docs互換HTML生成 (Classroom投稿用) ----
    // DOM cloneではなく、ブロックデータからシンプルなHTML構造を直接生成
    NW.buildClassroomHTML = function () {
        NW.saveEditable();
        var body = '';
        // A4 printable area ≈ 174mm ≈ 550px
        var pageW = 550;
        NW.blocks.forEach(function (block) {
            // ブロックデコレーション: 枠線・背景
            var bdrS = '';
            if (block.borderColor) bdrS += 'border:2px solid ' + block.borderColor + ';';
            if (block.blockBgColor) bdrS += 'background-color:' + block.blockBgColor + ';';
            if (block.borderRadius) bdrS += 'border-radius:' + block.borderRadius + 'px;';
            if (bdrS) bdrS += 'padding:4px;margin:2px 0;';
            var wrapOpen = bdrS ? '<div style="' + bdrS + '">' : '';
            var wrapClose = bdrS ? '</div>' : '';

            switch (block.type) {
                case 'heading':
                    var hs = 'font-size:' + block.fontSize + 'px;text-align:' + (block.align || 'center') + ';margin:4px 0;';
                    if (block.bold) hs += 'font-weight:bold;';
                    if (block.color) hs += 'color:' + block.color + ';';
                    if (block.bgColor) hs += 'background-color:' + block.bgColor + ';';
                    if (block.fontFamily) hs += 'font-family:' + block.fontFamily + ';';
                    body += wrapOpen + '<p style="' + hs + '">' + (block.content || '') + '</p>' + wrapClose;
                    break;
                case 'text':
                    var ts = 'font-size:' + block.fontSize + 'px;text-align:' + (block.align || 'left') + ';margin:2px 0;line-height:1.7;';
                    if (block.bold) ts += 'font-weight:bold;';
                    if (block.color) ts += 'color:' + block.color + ';';
                    if (block.bgColor) ts += 'background-color:' + block.bgColor + ';';
                    if (block.fontFamily) ts += 'font-family:' + block.fontFamily + ';';
                    body += wrapOpen + '<p style="' + ts + '">' + (block.content || '&nbsp;') + '</p>' + wrapClose;
                    break;
                case 'image':
                    if (!block.src) break;
                    var imgW = Math.round(pageW * (block.width || 50) / 100);
                    if (block.float !== 'none' && block.wrapText) {
                        // 回り込み → table化
                        var imgCell = '<td style="width:' + imgW + 'px;vertical-align:top;padding:4px;"><img src="' + block.src + '" width="' + imgW + '"></td>';
                        var wts = 'vertical-align:top;padding:4px;font-size:' + (block.wrapFontSize || 12) + 'px;line-height:1.7;';
                        if (block.wrapFontFamily) wts += 'font-family:' + block.wrapFontFamily + ';';
                        if (block.wrapBold) wts += 'font-weight:bold;';
                        if (block.wrapColor) wts += 'color:' + block.wrapColor + ';';
                        if (block.wrapAlign) wts += 'text-align:' + block.wrapAlign + ';';
                        var txtCell = '<td style="' + wts + '">' + (block.wrapText || '') + '</td>';
                        body += wrapOpen + '<table style="width:100%;border:none;"><tr>'
                            + (block.float === 'right' ? txtCell + imgCell : imgCell + txtCell)
                            + '</tr></table>' + wrapClose;
                    } else {
                        body += wrapOpen + '<p style="text-align:center;margin:4px 0;"><img src="' + block.src + '" width="' + imgW + '"></p>';
                        if (block.caption) body += '<p style="text-align:center;font-size:10px;color:#5f6368;margin:2px 0;">' + block.caption + '</p>';
                        body += wrapClose;
                    }
                    break;
                case 'columns':
                    var cCols = block.columns || 2;
                    body += wrapOpen + '<table style="width:100%;border:none;border-collapse:collapse;"><tr>';
                    for (var ci = 0; ci < cCols; ci++) {
                        var cd = (block.colData && block.colData[ci]) ? block.colData[ci] : {};
                        var cw = Math.round(100 / cCols);
                        if (block.colRatio && cCols === 2) {
                            var parts = block.colRatio.split(':');
                            if (parts.length === 2) {
                                var total = parseInt(parts[0]) + parseInt(parts[1]);
                                cw = Math.round((parseInt(parts[ci]) / total) * 100);
                            }
                        }
                        body += '<td style="width:' + cw + '%;vertical-align:top;padding:6px;border:none;">';
                        if (cd.src) {
                            body += '<img src="' + cd.src + '" style="width:100%;display:block;border-radius:4px;margin-bottom:4px;">';
                        }
                        if (cd.content) {
                            body += '<div style="font-size:12px;line-height:1.6;">' + cd.content + '</div>';
                        }
                        body += '</td>';
                    }
                    body += '</tr></table>' + wrapClose;
                    break;
                case 'gallery':
                    var cols = block.columns || 2;
                    var gw = Math.round((pageW - cols * 8) / cols);
                    body += wrapOpen + '<table style="width:100%;border:none;border-collapse:collapse;"><tr>';
                    (block.images || []).forEach(function (img, i) {
                        if (img.src) {
                            body += '<td style="width:' + Math.round(100 / cols) + '%;text-align:center;vertical-align:top;padding:4px;border:none;">'
                                + '<img src="' + img.src + '" width="' + gw + '" style="display:block;margin:0 auto;">'
                                + (img.caption ? '<p style="font-size:9px;text-align:center;margin:2px 0;">' + img.caption + '</p>' : '')
                                + '</td>';
                            if ((i + 1) % cols === 0 && i < block.images.length - 1) body += '</tr><tr>';
                        }
                    });
                    body += '</tr></table>' + wrapClose;
                    break;
                case 'schedule':
                    var schedHtml = NW.renderScheduleHTML(block);
                    // Remove options panel and onclick for export
                    schedHtml = schedHtml.replace(/<div class="nw-schedule-options">[\s\S]*$/, '');
                    schedHtml = schedHtml.replace(/ onclick="[^"]*"/g, '');
                    schedHtml = schedHtml.replace(/ class="nw-sched-cell"/g, '');
                    body += wrapOpen + schedHtml + wrapClose;
                    break;
                case 'qrcode':
                    if (block.url) {
                        body += wrapOpen + '<p style="text-align:center;margin:4px 0;"><img src="https://api.qrserver.com/v1/create-qr-code/?size='
                            + (block.qrSize || 200) + 'x' + (block.qrSize || 200)
                            + '&data=' + encodeURIComponent(block.url) + '" width="' + (block.qrSize || 200) + '"></p>';
                        if (block.label) body += '<p style="text-align:center;font-size:10px;margin:2px 0;">' + block.label + '</p>';
                        body += wrapClose;
                    }
                    break;
                case 'divider':
                    body += '<hr style="border:none;border-top:1px solid #dadce0;margin:6px 0;">';
                    break;
                case 'wordart':
                    // Google DocsはCSSグラデーション非対応 → 太字＋色で代替表現
                    var wc = block.waColor || '#202124';
                    if (block.waGradient) wc = block.waGradC1 || '#ff0000';
                    var ws = 'font-size:' + (block.fontSize || 48) + 'px;text-align:' + (block.align || 'center')
                        + ';font-weight:900;color:' + wc + ';margin:4px 0;';
                    if (block.fontFamily) ws += 'font-family:' + block.fontFamily + ';';
                    if (block.waSpacing) ws += 'letter-spacing:' + block.waSpacing + 'px;';
                    body += wrapOpen + '<p style="' + ws + '">' + escHtml(block.content || '') + '</p>' + wrapClose;
                    break;
            }
        });

        return '<!DOCTYPE html><html><head><meta charset="utf-8">'
            + '<style>body{font-family:sans-serif;font-size:12px;color:#202124;margin:8px;padding:0;}'
            + 'p{margin:4px 0;}table{width:100%;border-collapse:collapse;}'
            + 'th{background-color:#1a73e8;color:#ffffff;padding:4px 6px;font-size:11px;text-align:center;}'
            + 'td{padding:3px 5px;border:1px solid #dadce0;text-align:center;font-size:11px;}'
            + 'img{max-width:100%;}</style></head>'
            + '<body>' + body + '</body></html>';
    };

    // ---- Classroom post (Google Docs互換HTMLで投稿) ----
    NW.postToClassroom = function () {
        if (NW.blocks.length === 0) { showToast('error', 'ブロックがありません'); return; }
        Swal.fire({
            title: 'Classroomに投稿',
            html: '<div style="text-align:left;">'
                + '<p style="font-size:0.85rem;color:var(--text-sub);margin-bottom:8px;">学級通信エディタの現在の内容をGoogleドキュメントに変換してClassroomに投稿します。</p>'
                + '<label style="font-size:0.85rem;font-weight:600;">付加メッセージ（任意）</label>'
                + '<textarea id="swalCrMsg" class="swal2-textarea" placeholder="Classroomへのメッセージ..." style="margin-top:6px;min-height:80px;"></textarea>'
                + '</div>',
            showCancelButton: true,
            confirmButtonText: '<span class="material-symbols-outlined" style="font-size:16px;vertical-align:text-bottom;">rocket_launch</span> 投稿',
            cancelButtonText: 'キャンセル',
            preConfirm: function () {
                return document.getElementById('swalCrMsg').value;
            }
        }).then(function (result) {
            if (!result.isConfirmed) return;
            showToast('info', 'Googleドキュメントを作成してClassroomに投稿しています...');
            var htmlContent = NW.buildClassroomHTML();
            google.script.run
                .withSuccessHandler(function (res) {
                    if (!res) { showToast('error', '投稿失敗: サーバーから応答がありません'); return; }
                    if (res.success) showToast('success', res.message);
                    else showToast('error', '投稿失敗: ' + res.error);
                })
                .withFailureHandler(_onCommError)
                .postNewsletterToClassroomFromWeb(result.value || '学級通信をお届けします。', htmlContent);
        });
    };

</script>
