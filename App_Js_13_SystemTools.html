<script>
    'use strict';
    // =========================================================
    // ===== 表示テーマ（自動 / ライト / ダーク）            =====
    // =========================================================

    var THEME_ORDER = ['auto', 'light', 'dark'];
    var THEME_META = {
        auto: { icon: 'brightness_auto', label: '自動（端末設定に追従）' },
        light: { icon: 'light_mode', label: 'ライト' },
        dark: { icon: 'dark_mode', label: 'ダーク' }
    };

    function applyTheme(theme) {
        var root = document.documentElement;
        if (theme === 'auto') {
            root.removeAttribute('data-theme');
        } else {
            root.setAttribute('data-theme', theme);
        }
        var icon = document.getElementById('themeToggleIcon');
        var btn = document.getElementById('themeToggleBtn');
        var meta = THEME_META[theme] || THEME_META.auto;
        if (icon) icon.textContent = meta.icon;
        if (btn) btn.title = '表示テーマ: ' + meta.label + '（クリックで切替）';
    }

    function getSavedTheme() {
        try {
            var t = localStorage.getItem('spn_theme');
            return THEME_ORDER.indexOf(t) >= 0 ? t : 'auto';
        } catch (e) { return 'auto'; }
    }

    function cycleTheme() {
        var cur = getSavedTheme();
        var next = THEME_ORDER[(THEME_ORDER.indexOf(cur) + 1) % THEME_ORDER.length];
        try { localStorage.setItem('spn_theme', next); } catch (e) { }
        applyTheme(next);
        if (typeof showToast === 'function') {
            showToast('info', '表示テーマ: ' + THEME_META[next].label);
        }
    }

    // 起動時に保存済みテーマを適用（FOUC低減のため即時実行）
    applyTheme(getSavedTheme());

    // =========================================================
    // ===== メンテナンス・ツール / Classroom手動投稿        =====
    // ===== （旧スプレッドシートメニュー機能のWebボタン化） =====
    // =========================================================

    /** google.script.run を Promise 化して呼び出す薄いラッパー。 */
    function _callServerAsync(method) {
        var args = Array.prototype.slice.call(arguments, 1);
        return new Promise(function (resolve, reject) {
            var runner = google.script.run
                .withSuccessHandler(resolve)
                .withFailureHandler(reject);
            runner[method].apply(runner, args);
        });
    }

    /** メンテナンスセクションのステータス行を更新する。 */
    function _setMaintMsg(message, isError) {
        var el = document.getElementById('maintenanceToast');
        if (el) {
            el.textContent = message || '';
            el.style.color = isError ? 'var(--danger)' : 'var(--text-sub)';
        }
    }

    /**
     * ツール系ボタンの共通実行ヘルパー。
     * 確認ダイアログ → ボタンのローディング表示 → サーバ呼び出し → トースト/ステータス更新。
     */
    function _runToolAction(btn, opts) {
        function exec() {
            var orig = btn ? btn.innerHTML : '';
            if (btn) {
                btn.disabled = true;
                btn.innerHTML = '<span class="material-symbols-outlined fs-6">hourglass_empty</span> ' + (opts.busyLabel || '実行中...');
            }
            function restore() { if (btn) { btn.disabled = false; btn.innerHTML = orig; } }
            _callServerAsync.apply(null, [opts.method].concat(opts.args || []))
                .then(function (res) {
                    restore();
                    var ok = !res || res.success !== false;
                    var msg = (res && res.message) ? res.message : (ok ? '完了しました。' : '処理に失敗しました。');
                    if (opts.toMaint) _setMaintMsg(msg, !ok);
                    showToast(ok ? 'success' : 'error', msg);
                    if (ok && typeof opts.onDone === 'function') opts.onDone(res);
                })
                .catch(function (e) {
                    restore();
                    var msg = '通信エラー: ' + (e && e.message ? e.message : e);
                    if (opts.toMaint) _setMaintMsg(msg, true);
                    showToast('error', msg);
                });
        }
        if (opts.confirmText) {
            Swal.fire({
                title: opts.confirmTitle || '確認',
                text: opts.confirmText,
                icon: opts.danger ? 'warning' : 'question',
                showCancelButton: true,
                confirmButtonText: opts.confirmButton || '実行する',
                cancelButtonText: 'キャンセル',
                confirmButtonColor: opts.danger ? '#ea4335' : '#1a73e8',
                reverseButtons: true
            }).then(function (r) { if (r.isConfirmed) exec(); });
        } else {
            exec();
        }
    }

    function postScheduleToClassroomWeb(btn) {
        _runToolAction(btn, {
            method: 'postScheduleToClassroomFromWeb',
            busyLabel: '投稿中...',
            confirmTitle: '明日の予定を投稿',
            confirmText: '次の登校日の予定をGoogle Classroomへ投稿します。よろしいですか？',
            confirmButton: '投稿する'
        });
    }

    function autoPostNewsletterSheetWeb(btn) {
        _runToolAction(btn, {
            method: 'autoPostToClassroomFromWeb',
            busyLabel: '投稿中...',
            confirmTitle: '学級通信シートを投稿',
            confirmText: '「学級通信」シートをPDF化してGoogle Classroomへ投稿します。よろしいですか？',
            confirmButton: '投稿する'
        });
    }

    function protectSheetsWeb(btn) {
        _runToolAction(btn, {
            method: 'protectSheetsFromWeb',
            busyLabel: '保護中...',
            toMaint: true,
            confirmTitle: 'シート保護の実行',
            confirmText: '「データベース」「単元マスタ」「ログ」「学級通信」シートを保護します。実行しますか？',
            confirmButton: '保護する'
        });
    }

    function clearDbCacheWeb(btn) {
        _runToolAction(btn, {
            method: 'clearDbColumnsCacheFromWeb',
            busyLabel: 'クリア中...',
            toMaint: true
        });
    }

    function resetPdfProcessingWeb(btn) {
        _runToolAction(btn, {
            method: 'resetAllPdfProcessingFromWeb',
            busyLabel: '停止中...',
            toMaint: true,
            confirmTitle: 'PDF読込処理の強制停止',
            confirmText: '実行中のすべてのPDF読み込み処理（指導計画・行事予定）を停止し、待機状態を解除します。よろしいですか？',
            confirmButton: '停止する'
        });
    }

    function clearDatabaseWeb(btn) {
        _runToolAction(btn, {
            method: 'clearDatabaseDataFromWeb',
            busyLabel: 'クリア中...',
            toMaint: true,
            danger: true,
            confirmTitle: 'データベースのクリア',
            confirmText: '「データベース」シートの入力内容（時程〜放課後）をすべてクリアします。この操作は元に戻せません。よろしいですか？',
            confirmButton: 'クリアする',
            onDone: function () {
                if (typeof loadWeeklyPlan === 'function' && STATE && STATE.mondayStr) {
                    try { loadWeeklyPlan(STATE.mondayStr); } catch (e) { }
                }
            }
        });
    }

    // ===================================================
    // ===== 初期設定ウィザード =====
    // ===================================================

    /**
     * 初回起動時に、設定が不十分な場合だけ初期設定ウィザードを自動表示します。
     * （ウィザードを完了済み／「今後表示しない」を選んだ場合は表示しません）
     */
    function maybeOfferSetupWizard() {
        google.script.run
            .withSuccessHandler(function (status) {
                if (!status || !status.success) return;
                if (status.wizardDone) return;
                // APIキーと年間カレンダーが揃っていれば、セットアップ済みとみなして出さない
                if (status.hasApiKey && status.hasCalendar) return;
                // 振り返り自動起動など他のダイアログと衝突しないよう少し待ってから表示
                setTimeout(function () {
                    if (typeof Swal !== 'undefined' && Swal.isVisible()) return;
                    openSetupWizard({ auto: true, status: status });
                }, 1200);
            })
            .withFailureHandler(function () { })
            .getSetupStatus();
    }

    /** ウィザード内の入力フィールドHTMLを組み立てるヘルパー。 */
    function wizFieldHtml(id, label, type, value, placeholder, hint) {
        return '<div class="setup-wiz-field"><label for="' + id + '">' + escHtml(label) + '</label>'
            + '<input type="' + type + '" id="' + id + '" value="' + escAttr(value || '') + '" placeholder="' + escAttr(placeholder || '') + '">'
            + (hint ? '<div class="setup-wiz-hint">' + hint + '</div>' : '')
            + '</div>';
    }

    /**
     * 初期設定ウィザードを開きます。
     * 学年 → Gemini APIキー → PDFフォルダ → Classroom → 年間カレンダー の順に案内し、
     * 最後にまとめて保存します。すべての項目は後から設定タブで変更できます。
     * @param {Object} opts { auto: 初回自動表示, manual: 設定タブから手動起動, status: 取得済みのセットアップ状況 }
     */
    async function openSetupWizard(opts) {
        opts = opts || {};

        // 現在の設定とセットアップ状況を取得（プリフィルと「設定済み」表示に使用）
        var settings = await new Promise(function (resolve) {
            google.script.run
                .withSuccessHandler(resolve)
                .withFailureHandler(function () { resolve(null); })
                .getAppSettings();
        });
        if (!settings) { showToast('error', '設定の読み込みに失敗しました。通信環境を確認してください。'); return; }

        var status = opts.status;
        if (!status) {
            status = await new Promise(function (resolve) {
                google.script.run
                    .withSuccessHandler(resolve)
                    .withFailureHandler(function () { resolve({}); })
                    .getSetupStatus();
            });
        }

        // ウィザードで収集する値（既存設定をプリフィル）
        var wiz = {
            grade: settings.grade || '3',
            apiKey: settings.geminiApiKey || '',
            courseName: settings.courseName || '',
            postHour: settings.postHour || '',
            genCalendar: !status.hasCalendar,
            calYear: '',
            calStartMonday: ''
        };

        // カレンダー生成のデフォルト値（年度＝4月始まり、開始日＝4月の最初の月曜日）
        var now = new Date();
        var fiscalYear = (now.getMonth() + 1 <= 3) ? now.getFullYear() - 1 : now.getFullYear();
        wiz.calYear = String(fiscalYear);
        var apr1 = new Date(fiscalYear, 3, 1);
        var aprDay = apr1.getDay();
        var offset = (aprDay === 1) ? 0 : ((8 - aprDay) % 7);
        apr1.setDate(apr1.getDate() + offset);
        wiz.calStartMonday = apr1.getFullYear() + '-'
            + ('0' + (apr1.getMonth() + 1)).slice(-2) + '-'
            + ('0' + apr1.getDate()).slice(-2);

        // ---- ようこそ画面（設定状況のチェックリスト） ----
        var checkRow = function (done, label) {
            return '<div class="' + (done ? 'setup-wiz-done' : 'setup-wiz-todo') + '">'
                + '<span class="material-symbols-outlined fs-6">' + (done ? 'check_circle' : 'radio_button_unchecked') + '</span> '
                + escHtml(label) + (done ? '（設定済み）' : '') + '</div>';
        };
        var welcome = await Swal.fire({
            title: 'School Plan Note へようこそ！',
            html: '<div style="text-align:left;font-size:0.85rem;line-height:1.6;">'
                + 'アプリを使い始めるための設定を、順番に案内します。<br>すべて後から「設定」タブで変更できます。</div>'
                + '<div class="setup-wiz-status">'
                + checkRow(!!status.hasGrade, '担当学年')
                + checkRow(!!status.hasApiKey, 'Gemini APIキー（AI機能に必要）')
                + checkRow(!!status.hasCalendar, '年間カレンダー（データベースの日付）')
                + checkRow(!!status.hasCourseName, 'Classroom連携（任意）')
                + '</div>',
            width: 560,
            confirmButtonText: 'はじめる →',
            confirmButtonColor: '#1a73e8',
            showDenyButton: !!opts.auto,
            denyButtonText: '今後表示しない',
            denyButtonColor: '#6c757d',
            showCancelButton: true,
            cancelButtonText: 'あとで'
        });
        if (welcome.isDenied) {
            google.script.run.withSuccessHandler(function () { }).withFailureHandler(function () { }).markSetupWizardDone();
            showToast('info', '設定タブの「初期設定ウィザード」からいつでも再開できます。');
            return;
        }
        if (!welcome.isConfirmed) return;

        // ---- ステップ定義 ----
        var steps = [
            {
                title: '担当学年',
                render: function () {
                    var options = '';
                    for (var g = 1; g <= 6; g++) {
                        options += '<option value="' + g + '"' + (String(wiz.grade) === String(g) ? ' selected' : '') + '>' + g + '年生</option>';
                    }
                    return '<div class="setup-wiz-field"><label for="wizGrade">時数集計の基準となる学年</label>'
                        + '<select id="wizGrade">' + options + '</select>'
                        + '<div class="setup-wiz-hint">学年に応じた標準時数（年間の授業時数の基準）が自動で適用されます。</div></div>';
                },
                collect: function (popup) {
                    var el = popup.querySelector('#wizGrade');
                    if (el) wiz.grade = el.value;
                }
            },
            {
                title: 'Gemini APIキー',
                render: function () {
                    return wizFieldHtml('wizApiKey', 'Gemini APIキー' + (status.hasApiKey ? '（設定済み・変更する場合のみ入力）' : ''),
                        'password', wiz.apiKey, 'AIza...',
                        'PDF自動読み取り・AIタスク抽出・週報の自動生成などのAI機能に必要です。'
                        + '<a href="https://aistudio.google.com/app/apikey" target="_blank" rel="noopener">Google AI Studio</a> で無料で取得できます。'
                        + '空欄のままでもAI以外の機能（週案入力・時数集計など）は利用できます。');
                },
                collect: function (popup) {
                    var el = popup.querySelector('#wizApiKey');
                    if (el) wiz.apiKey = el.value;
                }
            },
            {
                title: 'Google Classroom連携（任意）',
                render: function () {
                    return wizFieldHtml('wizCourseName', '連携クラス名', 'text', wiz.courseName, '例：4年1組 令和7年度',
                        'Classroomのクラス名を正確に入力します（設定タブでは一覧から選択もできます）。')
                        + wizFieldHtml('wizPostHour', '「明日の予定」自動投稿時刻（0〜23時・空欄で無効）', 'number', wiz.postHour, '例：16',
                            '設定すると、毎日この時刻に翌日の時間割・宿題・持ち物をClassroomへ自動投稿します。');
                },
                collect: function (popup) {
                    var el1 = popup.querySelector('#wizCourseName');
                    var el2 = popup.querySelector('#wizPostHour');
                    if (el1) wiz.courseName = el1.value.trim();
                    if (el2) wiz.postHour = el2.value.trim();
                }
            },
            {
                title: '年間カレンダー',
                render: function () {
                    var head;
                    if (status.hasCalendar) {
                        head = '<div style="text-align:left;font-size:0.85rem;color:var(--secondary);">✅ データベースには既に日付（年間カレンダー）が構築されています。通常はこのステップはスキップで大丈夫です。</div>';
                    } else {
                        head = '<div style="text-align:left;font-size:0.85rem;">週案を使うには、データベースシートに1年分の日付・曜日・週番号を構築する必要があります。</div>';
                    }
                    return head
                        + '<div class="setup-wiz-field" style="margin-top:12px;"><label style="display:flex;align-items:center;gap:8px;cursor:pointer;">'
                        + '<input type="checkbox" id="wizGenCal" style="width:18px;height:18px;"' + (wiz.genCalendar ? ' checked' : '') + '> 年間カレンダーを生成する</label></div>'
                        + wizFieldHtml('wizCalYear', '対象年度', 'number', wiz.calYear, '例：' + wiz.calYear, '')
                        + wizFieldHtml('wizCalStartMonday', '第1週目の月曜日', 'date', wiz.calStartMonday, '',
                            '既存の入力データ（各校時の内容など）は消えません。')
                },
                collect: function (popup) {
                    var chk = popup.querySelector('#wizGenCal');
                    var y = popup.querySelector('#wizCalYear');
                    var m = popup.querySelector('#wizCalStartMonday');
                    if (chk) wiz.genCalendar = chk.checked;
                    if (y) wiz.calYear = y.value;
                    if (m) wiz.calStartMonday = m.value;
                }
            }
        ];

        // ---- ステップを順に表示 ----
        var progressLabels = steps.map(function (_, i) { return String(i + 1); });
        var step = 0;
        while (step < steps.length) {
            var s = steps[step];
            var res = await Swal.fire({
                title: '初期設定 (' + (step + 1) + '/' + steps.length + ')：' + s.title,
                html: s.render(),
                width: 560,
                progressSteps: progressLabels,
                currentProgressStep: step,
                confirmButtonText: step === steps.length - 1 ? '設定を保存する' : '次へ →',
                confirmButtonColor: '#1a73e8',
                showDenyButton: step > 0,
                denyButtonText: '← 戻る',
                denyButtonColor: '#6c757d',
                showCancelButton: true,
                cancelButtonText: '中断する',
                allowOutsideClick: false,
                willClose: (function (cur) {
                    return function (popup) { cur.collect(popup); };
                })(s)
            });
            if (res.isConfirmed) step++;
            else if (res.isDenied) step--;
            else {
                showToast('info', '設定タブの「初期設定ウィザード」からいつでも再開できます。');
                return;
            }
        }

        // ---- 保存の実行 ----
        showToast('info', '設定を保存しています...');

        // 1) 担当学年（標準時数の初期化を含む）
        var gradeResult = await new Promise(function (resolve) {
            google.script.run
                .withSuccessHandler(resolve)
                .withFailureHandler(function (e) { resolve({ success: false, error: e.message }); })
                .saveGrade(wiz.grade);
        });
        if (!gradeResult.success) { showToast('error', '学年設定の保存に失敗: ' + gradeResult.error); return; }
        STATE.grade = parseInt(wiz.grade, 10) || 3;

        // 2) システム設定（APIキーはマスクのままなら既存値が保持される）
        var settingsResult = await new Promise(function (resolve) {
            google.script.run
                .withSuccessHandler(resolve)
                .withFailureHandler(function (e) { resolve({ success: false, error: e.message }); })
                .saveAppSettings({
                    courseName: wiz.courseName,
                    postHour: wiz.postHour,
                    geminiApiKey: wiz.apiKey,
                    geminiModelName: settings.geminiModelName || 'gemini-2.5-flash',
                    moduleEnabled: !!settings.moduleEnabled
                });
        });
        if (!settingsResult.success) { showToast('error', '設定の保存に失敗: ' + settingsResult.error); return; }

        // 3) 年間カレンダー生成（チェック時のみ）
        var calendarMessage = '';
        if (wiz.genCalendar && wiz.calYear && wiz.calStartMonday) {
            showToast('info', '年間カレンダーを生成しています...（数秒〜十数秒かかります）');
            var calResult = await new Promise(function (resolve) {
                google.script.run
                    .withSuccessHandler(resolve)
                    .withFailureHandler(function (e) { resolve({ success: false, error: e.message }); })
                    .generateAnnualCalendar(wiz.calYear, wiz.calStartMonday);
            });
            if (calResult.success) {
                calendarMessage = '<br>年間カレンダーを生成しました。';
            } else {
                calendarMessage = '<br>⚠ 年間カレンダーの生成に失敗しました: ' + escHtml(calResult.error || '')
                    + '<br>設定タブの「年間カレンダー生成機能」から再実行できます。';
            }
        }

        // 4) ウィザード完了をマーク（次回から自動表示しない）
        google.script.run.withSuccessHandler(function () { }).withFailureHandler(function () { }).markSetupWizardDone();

        // 設定タブの表示を最新化
        STATE.isSystemSettingsLoaded = false;
        if (STATE.view === 'settings') loadSystemSettings();

        await Swal.fire({
            icon: 'success',
            title: '初期設定が完了しました！',
            html: '<div style="text-align:left;font-size:0.85rem;line-height:1.7;">設定を保存しました。' + calendarMessage
                + '<br><br>次のステップ:<br>'
                + '・「週案」タブで今週の予定を入力してみましょう<br>'
                + '・設定タブの「固定時間割エディタ」で基本時間割を登録すると、一括転記が使えます<br>'
                + '・PDFフォルダを設定した場合は「PDF読み込み」タブでAI読み取りを試せます</div>',
            confirmButtonText: '使いはじめる',
            confirmButtonColor: '#1a73e8'
        });

        // カレンダーを生成した場合は週案を読み込み直す
        if (wiz.genCalendar) goToToday();
    }

</script>
