name: バグ報告
description: 再現可能な不具合を報告します
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        報告ありがとうございます。児童名、メールアドレス、APIキー、学校内限定資料などの機密情報は記載しないでください。
  - type: textarea
    id: summary
    attributes:
      label: 不具合の概要
      description: 何が起きたかを簡潔に記載してください。
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 再現手順
      placeholder: |
        1. 「週案」タブを開く
        2. 編集を開始する
        3. …
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 期待する動作
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: 実際の動作・エラーメッセージ
    validations:
      required: true
  - type: dropdown
    id: device
    attributes:
      label: 利用端末
      options:
        - Windows / Chrome・Edge
        - macOS / Chrome・Safari
        - Chromebook
        - iPad / iPhone
        - Android
        - その他
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: ブラウザとバージョン
      placeholder: Chrome 126
  - type: dropdown
    id: launch
    attributes:
      label: 起動方法
      options:
        - GAS WebアプリURLを直接開いた
        - GitHub PagesのPWAから開いた
        - スプレッドシートのメニューから開いた
        - その他
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: 補足・スクリーンショット
      description: 個人情報やAPIキーが写っていないことを確認してください。
  - type: checkboxes
    id: checks
    attributes:
      label: 確認事項
      options:
        - label: 同じ内容のIssueがないか検索しました
          required: true
        - label: 機密情報を含めていません
          required: true
