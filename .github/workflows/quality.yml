name: Quality Gate

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  static-analysis-and-tests:
    name: Node ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        node-version:
          - 20
          - 22

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install quality tooling
        run: npm ci --ignore-scripts

      - name: Generate static analysis report
        id: static-analysis
        shell: bash
        run: |
          set +e
          node scripts/check-project.mjs --json > quality-report.json
          exit_code=$?
          echo "exit_code=${exit_code}" >> "$GITHUB_OUTPUT"
          cat quality-report.json
          exit 0

      - name: Upload quality report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-report-node-${{ matrix.node-version }}
          path: quality-report.json
          retention-days: 14

      - name: Run checker regression tests
        id: regression-tests
        shell: bash
        run: |
          set +e
          npm test 2>&1 | tee test-report.txt
          exit_code=${PIPESTATUS[0]}
          echo "exit_code=${exit_code}" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload regression test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report-node-${{ matrix.node-version }}
          path: test-report.txt
          retention-days: 14

      - name: Enforce regression tests
        if: steps.regression-tests.outputs.exit_code != '0'
        run: exit 1

      - name: Enforce static analysis
        if: steps.static-analysis.outputs.exit_code != '0'
        run: exit 1
