<script>
  'use strict';

  function p5cInjectNavigation() {
    var headerNav = document.querySelector('.header-nav');
    if (headerNav && !headerNav.querySelector('[data-view="copilot"]')) {
      var button = document.createElement('button');
      button.type = 'button';
      button.className = 'nav-btn p5-copilot-nav';
      button.dataset.view = 'copilot';
      button.onclick = function () { switchView('copilot'); };
      button.innerHTML = '<span class="material-symbols-outlined" aria-hidden="true">auto_awesome</span> AIコパイロット';
      var settings = headerNav.querySelector('[data-view="settings"]');
      headerNav.insertBefore(button, settings || headerNav.lastElementChild);
    }

    if (window.P4 && P4.viewLabels) P4.viewLabels.copilot = 'AIコパイロット';
    var moreGrid = document.querySelector('#p4MoreSheet .p4-more-grid');
    if (moreGrid && !moreGrid.querySelector('[data-p5-copilot]')) {
      var mobileButton = document.createElement('button');
      mobileButton.type = 'button';
      mobileButton.setAttribute('data-p5-copilot', '1');
      mobileButton.onclick = function () {
        if (typeof p4MobileSwitchView === 'function') p4MobileSwitchView('copilot');
        else switchView('copilot');
      };
      mobileButton.innerHTML = '<span class="material-symbols-outlined" aria-hidden="true">auto_awesome</span>AIコパイロット';
      moreGrid.insertBefore(mobileButton, moreGrid.firstChild);
    }
  }

  function p5cViewHtml() {
    return '<div id="view-copilot" class="view" role="main" aria-label="教師向けAIコパイロット">'
      + '<div class="p5-shell">'
      + '<aside class="p5-sidebar" aria-label="相談モード">'
      + '<div class="p5-sidebar-head"><div class="p5-title-row"><span class="p5-title-icon"><span class="material-symbols-outlined" aria-hidden="true">auto_awesome</span></span><div><div class="p5-title">教師AIコパイロット</div><div class="p5-subtitle">週案・校務データを横断し、確認可能な提案を返します。</div></div></div></div>'
      + '<div id="p5ModeList" class="p5-mode-list" role="group" aria-label="相談モード"></div>'
      + '</aside>'
      + '<section class="p5-main">'
      + '<div class="p5-toolbar"><div class="p5-toolbar-title"><strong id="p5ActiveModeLabel">今日のブリーフ</strong><span id="p5ActiveModeDescription"></span></div>'
      + '<div class="p5-toolbar-actions">'
      + '<button type="button" class="btn btn-outline btn-sm p5-context-button d-flex align-items-center gap-1" onclick="p5cOpenContext()" aria-haspopup="dialog"><span class="material-symbols-outlined fs-6" aria-hidden="true">tune</span><span class="p5-context-label">参照データ</span></button>'
      + '<button type="button" class="btn btn-outline btn-sm p5-clear-button d-flex align-items-center gap-1" onclick="p5cClearConversation()"><span class="material-symbols-outlined fs-6" aria-hidden="true">delete_sweep</span><span class="p5-clear-label">会話をクリア</span></button>'
      + '</div></div>'
      + '<div id="p5Conversation" class="p5-conversation" aria-live="polite"></div>'
      + '<div class="p5-composer-wrap"><div class="p5-composer"><textarea id="p5PromptInput" rows="1" maxlength="4000" aria-label="AIコパイロットへの相談内容" oninput="p5cAutoResize(this)" onkeydown="p5cComposerKeydown(event)"></textarea><button id="p5SendButton" type="button" class="p5-send-button" onclick="p5cSubmit()" aria-label="AIへ送信"><span class="material-symbols-outlined" aria-hidden="true">arrow_upward</span></button></div>'
      + '<div class="p5-composer-footer"><span>Enterで送信・Shift+Enterで改行</span><span>参照: <span id="p5ContextSummary">表示中の週案・翌週・タスク</span></span></div></div>'
      + '</section></div></div>'
      + '<div id="p5ContextDrawer" class="p5-context-drawer" role="dialog" aria-modal="true" aria-labelledby="p5ContextTitle" aria-hidden="true" onkeydown="p5cContextKeydown(event)"><div class="p5-context-panel">'
      + '<div class="p5-context-head"><div><h3 id="p5ContextTitle">AIが参照するデータ</h3><div class="p5-subtitle">相談ごとに必要な情報だけを選択してください。</div></div><button type="button" class="btn-icon" onclick="p5cCloseContext(true)" aria-label="参照データ設定を閉じる"><span class="material-symbols-outlined" aria-hidden="true">close</span></button></div>'
      + p5cContextOptionHtml('currentWeek', '表示中の週案', '行事、各校時、宿題、持ち物を参照します。')
      + p5cContextOptionHtml('nextWeek', '翌週の週案', '翌週の予定と準備を先読みします。')
      + p5cContextOptionHtml('tasks', '未完了タスク', '完了していないタスクを最大50件参照します。')
      + p5cContextOptionHtml('hours', '教科別時数', '標準時数と累計進捗を参照します。')
      + p5cContextOptionHtml('unitMaster', '単元マスタ', '教科・単元名・設定時数を参照します。')
      + p5cContextOptionHtml('reflections', '振り返り', '日次・週まとめの自由記述を参照します。要配慮情報を含めないでください。')
      + '<div class="p5-privacy-note"><strong>プライバシー保護</strong><br>会話とAI回答はスプレッドシートへ保存しません。メールアドレス・電話番号・長い識別番号はAI送信前に伏せ字へ変換します。提案は30分で期限切れになり、教師が確認するまでデータへ反映されません。</div>'
      + '<button type="button" class="btn btn-primary w-100 mt-3" onclick="p5cCloseContext(true)">この設定で続ける</button>'
      + '</div></div>';
  }

  function p5cContextOptionHtml(name, label, description) {
    var checked = P5C.scope[name] ? ' checked' : '';
    return '<label class="p5-context-option"><input type="checkbox"' + checked + ' onchange="p5cSetScope(\'' + name + '\',this.checked)"><span><strong>' + label + '</strong><span>' + description + '</span></span></label>';
  }

  function p5cInjectView() {
    if (document.getElementById('view-copilot')) return;
    var app = document.getElementById('app');
    var footer = app && app.querySelector('.giga-footer');
    if (!app) return;
    var holder = document.createElement('div');
    holder.innerHTML = p5cViewHtml();
    var view = holder.firstElementChild;
    var drawer = holder.lastElementChild;
    app.insertBefore(view, footer || null);
    document.body.appendChild(drawer);
    var contextDrawer = document.getElementById('p5ContextDrawer');
    if (contextDrawer) contextDrawer.addEventListener('click', function (event) { if (event.target === contextDrawer) p5cCloseContext(true); });
  }

  function p5cRenderModes() {
    var list = document.getElementById('p5ModeList');
    var modes = P5C.bootstrap && P5C.bootstrap.modes ? P5C.bootstrap.modes : [];
    if (!list) return;
    list.innerHTML = modes.map(function (mode) {
      return '<button type="button" class="p5-mode-button' + (mode.id === P5C.mode ? ' active' : '') + '" data-mode="' + p5cEsc(mode.id) + '" aria-pressed="' + (mode.id === P5C.mode ? 'true' : 'false') + '" onclick="p5cSelectMode(\'' + p5cEsc(mode.id) + '\')">'
        + '<span class="p5-mode-icon"><span class="material-symbols-outlined" aria-hidden="true">' + p5cEsc(mode.icon || 'auto_awesome') + '</span></span>'
        + '<span><span class="p5-mode-label">' + p5cEsc(mode.label) + '</span><span class="p5-mode-description">' + p5cEsc(mode.description) + '</span></span></button>';
    }).join('');
    p5cSelectMode(P5C.mode);
  }

  function p5cEmptyHtml() {
    return '<div class="p5-empty"><span class="material-symbols-outlined" aria-hidden="true">assistant</span><h3>教師の判断を支える相談相手です</h3><p>週案・タスク・時数・単元・振り返りから必要な情報だけを選び、根拠と確認可能な変更案を返します。AIが勝手に保存することはありません。</p>'
      + '<div class="p5-example-grid">'
      + '<button type="button" class="p5-example" onclick="p5cAskExample(\'今日、最優先で確認すべきことを3つに整理して\')">今日の優先事項を整理</button>'
      + '<button type="button" class="p5-example" onclick="p5cAskExample(\'今週の週案に抜けや準備不足がないか点検して\')">週案の抜けを点検</button>'
      + '<button type="button" class="p5-example" onclick="p5cAskExample(\'未完了タスクを期限と影響度で並べ替えて\')">校務負担を整理</button>'
      + '<button type="button" class="p5-example" onclick="p5cAskExample(\'来週の保護者向けお知らせの下書きを作って\')">保護者連絡を下書き</button>'
      + '</div></div>';
  }

  function p5cProposalHtml(proposal) {
    var before = proposal.preview && proposal.preview.before ? proposal.preview.before : '（追加）';
    var after = proposal.preview && proposal.preview.after ? proposal.preview.after : '';
    var target = proposal.preview && proposal.preview.target ? proposal.preview.target : '';
    var confidence = Math.round(Number(proposal.confidence || 0) * 100);
    var actionLabel = proposal.actionType === 'reflection.draft' || proposal.actionType === 'newsletter.draft' ? '下書きを確認' : '適用する';
    return '<article class="p5-proposal" data-proposal-id="' + p5cEsc(proposal.id) + '">'
      + '<div class="p5-proposal-title-row"><div class="p5-proposal-title">' + p5cEsc(proposal.title) + '</div><span class="p5-confidence">確度 ' + confidence + '%</span></div>'
      + '<div class="p5-proposal-reason">' + p5cEsc(proposal.reason) + '</div>'
      + '<div class="p5-proposal-target">対象: ' + p5cEsc(target) + '</div>'
      + '<div class="p5-diff"><div class="p5-diff-box"><span class="p5-diff-label">現在</span>' + p5cNl(before) + '</div><span class="material-symbols-outlined p5-diff-arrow" aria-hidden="true">arrow_forward</span><div class="p5-diff-box" data-diff="after"><span class="p5-diff-label">提案</span>' + p5cNl(after) + '</div></div>'
      + '<div class="p5-proposal-actions"><button type="button" class="btn btn-primary btn-sm" onclick="p5cApplyProposal(\'' + p5cEsc(proposal.id) + '\',this)">' + actionLabel + '</button><button type="button" class="btn btn-outline btn-sm" onclick="p5cRejectProposal(\'' + p5cEsc(proposal.id) + '\',this)">却下</button></div>'
      + '</article>';
  }

  function p5cAssistantHtml(message) {
    var response = message.response || {};
    var evidence = response.evidence || [];
    var risks = response.risks || [];
    var questions = response.questions || [];
    var proposals = response.proposals || [];
    var sourceLabels = {};
    (message.sources || []).forEach(function (source) { sourceLabels[source.id] = source.label; });
    var html = '<div class="p5-message"><article class="p5-assistant-card"><div class="p5-assistant-head"><span class="material-symbols-outlined" aria-hidden="true">auto_awesome</span><div class="p5-assistant-overview">' + p5cEsc(response.overview || 'AIコパイロットの回答') + '</div><div class="p5-assistant-meta">' + Math.max(1, Math.round((message.durationMs || 0) / 1000)) + '秒</div></div>'
      + '<div class="p5-answer">' + p5cNl(response.answer || '') + '</div>';

    if (message.privacyWarnings && message.privacyWarnings.length) {
      html += '<div class="p5-section"><div class="p5-section-title"><span class="material-symbols-outlined fs-6" aria-hidden="true">privacy_tip</span>プライバシー確認</div><div class="p5-risk-list">'
        + message.privacyWarnings.map(function (item) { return '<div class="p5-risk-item">' + p5cEsc(item) + '</div>'; }).join('') + '</div></div>';
    }
    if (evidence.length) {
      html += '<div class="p5-section"><div class="p5-section-title"><span class="material-symbols-outlined fs-6" aria-hidden="true">fact_check</span>根拠</div><div class="p5-evidence-list">'
        + evidence.map(function (item) { return '<div class="p5-evidence-item"><span class="p5-evidence-source">' + p5cEsc(sourceLabels[item.source] || item.label || item.source) + '</span>' + p5cEsc(item.detail) + '</div>'; }).join('') + '</div></div>';
    }
    if (risks.length) {
      html += '<div class="p5-section"><div class="p5-section-title"><span class="material-symbols-outlined fs-6" aria-hidden="true">warning</span>確認事項</div><div class="p5-risk-list">'
        + risks.map(function (item) { return '<div class="p5-risk-item">' + p5cEsc(item) + '</div>'; }).join('') + '</div></div>';
    }
    if (questions.length) {
      html += '<div class="p5-section"><div class="p5-section-title"><span class="material-symbols-outlined fs-6" aria-hidden="true">help</span>追加で確認したいこと</div><div class="p5-question-list">'
        + questions.map(function (item) { return '<div class="p5-question-item">' + p5cEsc(item) + '</div>'; }).join('') + '</div></div>';
    }
    if (proposals.length) {
      html += '<div class="p5-section"><div class="p5-section-title"><span class="material-symbols-outlined fs-6" aria-hidden="true">edit_square</span>確認して適用できる提案</div><div class="p5-proposals">'
        + proposals.map(p5cProposalHtml).join('') + '</div></div>';
    }
    html += '</article></div>';
    return html;
  }

  function p5cRenderConversation() {
    var container = document.getElementById('p5Conversation');
    if (!container) return;
    if (!P5C.messages.length) {
      container.innerHTML = p5cEmptyHtml();
      return;
    }
    container.innerHTML = P5C.messages.map(function (message) {
      if (message.role === 'user') return '<div class="p5-message p5-message-user"><div class="p5-user-bubble">' + p5cNl(message.text) + '</div></div>';
      if (message.role === 'assistant') return p5cAssistantHtml(message);
      return '<div class="p5-message"><div class="alert alert-danger">' + p5cEsc(message.text) + '</div></div>';
    }).join('');
    window.setTimeout(function () { container.scrollTop = container.scrollHeight; }, 0);
  }

  function p5cAppendLoadingMessage() {
    var container = document.getElementById('p5Conversation');
    if (!container) return;
    var loading = document.createElement('div');
    loading.id = 'p5LoadingMessage';
    loading.className = 'p5-message';
    loading.innerHTML = '<div class="p5-assistant-card p5-loading" role="status"><span>考えています</span><span class="p5-loading-dot"></span><span class="p5-loading-dot"></span><span class="p5-loading-dot"></span></div>';
    container.appendChild(loading);
    container.scrollTop = container.scrollHeight;
  }

  function p5cRemoveLoadingMessage() {
    var loading = document.getElementById('p5LoadingMessage');
    if (loading) loading.remove();
  }

  function p5cInstallViewWrapper() {
    if (window.__p5SwitchViewWrapped || typeof window.switchView !== 'function') return;
    window.__p5SwitchViewWrapped = true;
    var original = window.switchView;
    window.switchView = function (viewName) {
      original(viewName);
      if (viewName === 'copilot') {
        window.setTimeout(function () {
          p5cInjectNavigation();
          var input = document.getElementById('p5PromptInput');
          if (input && !P5C.messages.length) input.focus({ preventScroll: true });
        }, 0);
      }
    };
  }

  function p5cBootstrap() {
    google.script.run
      .withSuccessHandler(function (result) {
        if (!result || !result.success) return;
        P5C.bootstrap = result;
        P5C.configured = !!result.configured;
        P5C.mode = result.defaultMode || P5C.mode;
        if (result.defaultScope) P5C.scope = Object.assign(P5C.scope, result.defaultScope);
        p5cRenderModes();
        p5cUpdateContextSummary();
        p5cRenderConversation();
        if (!P5C.configured) {
          var container = document.getElementById('p5Conversation');
          if (container) container.insertAdjacentHTML('afterbegin', '<div class="alert alert-warning" role="alert">Gemini APIキーが未設定です。設定画面の「AI設定」から登録してください。</div>');
        }
      })
      .withFailureHandler(function () { /* AI機能の初期化失敗は既存アプリを妨げない */ })
      .getTeacherCopilotBootstrap(p5cCurrentMonday());
  }

  function p5cInstall() {
    if (P5C.installed) return;
    P5C.installed = true;
    p5cInjectView();
    p5cInjectNavigation();
    p5cInstallViewWrapper();
    p5cRenderConversation();
    p5cBootstrap();
    window.setTimeout(p5cInjectNavigation, 800);
    if (typeof p4EnhanceControlSemantics === 'function') p4EnhanceControlSemantics(document);
  }

  p5cInstall();
</script>
