        masterData: null,

        editBuffer: null,

        undoStack: [],            // Undo履歴

        dragSource: null,         // D&Dソース {day, period}
        helpModalOpen: false,     // ショートカットヘルプ表示中
        taskViewMode: 'list',     // タスク表示モード: 'list' or 'card'
        taskFilter: 'all',        // タスク絞り込み: 'all'/'overdue'/'today'/'week'/'nodate'
        taskSearchKeyword: '',    // タスク検索キーワード
        taskSortMode: 'dueDate',  // タスク並び替え: 'dueDate'/'priority'/'created'
        taskReminderLoaded: false, // リマインダー設定 読込済み

        showSat: true,            // 週案グリッドの土曜列 表示/非表示

        // 各ビューの遅延ロード制御フラグ／キャッシュ（旧・散在グローバルを集約）
        timetableLoaded: false,        // 固定時間割エディタ 読込済み
        vacationDatesLoaded: false,    // 長期休業期間設定 読込済み
        stdHoursLoaded: false,         // 教科別標準時数 読込済み
        umDataLoaded: false,           // 単元マスタ 読込済み
        isSystemSettingsLoaded: false, // システム設定 読込済み
        geminiModelsCache: null,       // Geminiモデル一覧キャッシュ
        taskDataLoaded: false,         // タスク初期ロード済み
        taskLoading: false,            // タスク二重呼び出し防止フラグ
        aiTaskPdfUIReady: false,       // タスク抽出コンソールのPDF配線済み
        // 各ビューの作業データ／編集状態（旧・散在グローバルを集約）
        pickerApiLoaded: false,        // Google Picker API 読込済み
        currentPickerType: null,       // 現在開いている Picker の種別
        stdHoursData: [],              // 教科別標準時数の作業データ
        allTaskData: [],               // タスク一覧の作業データ
        aiPreviewTasks: [],            // AI抽出タスクのプレビュー
        umAllRows: [],                 // 単元マスタ 全行データ
        umEditingRowIndex: null,       // 単元マスタ 編集中の行（シート行番号）
        // 行事予定（年間行事予定PDF）ビュー
        eventLibraryLoaded: false,     // 行事予定PDF一覧 読込済み
        eventLibraryLoading: false,    // 行事予定PDF一覧 読込中（二重呼び出し防止）
        eventLibraryGroups: [],        // 学校ごとのPDFグループ
        eventSelectedPdfId: null       // 表示中のPDFファイルID
    };

    // UX: 行定義（セルナビゲーション用）
    const GRID_ROWS = [
        { key: 'event', label: '行事', multi: false },
        { key: 'preclass', label: '登校前', multi: false },
        { key: 'morning', label: '朝学習', multi: false },
        { key: 'period0', label: '1校時', multi: true },
        { key: 'period1', label: '2校時', multi: true },
        { key: 'recess1', label: '中休み', multi: false },
        { key: 'period2', label: '3校時', multi: true },
        { key: 'period3', label: '4校時', multi: true },
        { key: 'recess2', label: '昼休み', multi: false },
        { key: 'period4', label: '5校時', multi: true },
        { key: 'period5', label: '6校時', multi: true },
        { key: 'afterschool', label: '放課後', multi: false },
        { key: 'homework', label: '宿題', multi: false },
        { key: 'items', label: '持ち物', multi: false },
    ];

    const DAY_LABELS_JP = ['月', '火', '水', '木', '金', '土', '日'];

    // ===== 初期化 =====
    window.onload = function () {
        initWeekendVisibility(); // 土日列の表示設定を復元（グリッド描画前に必要）
        // マルチテナント: まず自分のDB（スプレッドシート）が紐付いているか確認する。
        // 未紐付けならオンボーディングを表示し、通常のデータ読込は行わない。
        // 状態取得に失敗した場合（旧バックエンド・バインド型など）は既存動作を妨げず通常起動する。
        google.script.run
            .withSuccessHandler(function (status) {
                if (status && status.success && status.linked === false) {
                    showOnboardingChoice(status);
                } else {
                    startAppInit();
                }
            })
            .withFailureHandler(function () { startAppInit(); })
            .getTenantStatus();
    };

    /** アプリ本体の初期化（DB紐付け済みのときに実行）。 */
    function startAppInit() {
        loadMasterData();
        goToToday();
        loadAnnualHoursView();
        loadSettingsView();
        loadTasks(); // タスクをページ読み込み時に初期ロード（デフォルトでリスト表示）
        restoreTaskSidebarState(); // 週案タスクサイドバーの開閉状態を復元（デフォルトは収納）
        checkAutoReflection(); // 放課後にアプリを開いた場合、今日の振り返りモードを自動起動
        initPdfImportUI(); // PDF読み込み（ドロップゾーン・ファイル選択）の配線
        initAiTaskPdfUI(); // タスク抽出コンソールのPDFドロップゾーン配線
        maybeOfferSetupWizard(); // 初回起動時（設定が不十分な場合のみ）に初期設定ウィザードを表示
        loadMultiClassState(); // 複数学級モードの状態を読込（無効時はUI非表示のまま）
    }

    // ===================================================
    // ===== オンボーディング（自分のDBの作成／紐付け） =====
    // ===================================================

    /**
     * アプリを再読み込みします。
     * このアプリ本体（App.html）はGASのサンドボックスiframe内で動作しているため、
     * 素の location.reload() は一時URLを再読込しようとして白画面化することがあります
     * （特にGitHub PagesのPWAシェル内で顕著）。シェル内で動作している場合は、シェルへ
     * 再読み込みを依頼して iframe を貼り直してもらうことで白画面化を回避します。
     * シェル外（GASのexec URLを直接開いた場合）は従来どおり location.reload() します。
     */
    function reloadApp() {
        if (window.__hasPwaShell) {
            try {
                window.parent.postMessage({ type: 'schoolPlanNote:reload' }, '*');
                window.top.postMessage({ type: 'schoolPlanNote:reload' }, '*');
                return;
            } catch (e) { /* 失敗時は下の通常リロードにフォールバック */ }
        }
        try { location.reload(); } catch (e) { }
    }

    /** getTenantStatus() を取り直してオンボーディングの選択画面を再表示します（「戻る」用）。 */
    function reopenOnboarding() {
        google.script.run
            .withSuccessHandler(function (status) {
                if (status && status.success && status.linked === false) {
                    showOnboardingChoice(status);
                } else {
                    // すでに紐付いた／取得できた場合はアプリを開始（在ページのまま初期化）
                    startAppInit();
                }
            })
            .withFailureHandler(function () { reloadApp(); })
            .getTenantStatus();
    }

    /**
     * エラーメッセージが「DB未設定／無効」を示すか判定します。
     * セッション中にDBが削除・権限喪失した場合、getSs_()（07_WebApp.gs）が
     * 定型文を含むエラーを投げるため、その定型文の有無で判定します。
     * @param {string} msg
     * @returns {boolean}
     */
    function isNoDbError_(msg) {
        if (!msg) return false;
        return String(msg).indexOf('使用するスプレッドシート（データベース）が設定されていません') !== -1;
    }

    /**
     * DB無効化エラー時に、白画面化させずユーザーへ通知して
     * 再オンボーディング（作成／紐付け）へ誘導します。多重表示は抑止します。
     */
    function handleNoDbError_() {
        if (window.__noDbHandling) return;
        window.__noDbHandling = true;
        Swal.fire({
            icon: 'warning',
            title: 'データベースに接続できません',
            html: '使用中のデータベース（スプレッドシート）が見つからないか、アクセス権がありません。<br>'
                + '削除・移動された可能性があります。作成／紐付けの画面に戻ります。',
            confirmButtonColor: '#1a73e8',
            allowOutsideClick: false,
            allowEscapeKey: false
        }).then(function () {
            window.__noDbHandling = false;
            reopenOnboarding();
        });
    }

    /**
     * オンボーディングの選択画面（新規作成 / 既存紐付け）を表示します。
     * @param {Object} status getTenantStatus() の結果
     */
    async function showOnboardingChoice(status) {
        status = status || {};
        var email = status.email || '';
        var canCreate = !!status.canCreate;

        var html = '<div style="text-align:left;font-size:0.9rem;line-height:1.7;">'
            + 'このアプリを使うには、あなた専用のデータベース（Googleスプレッドシート）が必要です。'
            + '下のいずれかを選んで、はじめましょう。'
            + (email ? ('<div style="margin-top:8px;color:var(--secondary);font-size:0.8rem;">ログイン中: ' + escHtml(email) + '</div>') : '')
            + (canCreate ? '' : '<div style="margin-top:8px;color:#b26a00;font-size:0.8rem;">※ 新規作成は配布元の設定待ちのため、いまは「既存のシートを紐付け」のみ利用できます。</div>')
            + '</div>';

        var res = await Swal.fire({
            title: 'ようこそ！はじめの設定',
            html: html,
            width: 560,
            allowOutsideClick: false,
            allowEscapeKey: false,
            showConfirmButton: canCreate,
            confirmButtonText: '新しく作成する',
            confirmButtonColor: '#1a73e8',
            showDenyButton: true,
            denyButtonText: '既存のシートを紐付け',
            denyButtonColor: '#34a853'
        });

        if (res.isConfirmed) {
            onboardingCreate();
        } else if (res.isDenied) {
            onboardingLink();
        } else {
            // 閉じられた場合は再表示（この画面は完了するまで必須）
            showOnboardingChoice(status);
        }
    }

    /** 新規作成フロー: 名前を入力してテンプレートから自分専用DBを作成します。 */
    async function onboardingCreate() {
        var input = await Swal.fire({
            title: '新しいデータベースを作成',
            input: 'text',
            inputLabel: 'ファイル名（空欄なら自動で名前を付けます）',
            inputPlaceholder: '例）週案データベース 2026',
            width: 520,
            allowOutsideClick: false,
            showCancelButton: true,
            cancelButtonText: '戻る',
            confirmButtonText: '作成する',
            confirmButtonColor: '#1a73e8'
        });
        if (!input.isConfirmed) { reopenOnboarding(); return; }

        Swal.fire({
            title: '作成中...',
            html: 'あなた専用のデータベースを作成しています。しばらくお待ちください。',
            allowOutsideClick: false,
            allowEscapeKey: false,
            didOpen: function () { Swal.showLoading(); }
        });

        google.script.run
            .withSuccessHandler(function (r) {
                if (r && r.success) {
                    Swal.fire({
                        icon: 'success',
                        title: '作成しました',
                        html: 'あなた専用のデータベースを作成しました。アプリを開始します。',
                        confirmButtonColor: '#1a73e8',
                        allowOutsideClick: false
                    }).then(function () { startAppInit(); });
                } else {
                    Swal.fire({
                        icon: 'error',
                        title: '作成に失敗しました',
                        html: escHtml((r && r.error) || '不明なエラーが発生しました。'),
                        confirmButtonColor: '#1a73e8',
                        allowOutsideClick: false
                    }).then(function () { reopenOnboarding(); });
                }
            })
            .withFailureHandler(function (e) {
                Swal.fire({
                    icon: 'error',
                    title: '通信エラー',
                    html: escHtml(e && e.message ? e.message : String(e)),
                    confirmButtonColor: '#1a73e8',
                    allowOutsideClick: false
                }).then(function () { reopenOnboarding(); });
            })
            .createMyDatabase(input.value || '');
    }

    /** 既存紐付けフロー: スプレッドシートのURL/IDを入力して自分のDBとして紐付けます。 */
    async function onboardingLink() {
        var input = await Swal.fire({
            title: '既存のシートを紐付け',
            input: 'text',
            inputLabel: 'スプレッドシートの URL または ID',
            inputPlaceholder: 'https://docs.google.com/spreadsheets/d/..../edit',
            width: 560,
            allowOutsideClick: false,
            showCancelButton: true,
            cancelButtonText: '戻る',
            confirmButtonText: '紐付ける',
            confirmButtonColor: '#34a853',
            inputValidator: function (v) { if (!v) return 'URL または ID を入力してください。'; }
        });
        if (!input.isConfirmed) { reopenOnboarding(); return; }

        Swal.fire({
            title: '確認中...',
            html: 'スプレッドシートを確認しています。',
            allowOutsideClick: false,
            allowEscapeKey: false,
            didOpen: function () { Swal.showLoading(); }
        });

        google.script.run
            .withSuccessHandler(function (r) {
                if (r && r.success) {
                    var proceed = function () { startAppInit(); };
                    if (r.warning) {
                        Swal.fire({
                            icon: 'warning',
                            title: '紐付けました（注意）',
                            html: escHtml(r.warning) + '<br>このまま開始しますが、必要ならシートを確認してください。',
                            confirmButtonColor: '#1a73e8',
                            allowOutsideClick: false
                        }).then(proceed);
                    } else {
                        Swal.fire({
                            icon: 'success',
                            title: '紐付けました',
                            html: '「' + escHtml(r.spreadsheetName || '') + '」を紐付けました。アプリを開始します。',
                            confirmButtonColor: '#1a73e8',
                            allowOutsideClick: false
                        }).then(proceed);
                    }
                } else {
                    Swal.fire({
                        icon: 'error',
                        title: '紐付けに失敗しました',
                        html: escHtml((r && r.error) || '不明なエラーが発生しました。'),
                        confirmButtonColor: '#1a73e8',
                        allowOutsideClick: false
                    }).then(function () { reopenOnboarding(); });
                }
            })
            .withFailureHandler(function (e) {
                Swal.fire({
                    icon: 'error',
                    title: '通信エラー',
                    html: escHtml(e && e.message ? e.message : String(e)),
                    confirmButtonColor: '#1a73e8',
                    allowOutsideClick: false
                }).then(function () { reopenOnboarding(); });
            })
            .linkMyDatabase(input.value || '');
    }

    // ===== 週案グリッドの土日列 表示/非表示 =====
    function isDayVisible(dayIdx) {
        if (dayIdx === 5) return STATE.showSat;
        if (dayIdx === 6) return STATE.showSun;
        return true;
    }

    function initWeekendVisibility() {
        try {
            STATE.showSat = localStorage.getItem('weeklyShowSat') !== '0';
            STATE.showSun = localStorage.getItem('weeklyShowSun') !== '0';
        } catch (e) {
            STATE.showSat = true;
            STATE.showSun = true;
        }
        updateWeekendToggleUI();
    }

    function toggleWeekendDay(which) {
        if (which === 'sat') STATE.showSat = !STATE.showSat;
        else if (which === 'sun') STATE.showSun = !STATE.showSun;
        try {
            localStorage.setItem('weeklyShowSat', STATE.showSat ? '1' : '0');
            localStorage.setItem('weeklyShowSun', STATE.showSun ? '1' : '0');
        } catch (e) { }

        // 選択中セルが非表示列になった場合は選択を解除
        if (STATE.selectedCell && !isDayVisible(STATE.selectedCell.day)) clearSelection();
        updateWeekendToggleUI();

        if (STATE.weekData && STATE.weekData.days) {
            // 編集モード中は入力中の内容を失わないよう、DOMから回収した最新値で再描画する
            // （STATE.weekData.days は保存済みベースラインなので書き換えない）
            var daysToRender = STATE.weekData.days;
            if (STATE.editMode) {
                var current = collectCurrentEditData();
                if (current) daysToRender = current;
            }
            renderWeekGrid(daysToRender);
        }
    }

    function updateWeekendToggleUI() {
        var satBtn = document.getElementById('toggleSatBtn');
        var sunBtn = document.getElementById('toggleSunBtn');
        if (satBtn) {
            satBtn.classList.toggle('off', !STATE.showSat);
            satBtn.title = '土曜日の列を' + (STATE.showSat ? '非表示にする' : '表示する');
        }
        if (sunBtn) {
            sunBtn.classList.toggle('off', !STATE.showSun);
            sunBtn.title = '日曜日の列を' + (STATE.showSun ? '非表示にする' : '表示する');
        }
    }

    // ===== 週案タスクサイドバーの展開・収納 =====
    function toggleTaskSidebar() {
        var sidebar = document.getElementById('weeklyTaskSidebar');
        if (!sidebar) return;
        var collapsed = sidebar.classList.toggle('collapsed');
        updateTaskSidebarToggleIcon(collapsed);
        try { localStorage.setItem('weeklyTaskSidebarCollapsed', collapsed ? '1' : '0'); } catch (e) {}
    }

    function updateTaskSidebarToggleIcon(collapsed) {
        var icon = document.getElementById('taskSidebarToggleIcon');
        // 右側のサイドバーなので、収納時は「開く(左向き)」、展開時は「閉じる(右向き)」を表示
        if (icon) icon.textContent = collapsed ? 'chevron_left' : 'chevron_right';
    }

    function restoreTaskSidebarState() {
        var sidebar = document.getElementById('weeklyTaskSidebar');
        if (!sidebar) return;
        var stored = null;
        try { stored = localStorage.getItem('weeklyTaskSidebarCollapsed'); } catch (e) {}
        // 未設定（初回）の場合は収納をデフォルトとする
        var collapsed = (stored === null) ? true : (stored === '1');
        sidebar.classList.toggle('collapsed', collapsed);
        updateTaskSidebarToggleIcon(collapsed);
    }

    // ===== ブラウザ閉じ/リロード時の警告 =====
    window.addEventListener('beforeunload', function (e) {
        if (hasUnsavedChanges()) {
            e.preventDefault();
            e.returnValue = '';
        }
    });

    // ===== ビュー切り替え =====
    function switchView(viewName) {
        autoSaveAndThen(function () {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('view-' + viewName).classList.add('active');
            document.querySelector('.nav-btn[data-view="' + viewName + '"]').classList.add('active');
            STATE.view = viewName;
            if (viewName === 'newsletter') {
                NW.init();
            }
            if (viewName === 'integration') {
                checkProcessingStatus();
            }
            if (viewName === 'settings' && !STATE.timetableLoaded) {
                loadTimetableEditor();
            }
            if (viewName === 'settings' && !STATE.vacationDatesLoaded) {
                loadVacationDates();
            }
            if (viewName === 'settings' && !STATE.stdHoursLoaded) {
                loadStandardHours();
            }
            if (viewName === 'settings' && !STATE.isSystemSettingsLoaded) {
                loadSystemSettings();
            }
            if (viewName === 'hours') {
                loadAnnualHoursView();
                if (STATE.mondayStr) {
                    loadHoursSummary();
                }
            }
            if (viewName === 'task') {
                if (!STATE.taskDataLoaded && !STATE.taskLoading) {
                    loadTasks();
                } else if (STATE.taskDataLoaded) {
                    renderTaskList(); // データ読み込み済みの場合は再描画
                }
                loadTaskReminderSettings(); // リマインダー設定を初回のみ読込
            }
            if (viewName === 'unitmaster' && !STATE.umDataLoaded) {
                loadUnitMasterData();
            }
            if (viewName === 'events' && !STATE.eventLibraryLoaded) {
                loadEventPdfLibrary();
            }
        });
    }

    // ===== 2本指スワイプによるビュー切り替え（タッチ端末向け・ループ対応） =====
    (function () {
        var SWIPE_MIN_X = 80;       // 発火に必要な横移動量(px)
        var SWIPE_MAX_Y_RATIO = 0.6; // 縦移動が横移動のこの比率を超えたら斜め操作として無効
        var PINCH_TOLERANCE = 60;    // 2本指の間隔変化がこれを超えたらピンチズームとみなす

        var tracking = false; // 2本指ジェスチャーを追跡中か
        var handled = false;  // このジェスチャーで切り替え済みか（全指が離れるまで再発火しない）
        var startMidX = 0, startMidY = 0, startDist = 0;

        function getViewOrder() {
            return Array.prototype.map.call(
                document.querySelectorAll('.header-nav .nav-btn[data-view]'),
                function (b) { return b.dataset.view; }
            );
        }

        function isSwipeBlocked() {
            // ピンチズームで拡大表示中は2本指操作をパン/ズームに譲る
            if (window.visualViewport && window.visualViewport.scale > 1.01) return true;
            // SweetAlert2 のダイアログ表示中は誤操作防止のため無効
            if (document.body.classList.contains('swal2-shown')) return true;
            // PDFプレビューモーダル表示中も無効
            var overlay = document.getElementById('pdfPreviewOverlay');
            if (overlay && overlay.style.display !== 'none') return true;
            return false;
        }

        function midAndDist(touches) {
            var t0 = touches[0], t1 = touches[1];
            return {
                x: (t0.clientX + t1.clientX) / 2,
                y: (t0.clientY + t1.clientY) / 2,
                dist: Math.hypot(t1.clientX - t0.clientX, t1.clientY - t0.clientY)
            };
        }

        function switchViewBySwipe(direction) {
            var order = getViewOrder();
            if (order.length < 2) return;
            var idx = order.indexOf(STATE.view);
            if (idx < 0) idx = 0;
            // ループスクロール: 端のタブから反対側の端へ回り込む
            switchView(order[(idx + direction + order.length) % order.length]);
        }

        document.addEventListener('touchstart', function (e) {
            if (e.touches.length === 2 && !handled && !isSwipeBlocked()) {
                var m = midAndDist(e.touches);
                startMidX = m.x;
                startMidY = m.y;
                startDist = m.dist;
                tracking = true;
            } else if (e.touches.length > 2) {
                tracking = false;
            }
        }, { passive: true });

        document.addEventListener('touchmove', function (e) {
            if (!tracking || e.touches.length !== 2) return;
            var m = midAndDist(e.touches);
            if (Math.abs(m.dist - startDist) > PINCH_TOLERANCE) {
                tracking = false; // ピンチズーム操作なので追跡をやめる
                return;
            }
            var dx = m.x - startMidX;
            var dy = m.y - startMidY;
            if (Math.abs(dx) >= SWIPE_MIN_X && Math.abs(dy) <= Math.abs(dx) * SWIPE_MAX_Y_RATIO) {
                tracking = false;
                handled = true;
                // 左へスワイプ→右隣のタブ / 右へスワイプ→左隣のタブ
                switchViewBySwipe(dx < 0 ? 1 : -1);
            }
        }, { passive: true });

        function onTouchSettle(e) {
            if (e.touches.length < 2) tracking = false;
            if (e.touches.length === 0) handled = false;
        }
        document.addEventListener('touchend', onTouchSettle, { passive: true });
        document.addEventListener('touchcancel', onTouchSettle, { passive: true });
    })();

    // ===== 単元マスタ読み込み =====
    function loadMasterData() {
        google.script.run
            .withSuccessHandler(function (data) {
                if (data.success) STATE.masterData = data;
            })
            .withFailureHandler(_onCommError)
            .getUnitMasterForSuggest();
    }

    // ===== 週案ビュー =====
    function goToToday() {
        console.log('[DEBUG] goToToday called');
        google.script.run
            .withSuccessHandler(function (mondayStr) {
                console.log('[DEBUG] getTodaysMondayStr success:', mondayStr);
                STATE.mondayStr = mondayStr;
                loadWeeklyPlan();
            })
            .withFailureHandler(function (e) {
                console.error('[DEBUG] getTodaysMondayStr FAILED:', e.message);
                if (isNoDbError_(e && e.message)) { handleNoDbError_(); return; }
                showToast('error', '初期化エラー: ' + e.message);
            })
            .getTodaysMondayStr();
    }

    function navigateWeek(delta) {
        if (!STATE.mondayStr) return;
        var parts = STATE.mondayStr.split('/');
        var d = new Date(+parts[0], +parts[1] - 1, +parts[2]);
        d.setDate(d.getDate() + delta * 7);
        STATE.mondayStr = formatDateLocal(d);
        loadWeeklyPlan();
    }

    function jumpToDate(dateStr) {
        if (!dateStr) return;
        var parts = dateStr.split('-');
        var d = new Date(+parts[0], +parts[1] - 1, +parts[2]);
        var day = d.getDay();
        var diff = d.getDate() - day + (day === 0 ? -6 : 1);
        d.setDate(diff);
        STATE.mondayStr = formatDateLocal(d);
        loadWeeklyPlan();

        // 日付入力をリセット（不要な場合はそのまま）
        document.getElementById('jumpDateInput').value = '';
    }

    function jumpToWeek(weekNum) {
        if (!weekNum) return;

        var originalLabel = document.getElementById('weekLabel').textContent;
        document.getElementById('weekLabel').textContent = '検索中...';

        google.script.run
            .withSuccessHandler(function (mondayStr) {
                if (mondayStr) {
                    STATE.mondayStr = mondayStr;
                    loadWeeklyPlan();
                } else {
                    document.getElementById('weekLabel').textContent = originalLabel;
                    showToast('error', '指定された週が見つかりませんでした');
                }
                document.getElementById('jumpWeekInput').value = '';
            })
            .withFailureHandler(function (e) {
                document.getElementById('weekLabel').textContent = originalLabel;
                showToast('error', '検索エラー: ' + e.message);
                document.getElementById('jumpWeekInput').value = '';
            })
            .getMondayStrByWeekNumber(weekNum);
    }


    // ===== 週案 全文検索（全ての週を対象にしたキーワード検索） =====

    /** 検索モーダルを開きます。Enterキーまたは検索ボタンで実行します。 */
    function openPlanSearch() {
        Swal.fire({
            title: '週案をまるごと検索',
            html: '<div style="display:flex;gap:8px;">'
                + '<input type="text" id="planSearchInput" class="swal2-input" style="flex:1;margin:0;" '
                + 'placeholder="例: 避難訓練 / 実験 / 分数" maxlength="100">'
                + '<button type="button" class="btn btn-primary" style="white-space:nowrap;" onclick="runPlanSearch()">検索</button>'
                + '</div>'
                + '<div id="planSearchStatus" class="plan-search-status">行事・朝学習・各校時（教科/単元/内容）・宿題・持ち物・振り返りなど、すべての週の入力内容から検索します。</div>'
                + '<div id="planSearchResults"></div>',
            width: 640,
            showConfirmButton: false,
            showCloseButton: true,
            didOpen: function (popup) {
                var input = popup.querySelector('#planSearchInput');
                if (input) {
                    input.focus();
                    input.addEventListener('keydown', function (ev) {
                        if (ev.key === 'Enter') { ev.preventDefault(); runPlanSearch(); }
                    });
                }
            }
        });
    }

    /** 検索を実行し、結果一覧をモーダル内に描画します。 */
    function runPlanSearch() {
        var input = document.getElementById('planSearchInput');
        var statusEl = document.getElementById('planSearchStatus');
        var resultsEl = document.getElementById('planSearchResults');
        if (!input || !statusEl || !resultsEl) return;

        var keyword = input.value.trim();
        if (!keyword) { statusEl.textContent = '検索キーワードを入力してください。'; return; }

        statusEl.textContent = '「' + keyword + '」を検索しています...';
        resultsEl.innerHTML = '';

        google.script.run
            .withSuccessHandler(function (res) {
                if (!res.success) { statusEl.textContent = '検索エラー: ' + res.error; return; }
                renderPlanSearchResults(res, statusEl, resultsEl);
            })
            .withFailureHandler(function (e) {
                statusEl.textContent = '通信エラー: ' + e.message;
            })
            .searchWeeklyPlans(keyword);
    }

    /** 検索結果リストを描画します。項目クリックで該当週へジャンプします。 */
    function renderPlanSearchResults(res, statusEl, resultsEl) {
        if (!res.results || res.results.length === 0) {
            statusEl.textContent = '「' + res.keyword + '」に一致する内容は見つかりませんでした。';
            resultsEl.innerHTML = '';
            return;
        }

        statusEl.textContent = '「' + res.keyword + '」の検索結果: ' + res.total + '件'
            + (res.limited ? '（先頭' + res.results.length + '件を表示）' : '');

        var html = '<div class="plan-search-results">';
        res.results.forEach(function (r) {
            html += '<div class="plan-search-item" onclick="jumpToSearchResult(\'' + escAttr(r.date) + '\')">'
                + '<div class="plan-search-item-head">'
                + '<span class="plan-search-item-date">' + escHtml(r.date) + '（' + escHtml(r.dayLabel) + '）</span>'
                + (r.weekNum ? '<span>第' + escHtml(String(r.weekNum)) + '週</span>' : '')
                + '<span class="plan-search-item-field">' + escHtml(r.field) + '</span>'
                + '</div>'
                + '<div class="plan-search-item-snippet">' + highlightKeyword(r.snippet, res.keyword) + '</div>'
                + '</div>';
        });
        html += '</div>';
        resultsEl.innerHTML = html;
    }

    /** エスケープ済みテキスト内のキーワードを <mark> で強調します。 */
    function highlightKeyword(text, keyword) {
        var escaped = escHtml(text || '');
        var escapedKw = escHtml(keyword || '');
        if (!escapedKw) return escaped;
        // 大文字小文字を区別せずに一致箇所を強調（正規表現の特殊文字はエスケープ）
        var pattern = escapedKw.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        try {
            return escaped.replace(new RegExp('(' + pattern + ')', 'gi'), '<mark>$1</mark>');
        } catch (e) {
            return escaped;
        }
    }

    /** 検索結果の日付を含む週の週案へジャンプします。 */
    function jumpToSearchResult(dateStr) {
        Swal.close();
        var parts = dateStr.split('/');
        var d = new Date(+parts[0], +parts[1] - 1, +parts[2]);
        var day = d.getDay();
        var diff = d.getDate() - day + (day === 0 ? -6 : 1);
        d.setDate(diff);
        STATE.mondayStr = formatDateLocal(d);
        if (STATE.view !== 'plan') switchView('plan');
        loadWeeklyPlan();
        showToast('info', dateStr + ' の週を表示しました');
    }

    function loadWeeklyPlan() {
        if (STATE.editMode) {
            autoSaveAndThen(function () { doLoadWeeklyPlan(); });
            return;
        }
        doLoadWeeklyPlan();
    }

    function doLoadWeeklyPlan() {
        console.log('[DEBUG] loadWeeklyPlan called, mondayStr:', STATE.mondayStr);
        var grid = document.getElementById('weekGrid');
        // 前回描画時の inline 幅指定（minWidth / gridTemplateColumns）が残ると、
        // 空のグリッドが横に広がったまま横スクロールが発生するためリセットする
        // （ローディング表示自体は position:fixed で常に画面中央に出る）
        grid.style.minWidth = '';
        grid.style.gridTemplateColumns = '';
        grid.innerHTML = '<div class="loading-state"><div class="spinner-lg"></div><p>読み込み中...</p></div>';
        document.getElementById('weekLabel').textContent = '読み込み中...';

        google.script.run
            .withSuccessHandler(function (data) {
                console.log('[DEBUG] getWeeklyPlanData success:', JSON.stringify(data).substring(0, 300));
                if (!data.success) { showToast('error', 'データ取得エラー: ' + data.error); return; }
                STATE.weekData = data;
                renderWeekGrid(data.days);
                updateWeekHeader(data.days, data.weekNum);
                loadHoursSummary(); // 週変更時に時数集計も更新

                // 週案表示時にタスクパネルを更新する（loadTasks はwindow.onloadで管理）
                renderWeeklyTaskPanel();
            })
            .withFailureHandler(function (e) {
                console.error('[DEBUG] getWeeklyPlanData FAILED:', e.message);
                if (isNoDbError_(e && e.message)) { handleNoDbError_(); return; }
                showToast('error', '通信エラー: ' + e.message);
            })
            .getWeeklyPlanData(STATE.mondayStr);
    }

    // ===== ツールバーのドロップダウンメニュー制御 =====
    // 編集ツールバー「入力支援」や学級通信「ファイル」などの収納メニューを開閉する。
    // メニュー項目は通常のボタン（onclick属性）のまま収納しているため、
    // 既存の表示切替ロジック（updateEditUI など）はそのまま機能する。
    function toggleToolbarDropdown(btn) {
        var dd = btn.closest('.tb-dropdown');
        if (!dd) return;
        var willOpen = !dd.classList.contains('open');
        closeToolbarDropdowns();
        if (willOpen) {
            dd.classList.add('open');
            btn.setAttribute('aria-expanded', 'true');
        }
    }

    function closeToolbarDropdowns() {
        document.querySelectorAll('.tb-dropdown.open').forEach(function (dd) {
            dd.classList.remove('open');
            var toggle = dd.querySelector('.tb-dropdown-toggle');
            if (toggle) toggle.setAttribute('aria-expanded', 'false');
        });
    }

    // メニュー外クリックで閉じる。メニュー項目クリック時は実行後に閉じる
    document.addEventListener('click', function (e) {
        if (!e.target.closest('.tb-dropdown')) {
            closeToolbarDropdowns();
            return;
        }
        if (e.target.closest('.tb-menu-item')) closeToolbarDropdowns();
    });

    document.addEventListener('keydown', function (e) {
        if (e.key === 'Escape') closeToolbarDropdowns();
    });

    function updateWeekHeader(days, weekNum) {
        if (!days || days.length === 0) return;
        var mon = days[0];
        var parts = mon.date.split('/');
        var displayWeek = weekNum !== undefined && weekNum !== null ? weekNum : '?';
        document.getElementById('weekLabel').textContent = parts[0] + '年 第' + displayWeek + '週';
        document.getElementById('weekRange').textContent = mon.date + '（月）〜 ' + days[6].date + '（日）';
        document.getElementById('headerSubtitle').textContent = '第' + displayWeek + '週 表示中';
    }

</script>
