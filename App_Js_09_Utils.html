<script>
    'use strict';
    // ===== ユーティリティ =====
    function formatDateLocal(date) {
        var y = date.getFullYear();
        var m = String(date.getMonth() + 1).padStart(2, '0');
        var d = String(date.getDate()).padStart(2, '0');
        return y + '/' + m + '/' + d;
    }
    function escHtml(str) {
        if (!str) return '';
        return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }
    function escAttr(str) {
        if (!str) return '';
        return String(str).replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }

    /**
     * テキスト中の URL と Markdown 形式リンク [表示テキスト](URL) を
     * クリック可能な <a> タグに変換する。
     * escHtml 済みテキストに対して呼ぶこと。
     */
    function linkify(escapedHtml) {
        if (!escapedHtml) return '';
        var md = escapedHtml.replace(
            /\[([^\]]+)\]\((https?:\/\/[^\s\)]+)\)/g,
            '<a href="$2" target="_blank" rel="noopener noreferrer" class="cell-link" onclick="event.stopPropagation()">$1<span class="material-symbols-outlined cell-link-icon">open_in_new</span></a>'
        );
        md = md.replace(
            /(^|[^"=])(https?:\/\/(?:&amp;|[^\s<&])+)/g,
            '$1<a href="$2" target="_blank" rel="noopener noreferrer" class="cell-link" onclick="event.stopPropagation()">$2<span class="material-symbols-outlined cell-link-icon">open_in_new</span></a>'
        );
        return md;
    }

    function openLinkInsertDialog(target) {
        Swal.fire({
            title: 'リンクを挿入',
            html:
                '<div style="text-align:left;font-size:0.85rem;margin-bottom:8px;color:var(--text-sub);">Google ドライブや外部サイトの URL を埋め込めます</div>'
                + '<input id="swal-link-url" class="swal2-input" placeholder="https://..." style="font-size:0.85rem;">'
                + '<input id="swal-link-text" class="swal2-input" placeholder="表示テキスト（省略可）" style="font-size:0.85rem;">',
            focusConfirm: false,
            showCancelButton: true,
            confirmButtonText: '挿入',
            cancelButtonText: 'キャンセル',
            preConfirm: function () {
                var url = document.getElementById('swal-link-url').value.trim();
                var text = document.getElementById('swal-link-text').value.trim();
                if (!url) {
                    Swal.showValidationMessage('URL を入力してください');
                    return false;
                }
                if (!/^https?:\/\//i.test(url)) url = 'https://' + url;
                return { url: url, text: text };
            }
        }).then(function (result) {
            if (!result.isConfirmed || !result.value) return;
            var url = result.value.url;
            var text = result.value.text;
            var insert = text ? '[' + text + '](' + url + ')' : url;
            var start = target.selectionStart || 0;
            var end = target.selectionEnd || 0;
            var before = target.value.substring(0, start);
            var after = target.value.substring(end);
            target.value = before + insert + after;
            target.focus();
            target.selectionStart = target.selectionEnd = start + insert.length;
            autoResizeTextarea(target);
        });
    }

    var SwalToast = Swal.mixin({
        toast: true,
        position: 'top-end',
        showConfirmButton: false,
        timer: 3500,
        timerProgressBar: true,
        didOpen: function (toast) {
            toast.addEventListener('mouseenter', Swal.stopTimer);
            toast.addEventListener('mouseleave', Swal.resumeTimer);
        }
    });

    function showToast(type, message) {
        var iconMap = { success: 'success', error: 'error', info: 'info' };
        SwalToast.fire({
            icon: iconMap[type] || 'info',
            title: message
        });
    }

    function _onCommError(e) {
        var msg = (e && e.message) ? e.message : String(e);
        if (typeof isNoDbError_ === 'function' && isNoDbError_(msg)
            && typeof handleNoDbError_ === 'function') {
            handleNoDbError_();
            return;
        }
        showToast('error', '通信エラー: ' + msg);
    }

</script>

<script>
    'use strict';
    // Phase 3は初期描画を妨げないよう、アプリ読込後に独立モジュールとして取得する。
    window.addEventListener('load', function () {
        setTimeout(function () {
            google.script.run
                .withSuccessHandler(function (modules) {
                    if (!modules || document.getElementById('p3DataProtectionModule')) return;
                    (Array.isArray(modules) ? modules : [modules]).forEach(function (html, index) {
                        var code = String(html || '').replace(/^\s*<script>/, '').replace(/<\/script>\s*$/, '');
                        var script = document.createElement('script');
                        script.id = index === 0 ? 'p3DataProtectionModule' : 'p3DataProtectionModule' + index;
                        script.textContent = code;
                        document.head.appendChild(script);
                    });
                })
                .withFailureHandler(function () { /* 保全UIの遅延読込失敗は週案表示を妨げない */ })
                .getDataProtectionClientModule();
        }, 250);
    });
</script>

<script>
    'use strict';
    // Phase 4も初期週案描画後に読み込み、端末最適化が起動時間へ影響しないようにする。
    window.addEventListener('load', function () {
        setTimeout(function () {
            google.script.run
                .withSuccessHandler(function (payload) {
                    if (!payload || document.getElementById('p4AccessibilityModule')) return;
                    if (payload.css) {
                        var css = String(payload.css).replace(/<\/?style>/g, '');
                        var style = document.createElement('style');
                        style.id = 'p4AccessibilityStyles';
                        style.textContent = css;
                        document.head.appendChild(style);
                    }
                    var modules = Array.isArray(payload.modules) ? payload.modules : [];
                    modules.forEach(function (html, index) {
                        var code = String(html || '').replace(/^\s*<script>/, '').replace(/<\/script>\s*$/, '');
                        var script = document.createElement('script');
                        script.id = index === 0 ? 'p4AccessibilityModule' : 'p4AccessibilityModule' + index;
                        script.textContent = code;
                        document.head.appendChild(script);
                    });
                })
                .withFailureHandler(function () { /* 表示最適化の読込失敗は既存アプリ操作を妨げない */ })
                .getDeviceAccessibilityClientModule();
        }, 350);
    });
</script>
