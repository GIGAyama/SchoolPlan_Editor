<style>
    /* ================================================================
       Phase 4: 端末最適化・アクセシビリティ
       既存デザインを維持したまま、端末幅・入力方式・利用者設定に追従する。
       ================================================================ */

    :root {
        --p4-mobile-nav-h: 66px;
        --p4-safe-bottom: env(safe-area-inset-bottom, 0px);
        --p4-focus-color: #0b57d0;
        --p4-control-min: 40px;
        --p4-content-scale: 1;
        --p4-density-gap: 1;
    }

    html {
        text-size-adjust: 100%;
        -webkit-text-size-adjust: 100%;
        scroll-padding-top: calc(var(--header-h) + 12px);
    }

    body {
        overflow: hidden;
        overscroll-behavior: none;
    }

    #app {
        height: 100vh;
        height: 100dvh;
        min-height: 0;
    }

    /* スクリーンリーダー専用テキスト */
    .p4-sr-only {
        position: absolute !important;
        width: 1px !important;
        height: 1px !important;
        padding: 0 !important;
        margin: -1px !important;
        overflow: hidden !important;
        clip: rect(0, 0, 0, 0) !important;
        white-space: nowrap !important;
        border: 0 !important;
    }

    .p4-skip-link {
        position: fixed;
        top: 8px;
        left: 8px;
        z-index: 100000;
        transform: translateY(-160%);
        padding: 10px 16px;
        border-radius: 8px;
        background: #ffffff;
        color: #0b57d0;
        border: 2px solid #0b57d0;
        box-shadow: var(--shadow-lg);
        font-weight: 700;
        text-decoration: none;
        transition: transform 0.15s ease;
    }

    .p4-skip-link:focus {
        transform: translateY(0);
    }

    /* すべての操作要素に統一したキーボードフォーカスを与える */
    :where(button, [role="button"], [role="menuitem"], [role="tab"], [role="gridcell"], a, input, select, textarea, [contenteditable="true"]):focus-visible {
        outline: 3px solid var(--p4-focus-color) !important;
        outline-offset: 2px !important;
        box-shadow: 0 0 0 2px var(--surface), 0 0 0 5px rgba(11, 87, 208, 0.35) !important;
    }

    .week-grid:focus-visible {
        outline: 2px solid var(--p4-focus-color) !important;
        outline-offset: 2px;
    }

    .grid-cell[aria-selected="true"] {
        outline: 3px solid var(--p4-focus-color);
        outline-offset: -3px;
        z-index: 4;
    }

    .grid-cell[tabindex="0"] {
        scroll-margin: 72px 16px 96px;
    }

    .material-symbols-outlined[aria-hidden="true"] {
        pointer-events: none;
    }

    /* 文字サイズ・密度・コントラストの利用者設定 */
    :root[data-p4-text-size="large"] {
        --p4-content-scale: 1.12;
    }

    :root[data-p4-text-size="xlarge"] {
        --p4-content-scale: 1.25;
    }

    :root[data-p4-density="compact"] {
        --p4-density-gap: 0.78;
    }

    #app {
        font-size: calc(1em * var(--p4-content-scale));
    }

    :root[data-p4-text-size="large"] .grid-cell,
    :root[data-p4-text-size="xlarge"] .grid-cell,
    :root[data-p4-text-size="large"] .grid-label,
    :root[data-p4-text-size="xlarge"] .grid-label {
        line-height: 1.55;
    }

    :root[data-p4-density="compact"] .grid-cell {
        min-height: 32px;
        padding: 3px 5px;
    }

    :root[data-p4-density="compact"] .grid-header,
    :root[data-p4-density="compact"] .grid-label {
        padding-top: 4px;
        padding-bottom: 4px;
    }

    :root[data-p4-contrast="high"] {
        --border: #5f6368;
        --text-sub: #3c4043;
        --text-hint: #5f6368;
        --cell-today-border: #0b57d0;
        --focus-ring: 0 0 0 4px rgba(11, 87, 208, 0.55);
    }

    :root[data-theme="dark"][data-p4-contrast="high"] {
        --border: #bdc1c6;
        --text-sub: #f1f3f4;
        --text-hint: #dadce0;
        --cell-today-border: #8ab4f8;
        --p4-focus-color: #8ab4f8;
    }

    :root[data-p4-contrast="high"] .grid-cell,
    :root[data-p4-contrast="high"] .grid-label,
    :root[data-p4-contrast="high"] .grid-header,
    :root[data-p4-contrast="high"] .integration-section,
    :root[data-p4-contrast="high"] .btn,
    :root[data-p4-contrast="high"] input,
    :root[data-p4-contrast="high"] select,
    :root[data-p4-contrast="high"] textarea {
        border-width: 2px !important;
    }

    :root[data-p4-contrast="high"] .nav-btn.active {
        outline: 2px solid #ffffff;
        outline-offset: -3px;
    }

    :root[data-p4-motion="reduce"] *,
    :root[data-p4-motion="reduce"] *::before,
    :root[data-p4-motion="reduce"] *::after {
        animation-duration: 0.001ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.001ms !important;
        scroll-behavior: auto !important;
    }

    /* 端末幅に依存せず主領域が縮みすぎないための基本設定 */
    .view.active {
        min-width: 0;
    }

    .plan-layout,
    .week-grid-wrapper,
    .hours-content,
    .nw-page-scroll,
    .events-viewer {
        min-width: 0;
    }

    .week-grid-wrapper {
        scrollbar-gutter: stable;
        overscroll-behavior-inline: contain;
    }

    .week-grid {
        isolation: isolate;
    }

    .grid-header {
        position: sticky;
        top: 0;
        z-index: 20;
    }

    .grid-label {
        position: sticky;
        left: 0;
        z-index: 18;
    }

    .grid-header:first-child {
        left: 0;
        z-index: 25;
    }

    /* モバイルの日切替 */
    .p4-day-switcher {
        display: none;
        width: 100%;
        gap: 6px;
        overflow-x: auto;
        padding: 2px 2px 4px;
        scrollbar-width: none;
        scroll-snap-type: x proximity;
    }

    .p4-day-switcher::-webkit-scrollbar {
        display: none;
    }

    .p4-day-btn {
        flex: 1 0 58px;
        min-height: 44px;
        padding: 4px 8px;
        border: 1px solid var(--border);
        border-radius: 12px;
        background: var(--surface);
        color: var(--text-sub);
        font: inherit;
        font-size: 0.78rem;
        font-weight: 700;
        cursor: pointer;
        scroll-snap-align: center;
    }

    .p4-day-btn[aria-selected="true"] {
        background: var(--primary);
        border-color: var(--primary);
        color: #ffffff;
        box-shadow: var(--shadow-sm);
    }

    .p4-day-btn.today:not([aria-selected="true"]) {
        border-color: var(--primary);
        color: var(--primary);
    }

    .p4-day-btn.holiday:not([aria-selected="true"]) {
        color: var(--col-holiday);
        border-color: var(--col-holiday);
    }

    .p4-day-hidden {
        display: none !important;
    }

    .week-grid.p4-single-day {
        grid-template-columns: 68px minmax(0, 1fr) !important;
        min-width: 0 !important;
        width: 100%;
    }

    .week-grid.p4-single-day .grid-cell {
        min-height: 52px;
        font-size: 0.88rem;
        overflow: visible;
    }

    .week-grid.p4-single-day .grid-label {
        justify-content: center;
        text-align: center;
        padding: 6px 4px;
    }

    /* フォーカスモード */
    .p4-focus-toggle {
        position: fixed;
        right: 16px;
        bottom: 20px;
        z-index: 1150;
        width: 46px;
        height: 46px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border: 1px solid var(--border);
        border-radius: 50%;
        background: var(--surface);
        color: var(--primary);
        box-shadow: var(--shadow-lg);
        cursor: pointer;
    }

    body.p4-focus-mode .app-header,
    body.p4-focus-mode .giga-footer,
    body.p4-focus-mode .weekly-task-sidebar,
    body.p4-focus-mode .p4-mobile-nav {
        display: none !important;
    }

    body.p4-focus-mode #view-plan.active {
        position: fixed;
        inset: 0;
        z-index: 1080;
        background: var(--surface-2);
    }

    body.p4-focus-mode .week-nav {
        padding-block: 6px;
    }

    body.p4-focus-mode .edit-toolbar {
        padding-block: 5px;
    }

    body.p4-focus-mode .p4-focus-toggle {
        bottom: 14px;
        background: var(--primary);
        color: #ffffff;
        border-color: var(--primary);
    }

    /* モバイルボトムナビ・その他メニュー */
    .p4-mobile-nav,
    .p4-more-sheet,
    .p4-drawer-backdrop {
        display: none;
    }

    .p4-accessibility-card .p4-pref-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
        gap: 12px;
    }

    .p4-pref-field {
        display: flex;
        flex-direction: column;
        gap: 6px;
    }

    .p4-pref-field label {
        font-size: 0.78rem;
        font-weight: 700;
        color: var(--text-sub);
    }

    .p4-pref-field select {
        min-height: 42px;
        padding: 8px 10px;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--surface);
        color: var(--text-main);
        font: inherit;
    }

    .p4-pref-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 12px;
    }

    /* 独自モーダルのフォーカストラップ対象 */
    .p4-focus-trapped {
        outline: none;
    }

    /* タッチ端末: WCAGの44px目安を主要操作に適用 */
    @media (pointer: coarse) {
        :root {
            --p4-control-min: 44px;
        }

        .btn,
        .btn-icon,
        .btn-today,
        .nav-btn,
        .tb-menu-item,
        .weekend-toggle-btn,
        .mic-btn,
        .events-file-item,
        .nw-palette-btn,
        .pdf-queue-clear,
        input[type="checkbox"],
        input[type="radio"] {
            min-height: var(--p4-control-min);
        }

        .btn-icon {
            min-width: var(--p4-control-min);
        }

        .link-insert-btn,
        .field-task-btn,
        .unit-picker-btn,
        .free-slot-btn,
        .ai-task-pdf-remove {
            min-width: 32px;
            min-height: 32px;
            opacity: 0.9;
        }

        input,
        select,
        textarea {
            font-size: 16px !important;
        }

        .grid-cell {
            min-height: 44px;
        }
    }

    /* タブレット: タスクパネルをオーバーレイドロワー化して週案幅を確保 */
    @media (max-width: 1180px) {
        .week-grid-wrapper {
            padding: 10px 8px;
        }

        .weekly-task-sidebar {
            position: fixed;
            top: var(--header-h);
            right: 0;
            bottom: 0;
            width: min(360px, 88vw);
            z-index: 1140;
            box-shadow: var(--shadow-lg);
            transform: translateX(0);
            transition: transform 0.2s ease;
        }

        .weekly-task-sidebar.collapsed {
            width: min(360px, 88vw);
            transform: translateX(105%);
        }

        .weekly-task-sidebar.collapsed .weekly-task-sidebar-header,
        .weekly-task-sidebar.collapsed .weekly-task-sidebar-title,
        .weekly-task-sidebar.collapsed .weekly-task-sidebar-spacer,
        .weekly-task-sidebar.collapsed .weekly-task-add-btn,
        .weekly-task-sidebar.collapsed .weekly-task-sidebar-content {
            display: flex;
        }

        .weekly-task-sidebar.collapsed .weekly-task-collapsed-label {
            display: none;
        }

        .p4-drawer-backdrop {
            position: fixed;
            inset: 0;
            z-index: 1135;
            background: rgba(32, 33, 36, 0.46);
        }

        .p4-drawer-backdrop.open {
            display: block;
        }
    }

    /* スマートフォン */
    @media (max-width: 768px) {
        :root {
            --header-h: 50px;
        }

        body {
            padding-bottom: calc(var(--p4-mobile-nav-h) + var(--p4-safe-bottom));
        }

        .app-header {
            min-height: var(--header-h);
            height: var(--header-h);
            padding: 0 10px;
            gap: 6px;
        }

        .header-left {
            min-width: 0;
            gap: 7px;
        }

        .app-logo .material-symbols-outlined {
            font-size: 23px !important;
        }

        .app-title {
            font-size: 0.9rem;
            white-space: nowrap;
        }

        .app-subtitle {
            max-width: 46vw;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-size: 0.66rem;
        }

        .class-switcher {
            max-width: 34vw;
            min-height: 36px;
            margin-left: 4px;
            font-size: 0.75rem;
        }

        .header-nav {
            display: none !important;
        }

        .giga-footer {
            display: none;
        }

        .p4-mobile-nav {
            position: fixed;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 1200;
            display: grid;
            grid-template-columns: repeat(5, minmax(0, 1fr));
            height: calc(var(--p4-mobile-nav-h) + var(--p4-safe-bottom));
            padding: 5px 6px calc(5px + var(--p4-safe-bottom));
            border-top: 1px solid var(--border);
            background: color-mix(in srgb, var(--surface) 94%, transparent);
            backdrop-filter: blur(12px);
            box-shadow: 0 -4px 18px rgba(60, 64, 67, 0.14);
        }

        .p4-mobile-nav button {
            min-width: 0;
            min-height: 50px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2px;
            border: none;
            border-radius: 10px;
            background: transparent;
            color: var(--text-sub);
            font: inherit;
            font-size: 0.64rem;
            font-weight: 700;
            cursor: pointer;
        }

        .p4-mobile-nav button .material-symbols-outlined {
            font-size: 22px;
        }

        .p4-mobile-nav button.active,
        .p4-mobile-nav button[aria-current="page"] {
            background: var(--primary-light);
            color: var(--primary);
        }

        .p4-more-sheet {
            position: fixed;
            inset: 0;
            z-index: 1300;
            align-items: flex-end;
            justify-content: center;
            padding: 12px;
            background: rgba(32, 33, 36, 0.5);
        }

        .p4-more-sheet.open {
            display: flex;
        }

        .p4-more-panel {
            width: min(100%, 560px);
            max-height: min(72dvh, 620px);
            overflow-y: auto;
            padding: 10px;
            border-radius: 18px 18px 12px 12px;
            background: var(--surface);
            box-shadow: var(--shadow-lg);
        }

        .p4-more-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 4px 6px 10px;
            font-weight: 700;
        }

        .p4-more-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 8px;
        }

        .p4-more-grid button {
            min-height: 56px;
            display: flex;
            align-items: center;
            gap: 9px;
            padding: 9px 12px;
            border: 1px solid var(--border);
            border-radius: 12px;
            background: var(--surface-2);
            color: var(--text-main);
            font: inherit;
            font-size: 0.82rem;
            font-weight: 700;
            text-align: left;
        }

        .week-nav {
            padding: 6px 8px;
            gap: 5px !important;
            flex-wrap: wrap;
        }

        .week-info {
            min-width: 0;
        }

        .week-label {
            font-size: 0.88rem;
        }

        .week-range {
            font-size: 0.66rem;
        }

        .week-nav .btn-icon {
            width: 40px;
            height: 40px;
        }

        .p4-week-jump,
        .p4-weekend-controls {
            display: none !important;
        }

        .p4-day-switcher {
            display: flex;
            order: 20;
        }

        .edit-toolbar {
            padding: 5px 8px;
            gap: 6px;
            overflow-x: auto;
            flex-wrap: nowrap;
            scrollbar-width: none;
        }

        .edit-toolbar::-webkit-scrollbar {
            display: none;
        }

        .edit-hint {
            flex: 0 0 auto;
            font-size: 0.72rem;
        }

        .toolbar-actions {
            flex-wrap: nowrap;
            gap: 5px;
        }

        .toolbar-actions > .btn,
        .toolbar-actions > .tb-dropdown > .btn {
            flex: 0 0 auto;
            min-height: 40px;
            padding-inline: 10px;
            font-size: 0.76rem;
        }

        .tb-menu {
            position: fixed;
            left: 8px !important;
            right: 8px !important;
            top: auto;
            bottom: calc(var(--p4-mobile-nav-h) + var(--p4-safe-bottom) + 8px);
            max-height: 55dvh;
            overflow-y: auto;
            min-width: 0;
        }

        .plan-layout {
            overflow: hidden;
        }

        .week-grid-wrapper {
            width: 100%;
            padding: 7px 6px 10px;
            overflow: auto;
        }

        .week-grid:not(.p4-single-day) {
            grid-template-columns: 68px repeat(7, minmax(180px, 1fr));
        }

        .grid-header,
        .grid-label {
            font-size: 0.72rem;
        }

        .grid-cell textarea,
        .grid-cell input {
            line-height: 1.5;
        }

        .section-header-bar {
            padding: 9px 10px;
            gap: 6px;
        }

        .section-header-bar h2 {
            font-size: 0.96rem;
        }

        .hours-content,
        #view-settings > div[style*="padding"],
        #view-integration > div[style*="padding"] {
            padding-left: 10px !important;
            padding-right: 10px !important;
        }

        .integration-body,
        .integration-row {
            min-width: 0;
        }

        .integration-row {
            flex-wrap: wrap;
        }

        .events-layout {
            overflow-y: auto;
        }

        .events-file-panel {
            max-height: 35dvh;
        }

        .events-viewer-toolbar {
            padding: 6px 8px;
            flex-wrap: wrap;
        }

        .events-viewer-toolbar .btn {
            min-height: 40px;
        }

        .nw-editor-layout {
            display: flex;
            flex-direction: column;
            min-height: 0;
        }

        .nw-block-palette {
            width: 100%;
            flex-direction: row;
            overflow-x: auto;
            padding: 8px;
            border-right: none;
            border-bottom: 1px solid var(--border);
        }

        .nw-palette-label,
        .nw-block-palette > div[style*="border-top"] {
            display: none;
        }

        .nw-palette-btn {
            flex: 0 0 auto;
            min-width: 96px;
        }

        .nw-a4-page {
            transform-origin: top center;
        }

        .swal2-popup {
            width: calc(100vw - 16px) !important;
            max-width: calc(100vw - 16px) !important;
            max-height: calc(100dvh - 24px);
            overflow-y: auto;
        }

        .swal2-html-container {
            margin-inline: 0.7em !important;
        }

        .pdf-preview-overlay {
            padding: 6px;
        }

        .pdf-preview-modal {
            width: 100%;
            max-height: calc(100dvh - 12px);
            border-radius: 12px;
        }

        .pdf-preview-footer {
            flex-wrap: wrap;
        }

        .p4-focus-toggle {
            right: 10px;
            bottom: calc(var(--p4-mobile-nav-h) + var(--p4-safe-bottom) + 10px);
        }

        body.p4-focus-mode {
            padding-bottom: 0;
        }

        body.p4-focus-mode .p4-focus-toggle {
            bottom: 10px;
        }
    }

    /* 小型スマホ */
    @media (max-width: 420px) {
        .app-subtitle {
            display: none;
        }

        .class-switcher {
            max-width: 42vw;
        }

        .btn-today {
            padding-inline: 10px;
        }

        .edit-hint #modeLabel {
            display: none;
        }

        .p4-mobile-nav button {
            font-size: 0.6rem;
        }

        .p4-more-grid {
            grid-template-columns: 1fr;
        }
    }

    /* 横向きで高さが少ない端末 */
    @media (max-height: 620px) and (orientation: landscape) {
        :root {
            --header-h: 44px;
        }

        .app-header {
            min-height: var(--header-h);
            height: var(--header-h);
        }

        .app-subtitle,
        .giga-footer {
            display: none;
        }

        .week-nav,
        .edit-toolbar {
            padding-block: 4px;
        }

        .p4-mobile-nav {
            --p4-mobile-nav-h: 56px;
        }
    }

    /* OSのコントラスト要求 */
    @media (prefers-contrast: more) {
        :root:not([data-p4-contrast="standard"]) {
            --border: #4a4d52;
            --text-sub: #303134;
            --text-hint: #4a4d52;
        }
    }

    /* Windows高コントラスト等 */
    @media (forced-colors: active) {
        :where(button, a, input, select, textarea, [role="gridcell"]):focus-visible {
            outline: 3px solid Highlight !important;
        }

        .grid-cell[aria-selected="true"],
        .p4-day-btn[aria-selected="true"],
        .p4-mobile-nav button.active {
            border: 3px solid Highlight !important;
        }
    }

    @media print {
        .p4-mobile-nav,
        .p4-more-sheet,
        .p4-focus-toggle,
        .p4-day-switcher,
        .p4-drawer-backdrop,
        .p4-skip-link {
            display: none !important;
        }
    }
</style>
